# 외규 sub_area 분류용 키워드 사전 (v2)
#
# 구조:
#   title_excludes: [...]            ← 제목에 있으면 사전 제외 (행사·시상 등 노이즈 거름)
#   sub_areas:
#     {영역명}:
#       domain: 개인정보 | 정보보안     ← broader 폴더 결정
#       keywords: [...]                ← 본문/제목에 2개 이상 매칭 시 인정 (임계값)
#       keywords_must_not: [...]        ← 있으면 제외 (선택적)
#
# 매칭 방식:
#   1. 제목에 title_excludes 단어 있으면 → 전체 분류 skip (행사·시상·발간물·캠페인 등)
#   2. 각 sub_area별로 본문+제목에서 키워드 매칭 횟수 세기
#   3. 2개 이상 매칭된 sub_area만 인정 (단일 키워드 우연 매칭 거름)

# === 사전 제외 패턴 (제목 기준) ===
# 행사·시상·캠페인·발간물 안내 등 정보성 자료는 회사 내규에 영향 X
title_excludes:
  - 세미나
  - 특강
  - 포럼
  - 시상
  - 입교
  - 기념
  - 챌린지
  - 총회 개최
  - 인식개선
  - 동참
  - 채택
  - 게재
  - 모집
  - 행사
  - 캠페인
  - 워크숍
  - 리포트 발간
  - 인사이트 리포트
  - 아카데미
  - 페스티벌

# === 영역별 키워드 사전 ===

sub_areas:

  # ===== 개인정보 domain =====

  안전성조치:
    domain: 개인정보
    keywords:
      - 안전성 확보조치
      - 안전조치 의무
      - 보호조치 기준
      - 기술적 보호조치
      - 관리적 보호조치
      - 물리적 보호조치
      - 안전성 확보 기준
      - 안전한 처리
      - 보호조치 의무

  수집동의:
    domain: 개인정보
    keywords:
      - 수집동의
      - 수집 동의
      - 마케팅동의
      - 마케팅 동의
      - 별도동의
      - 별도 동의
      - 동의 철회
      - 동의 획득
      - 정보주체의 동의

  처리위탁:
    domain: 개인정보
    keywords:
      - 처리위탁
      - 처리 위탁
      - 수탁자
      - 재위탁
      - 정보처리 위탁
      - 위탁 점검
      - 수탁자 관리
      - 수탁사 점검
      - 처리수탁자

  제3자제공:
    domain: 개인정보
    keywords:
      - 제3자제공
      - 제3자 제공
      - 제3자에 대한 제공
      - 제3자 통지
      - 제3자 동의

  신용정보:
    domain: 개인정보
    keywords:
      - 신용정보업
      - 마이데이터
      - 본인신용정보관리
      - 개인(신용)정보
      - 신용정보주체
      - 신용정보집중기관
      - 신용정보회사
      - 신용정보 보호

  개인정보:
    domain: 개인정보
    keywords:
      - 개인정보보호법
      - 개인정보 보호법
      - 개인정보 처리방침
      - 개인정보처리방침
      - 가명정보
      - 익명정보
      - 정보주체의 권리
      - 개인정보 영향평가
      - 개인정보보호위원회
      - 개인정보 유출
      - 개인정보 침해

  # ===== 정보보안 domain =====

  IT안전성:
    domain: 정보보안
    keywords:
      - 전자금융감독규정
      - 전자금융감독
      - 전자금융거래법
      - 전자금융사고
      - 전산설비 위탁
      - 정보기술부문
      - 전자금융업
      - 전자금융기반시설

  망분리:
    domain: 정보보안
    keywords:
      - 망분리
      - 망 분리
      - 논리적 망분리
      - 물리적 망분리
      - 망분리 예외
      - 망분리 규제
      - 망분리 개선
      - 망분리 가이드

  클라우드:
    domain: 정보보안
    keywords:
      - 클라우드컴퓨팅
      - 클라우드 서비스
      - 클라우드서비스
      - CSP 평가
      - SaaS
      - IaaS
      - PaaS
      - 클라우드 이용
      - 클라우드 보안

  정보보안:
    domain: 정보보안
    keywords:
      - 침해사고
      - 사이버공격
      - 사이버 공격
      - 보안위협
      - 보안 위협
      - 보안사고
      - 보안 사고
      - 보안취약점
      - 정보보호 관리체계
      - 침입탐지
      - 침입차단
      - 보안패치
      - 보안 점검
      - 자율보안
