# 외규 sub_area 분류용 사전 (v3 — 임베딩 기반)
#
# 구조:
#   title_excludes: [...]            ← 제목 키워드 사전 제외 (행사·시상 등)
#   sub_areas:
#     {영역명}:
#       domain: 개인정보 | 정보보안
#       description: |               ← ★ 임베딩 분류 입력 (의미 설명문)
#       keywords: [...]              ← (선택) keyword fallback / 보조
#
# 임베딩 모델: jhgan/ko-sroberta-multitask
# 분류:
#   1. title_excludes 검사
#   2. 본문 임베딩 vs 각 sub_area description 임베딩 (코사인 유사도)
#   3. 유사도 >= threshold (기본 0.45) → 매칭
#   4. INTERNAL_SUB_AREAS 교집합만 통과

title_excludes:
  - 세미나
  - 특강
  - 포럼
  - 시상
  - 입교
  - 기념
  - 챌린지
  - 총회 개최
  - 간담회 개최
  - 간담회
  - 보도참고
  - 보도자료
  - 인식개선
  - 동참
  - 채택
  - 게재
  - 모집
  - 행사
  - 캠페인
  - 워크숍
  - 리포트 발간
  - 인사이트 리포트
  - 인사이트
  - 아카데미
  - 페스티벌
  - 현장점검
  - 발간
  - 회의 개최
  - 출범
  - 협약 체결


sub_areas:

  # ===== 개인정보 domain =====

  안전성조치:
    domain: 개인정보
    description: |
      개인정보의 안전성 확보를 위한 기술적·관리적·물리적 보호 조치.
      암호화, 접근통제, 접속기록 관리, 백업, 망분리, 침입탐지, 백신, 보안패치 등.
      내부관리계획 수립, 안전조치 의무, 정보보호 관리체계 인증 관련.
      유출 사고 방지·대응 절차 및 책임 체계.
    keywords:
      - 안전성 확보조치
      - 안전조치 의무
      - 보호조치 기준
      - 안전성 확보
      - 안전한 처리

  수집동의:
    domain: 개인정보
    description: |
      개인정보 수집·이용 시 정보주체의 동의를 받는 절차 및 기준.
      마케팅 동의, 별도 동의, 명시적 동의, 묵시적 동의 구분.
      동의 획득 방법(서면·전자·구두), 동의 철회 절차, 동의 기록 보관.
      필수·선택 동의 항목 구분, 거부권 안내, 동의 가독성 의무.
    keywords:
      - 수집동의
      - 수집 동의
      - 마케팅동의
      - 별도동의
      - 동의 철회
      - 정보주체의 동의

  처리위탁:
    domain: 개인정보
    description: |
      개인정보 처리 업무를 외부 수탁자에게 맡기는 행위 및 관리 의무.
      위탁 계약 체결, 수탁자 선정·평가, 위탁 사실 공개, 재위탁 통제, 수탁자 점검.
      클라우드 위탁, IT 시스템 외주, 고객센터 위탁 등 다양한 형태.
      금융회사 정보처리 위탁 규정 및 모범규준 적용.
    keywords:
      - 처리위탁
      - 처리 위탁
      - 수탁자
      - 재위탁
      - 정보처리 위탁
      - 위탁 점검

  제3자제공:
    domain: 개인정보
    description: |
      개인정보를 정보주체 본인이 아닌 제3자에게 제공·이전하는 행위.
      제공 시 동의 의무, 제공 항목·목적·기간 명시.
      국외 이전, 그룹사간 정보 공유, 위탁과의 구분.
      제공 후 통지 의무 및 정보주체 권리 보호 절차.
    keywords:
      - 제3자제공
      - 제3자 제공
      - 외부제공
      - 제3자에 대한 제공

  신용정보:
    domain: 개인정보
    description: |
      금융거래·신용도·신용평가에 관한 신용정보의 처리·보호·이용.
      개인신용정보, 마이데이터(본인신용정보관리업), 신용정보업감독규정 적용.
      신용정보주체의 권리, 신용정보집중기관, 신용평가회사 운영.
      금융권 특화 — 은행·증권·보험·카드 등 신용정보 처리자.
    keywords:
      - 신용정보업
      - 마이데이터
      - 본인신용정보관리
      - 개인(신용)정보
      - 신용정보주체

  개인정보:
    domain: 개인정보
    description: |
      개인정보 보호법 일반 및 처리방침 작성·운영 전반.
      개인정보보호법, 시행령, 표준 처리방침 작성지침, 영향평가 의무.
      가명정보·익명정보 처리, 정보주체의 권리(열람·정정·삭제·이동권), 책임자 지정.
      유출 사고 신고·통지, 손해배상 책임, 과징금·벌칙.
    keywords:
      - 개인정보보호법
      - 개인정보 처리방침
      - 가명정보
      - 익명정보
      - 정보주체의 권리
      - 개인정보보호위원회

  # ===== 정보보안 domain =====

  IT안전성:
    domain: 정보보안
    description: |
      전자금융 IT부문 안전성 확보 및 감독 규정.
      전자금융감독규정, 전자금융거래법, 전산설비 위탁, 정보기술부문 안전성.
      전자금융사고 책임, 보험 가입 의무, 재해복구센터, 직무분리.
      금융권 IT 운영의 보안·안정성 표준.
    keywords:
      - 전자금융감독규정
      - 전자금융감독
      - 전자금융거래법
      - 전자금융사고
      - 정보기술부문

  망분리:
    domain: 정보보안
    description: |
      금융권 정보 시스템의 망분리 운영 및 규제.
      업무망·인터넷망·외부망 분리, 물리적·논리적 망분리, 망연계 시스템.
      망분리 예외 적용(연구개발 등), 망분리 가이드라인 및 개선 로드맵.
      클라우드·SaaS 도입 시 망분리 정책 변화.
    keywords:
      - 망분리
      - 망 분리
      - 논리적 망분리
      - 물리적 망분리
      - 망분리 예외
      - 망분리 규제

  클라우드:
    domain: 정보보안
    description: |
      금융권 클라우드컴퓨팅 서비스 이용 가이드 및 보안.
      CSP(클라우드 제공자) 평가, 안전성 확보조치, 위탁 검증.
      SaaS·IaaS·PaaS 도입 시 보안 기준 및 절차.
      클라우드 이용 보고, 이용 종료 시 데이터 처분.
    keywords:
      - 클라우드컴퓨팅
      - 클라우드 서비스
      - 클라우드서비스
      - CSP 평가
      - SaaS
      - 클라우드 이용

  정보보안:
    domain: 정보보안
    description: |
      사이버 보안·침해사고 대응·취약점 관리 전반.
      사이버공격 대응, 침해사고 신고·분석, 보안위협 모니터링.
      정보보호 관리체계(ISMS), 자율보안, 보안 거버넌스.
      침입탐지·차단 시스템, 보안 패치, 보안 점검 및 평가.
    keywords:
      - 침해사고
      - 사이버공격
      - 보안위협
      - 보안사고
      - 보안취약점
      - 정보보호 관리체계
      - 자율보안
