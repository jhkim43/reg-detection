  #   runs-on: ubuntu-latest
  #   continue-on-error: true
  #   steps:
  #     - name: Checkout
  #       uses: actions/checkout@v4
  #
  #     - name: Complexity
  #       run: bash .harness/gates/check-complexity.sh .
  #
  #     - name: Performance budgets
  #       run: bash .harness/gates/check-performance.sh .
  #
  #     - name: AI anti-patterns
  #       run: bash .harness/gates/check-ai-antipatterns.sh .
  #
  #     - name: Mutation testing
  #       run: bash .harness/gates/check-mutation.sh . --threshold=60
