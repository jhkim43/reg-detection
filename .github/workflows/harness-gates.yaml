# GitHub Actions workflow for AI Harness gates
# Copy this to .github/workflows/harness-gates.yaml in your project
#
# Gate tiers:
#   DEFAULT (always run): secrets, boundaries, structure, spec, layers, security, deps
#   OPT-IN (commented out below): complexity, mutation, performance, ai-antipatterns

name: Harness Gates

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  default-gates:
    name: Default Gates (Informational — M1/M2 non-blocking)
    runs-on: ubuntu-latest
    # M1-M2 학습 기간: 위반이 있어도 PR을 막지 않음.
    # M3 진입 시점에 retro에서 blocking으로 전환 여부 결정.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secrets
        run: bash .harness/gates/check-secrets.sh .

      - name: Boundaries
        run: bash .harness/gates/check-boundaries.sh .

      - name: Structure
        run: bash .harness/gates/check-structure.sh .

      - name: Layers
        run: bash .harness/gates/check-layers.sh .

      - name: Security (SAST)
        run: bash .harness/gates/check-security.sh .

      - name: Dependencies
        run: bash .harness/gates/check-deps.sh .

      - name: Spec completeness
        run: |
          if [ -d ".harness/ouroboros/seeds" ]; then
            bash .harness/gates/check-spec.sh .
          else
            echo "::notice::No seeds found — skipping spec gate."
          fi

  # ──────────────────────────────────────────────────────────────
  # OPT-IN GATES — uncomment to enable
  # Typically slower, more opinionated, or project-specific.
  # ──────────────────────────────────────────────────────────────
  # opt-in-gates:
