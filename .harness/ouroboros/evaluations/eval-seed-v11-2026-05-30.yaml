ux_evolution_summary: |
  phase3 사용자 화면 검증 중 UX 모델 크게 진화. 시드 must는 유지 (슬롯 1개,
  영속, 모던 톤, 단발성 push, sanitize)되었으나 모드 디테일 변경:
  - TRD-D-39 (always-on slot) → click-to-open (헤더 버튼 + 채팅 카드 + popover)
  - TRD-D-40 (📚 history 버튼) → 헤더 popover 5건으로 일부 대체
  - 다수 노이즈 정리 (Press / hint, 자동 인사, 가까이 가면 뜨는 ...)
  - 슬라이드 모드 + PDF 다운로드 + 채팅 시간 표시 + 카드 상대시간 등 폴리시

  사용자 검증 시나리오 7건 모두 PASS:
  S1. 헤더 popover 5건 → 패널 슬라이드인
  S2. NPC 채팅 카드 + 영속 (새로고침 후 유지)
  S3. 다른 NPC 토스트 + 클릭 → NPC 전환 + history + 패널 + sprite bubble + 배지 reset
  S4. 슬라이드 모드 (마크다운 --- 구분자, 키보드 ← →)
  S5. A1 모던 톤 (네이비 헤딩 + 골드 액센트 + 표 zebra)
  S6. PDF 다운로드 (window.print + A4 + 한글 폰트)
  S7. 채팅 메시지 시:분 표시 + 카드 상대시간

  결과: phase3 PR3 머지 (#35), phase4 PR4 평가 통과.

