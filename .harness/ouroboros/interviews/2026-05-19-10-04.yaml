answers:
  - q_id: Q1
    question: "openclaw가 deskrpg에서 실제로 담당하는 기능 목록은?"
    answer: "코드 스캔 위임 (Explore 서브에이전트)"
    dimension: "context"
    clarity_delta: +0.10
    findings: |
      128+ 터치포인트 / 18+ 파일 / 9 functional categories:
      (1) NPC/Agent lifecycle
      (2) Chat streaming (SSE-style onDelta + 180s timeout + chatAbort)
      (3) File/workspace management (~/.openclaw/workspace-${agentId})
      (4) Pairing / connection status (Ed25519 device identity + challenge-response)
      (5) Error mapping (OpenClawGatewayError → HTTP 409/etc, requestId 보존)
      (6) Configuration storage (npcs.openclawConfig JSONB shape)
      (7) Authentication / auth tokens (~/.openclaw-devices/${hash}.json, AES-256-GCM)
      (8) Telemetry / usage tracking (LLM cost recording — AC-008과 부분 겹침)
      (9) Provider abstraction (AI_PROVIDER=nanobot 분기 이미 부분 구현됨)

  - q_id: Q2
    question: "'동등 대체'의 정의는 functional / behavioral / drop-in 어느 쪽?"
    answer: |
      "deskrpg와 openclaw 연동의 기능적 이점을 nanobot으로도 그대로 받으면 좋겠음"
      → functional parity (option a). 응답 latency·chunk 형식 등 behavioral
      세부는 명시적 요구 아님. drop-in은 nice-to-have.
    dimension: "goal"
    clarity_delta: +0.10

  - q_id: Q3
    question: "DB 컬럼명·심볼명(`openclawConfig`)은 유지/rename/abstract?"
    answer: "사용은 안 하지만 fork 영향도 차원에서 유지 — 판단 위임"
    decision: "DB 컬럼명 `npcs.openclawConfig` 유지 (rename 영향도 vs 명확성 tradeoff에서 영향도 우선)"
    dimension: "constraint"
    clarity_delta: +0.05

