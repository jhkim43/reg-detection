assumptions_surfaced:
  - "사용자가 '양보 없이 광기 수용' 선언 — 12주 안에 deskrpg 풀 리스킨 + nanobot fork + RAG + 5소스 크롤러는 4명 팀에 매우 도전적. 마일스톤 슬립 시 양보 우선순위 재논의 필요"
  - "4명 중 누가 픽셀 아트 NPC·맵 자산을 그릴지 미정 (역할 매트릭스 명시 필요)"
  - "Obsidian vault git sync 시 보안 검토 필요 (개인정보·민감 규제 본문 노출 우려)"
  - "데이터 소량 가정 — 12주 동안 수집되는 규제 본문량으로는 SQLite + BM25 충분하다는 가정. 1개 게시판 일평균 게시물 수치 확인 필요"
  - "5개 소스 중 바젤위원회는 영문 — 한국어 기반 영향도 분석 시 번역 또는 다국어 LLM 처리 필요. 시연일 기준 FSS만 한정이면 후순위"
  - "nanobot 'fork' 시 upstream 변경 추적 전략 미정 (rebase vs squash, 연동 빈도)"
  - "deskrpg는 'AI 미팅룸/맵 에디터/멀티플레이어' 등 RegTrack과 무관한 기능 다수 — 어디까지 keep/cut할지 미결"

