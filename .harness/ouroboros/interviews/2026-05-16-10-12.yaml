    dimension: goal
    clarity_delta: +0.15

  - question: "현행 페인 포인트가 무엇인가?"
    answer: "수동 웹서핑으로 5개 사이트 매일 확인, 부서 간 공유·협업 부재, 규제 본문이 길어 영향도 판단에 시간 소요, 변경 이력 추적 어려움"
    dimension: goal
    clarity_delta: +0.10

  - question: "12주 발표 자리에서 시연하는 5분 — 가장 강력한 오프닝은?"
    answer: "'이 규제가 우리 리테일 부서에 미치는 영향' → LLM이 근거 문구까지 짚어서 분석 (영향도 분석의 지능성을 주인공으로)"
    dimension: success
    clarity_delta: +0.20

  - question: "심사위원이 기억할 단 하나의 기술적 자신감은?"
    answer: "UX 완성도 — 대시보드가 실제 제품 같음. 구체적으로 '에이전트가 게임 캐릭터 형태로 돌아다니는' 모습 (deskrpg 활용)"
    dimension: success
    clarity_delta: +0.15

  - question: "MVP 깊이는?"
    answer: "FSS 1개 소스 깊게 → 여러 게시판(보도·규정·해설) → 신규/개정 구분 → 영향도 → 필터링·타임라인까지 end-to-end. 나머지 4개 소스는 인터페이스만 증명"
    dimension: goal
    clarity_delta: +0.20

  - question: "기술 스택 일부 정해진 것은?"
    answer: |
      - Python 생태계 (크롤링·AI)
      - LLM은 OpenAI/Claude API (자체 호스팅 X)
      - 백엔드: nanobot (Python, github.com/nanobot-ai/nanobot 추정) fork — LLM 사용량 등 기능 개선해 커스텀
      - 프론트: deskrpg (Next.js + TypeScript, github.com/dandacompany/deskrpg) fork — 픽셀 아트 RPG UI
      - 지식베이스/원문 브라우저: Obsidian markdown vault
      - Base repo: github.com/jhkim43/reg-detection @ dev/nanobot
    dimension: constraint
    clarity_delta: +0.30

  - question: "팀 협업 흐름은?"
    answer: "feature 브랜치 → dev/nanobot 통합 브랜치 → main 마일스톤마다 병합 (4명 팀)"
    dimension: context
    clarity_delta: +0.15

  - question: "deskrpg 통합 깊이는?"
    answer: "deskrpg fork해서 RegTrack 대시보드로 변조 — 풍경·쿨키·NPC 자산을 새로 디자인 (적극적 소유, 공수 큼)"
    dimension: constraint
    clarity_delta: +0.10

  - question: "핵심 시연 시나리오 30초 스크립트 (= acceptance criteria)?"
    answer: |
      사용자 캐릭 입장
      → 크롤러 NPC가 수집한 신규 규제 보고
      → 사용자가 분석 NPC에게 '리테일 영향' 질문
      → 분석 NPC가 근거 구절 인용해서 답변
    dimension: success
    clarity_delta: +0.25

  - question: "정량 KPI(시연 우선)?"
    answer: |
      - 탐지 ≤ 1h (시연일 기준)
      - NPC 보고 시각·청각 활성
      - 필터 4개 이상 작동
      - FSS 1개 소스 완전 동작
    dimension: success
    clarity_delta: +0.20

  - question: "LLM 비용 예산?"
    answer: "2개월 반에 $100 (월 ~$40, 저렴 모델·캐싱·컨텍스트 절약 필요)"
    dimension: constraint
    clarity_delta: +0.15

  - question: "배포/데이터 보존?"
    answer: "노트북 로컬(docker compose 가정), 단 Obsidian vault는 git 저장소로 sync해서 팀원과 공유"
    dimension: constraint
    clarity_delta: +0.10

  - question: "3-tier 매핑 검증 (Presentation/Logic/Data)?"
    answer: |
      사용자 채택 (옵션 2+3+4 결합):
      - Presentation: Next.js deskrpg fork (RPG UI · 대시보드 · NPC 조종)
      - Logic: Python nanobot fork (Agent · 영향도 · RAG with BM25 우선) + 별도 크롤러 서비스(scrapy/playwright)
      - Data: SQLite + Obsidian markdown vault (PostgreSQL/pgvector 제거 — 시연용 단순화)
      ※ Vector DB는 일정 여유 시 추가
    dimension: context
    clarity_delta: +0.20

  - question: "12주 일정 양보 우선순위?"
    answer: "양보 없이 모두 원래 스코프 — 일정 광기 수용 (사용자 명시적 결정)"
    dimension: constraint
    clarity_delta: +0.05

