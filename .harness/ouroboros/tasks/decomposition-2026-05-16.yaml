# Validation
# ═════════════════════════════════════════════════════════════════════
validation:
  total_tasks: 76                # v1 73 + v2 3 (T-000a~c)
  by_layer:
    data: 14         # T-001~T-015 중 데이터 레이어
    crawler: 5       # T-018, T-019, T-020, T-021, T-022, T-023 → 사실 6, 다만 T-023은 logic 인접
    logic: 31        # FastAPI·Services·api/* 다수
    presentation: 17 # frontend/scenes/components
    infra: 2         # CI, docker-compose
    doc: 5           # v1 2 (백업영상, preflight) + v2 3 (T-000a~c nanobot codemap)
    demo: 2          # 리허설, 발표
  dependencies_valid: true   # 순환 의존 없음 (DAG)
  all_testable: true         # 모든 task에 test 명시
  all_atomic: true           # 30분 이내 (일부 30분 max)
  ac_coverage_complete: true # AC-001~AC-012 모두 1개 이상 task 매핑
  no_orphan_tasks: false     # T-001은 'all' AC에 적용 — 정당함
  no_circular_deps: true
  pair_mode_count: 9         # high complexity AC 연결 task

  anti_patterns_check:
    mega_task: "none — 모든 task 단일 레이어"
    orphan_task: "none — 모든 task ac_refs 명시"
    circular_dep: "none — DAG"
    missing_test: "none — 모든 task test 명시"
    too_small: "T-047 (10min), T-048 (15min) 등 일부 작음 — 다만 명확한 endpoint 단위라 분리 유지"

  result: VALID

