           (phase 4.5 endpoint 재사용) — in-flight tool cancel
        3. nanobot측 cancel hook이 status="cancelled" push (TRD-D-36) →
           UI 자동 정합 (중복이지만 멱등)

        cancel granularity 한계: 같은 session의 다른 in-flight 작업도 함께 멈춤
        (TRD-D-37). 사용자에게 UI tooltip으로 안내 검토.
      test: "task board의 cancel 버튼 클릭 시 DB status 전환 + nanobot chatAbort 호출 wiring guard"
      depends_on: [T-V09]
      estimated_minutes: 30
      files:
        - "deskrpg/src/components/TaskBoard.tsx (또는 적절한 컴포넌트)"
        - "deskrpg/src/app/game/GamePageClient.tsx"

    - id: T-V31
      ac_ref: AC-009
      layer: test
      description: |
        토큰 절감 smoke test 시나리오 작성 + 결과 기록:
        - 깨끗한 baseline (chat_messages + nanobot session jsonl 정리)
        - 새 NPC와 14턴 대화 + abort 없이 full 응답
        - TokenTrackingHook 로그 + nanobot session token.json 누적 prompt_tokens 측정
        - Phase 4.5 baseline (~12000~15000 누적) → v10 적용 후 (~6500~9000 예상)
        - 결과를 `.harness/ouroboros/evaluations/v10-token-savings-smoke.md` 기록
      test: "manual 측정 + 결과 문서화 (정량 비교표)"
