version: 1
created: "2026-05-16T10:30:00"
interview_ref: ".harness/ouroboros/interviews/2026-05-16-10-12.yaml"
charter_ref: "Project Charter_4팀_0514.docx"

# ─────────────────────────────────────────────────────────────────────
# Goal — 한 문장으로 압축한 목표
# ─────────────────────────────────────────────────────────────────────
goal:
  summary: |
    금융 규제 변동을 자동 수집·분석하여 deskrpg 기반 RPG 대시보드의
    NPC 에이전트(crawler/analyzer)가 사용자 캐릭터에게 in-world로
    보고하는 RegTrack 시스템 구축 (FSS 1개 소스 end-to-end MVP).

  detail: |
    수동 웹서핑(5개 사이트 매일 확인) + 부서 간 공유 부재 + 영향도 판단 시간 소요
    + 변경 이력 추적 어려움이라는 4대 페인 포인트를 해결한다. 12주 안에
    FSS(금융감독원) 1개 소스를 보도·규정·해설 게시판까지 깊게 자동화하고,
    LLM(OpenAI/Claude API) 기반 영향도 분석에 근거 구절(Citation)을 첨부하며,
    Next.js + deskrpg fork로 픽셀 아트 RPG 대시보드를 구현한다. 나머지 4개
    소스(BOK/FSC/국회·관보/바젤위)는 인터페이스 stub + mock 데이터 1건으로
    확장 가능성만 증명한다.

  non_goals:
    - "프로덕션 운영 (멀티 테넌트, 권한 모델, SSO, audit log)"
    - "모바일 반응형 UI"
    - "장기 데이터 보관 (12주 종료 후 폐기 OK)"
    - "deskrpg 원본의 AI 미팅룸·맵 에디터 등 RegTrack 무관 기능 유지"
    - "BCBS(바젤위) 영문 본문 번역 자동화 (v2)"
    - "픽셀 아트 자산 신규 제작 (MVP는 deskrpg 기본 자산 재활용 + 색상·이름 변경)"
    - "Vector DB(pgvector) 기반 의미 검색 (BM25로 시작, stretch)"

# ─────────────────────────────────────────────────────────────────────
# Constraints — 절대 / 금지 / 권장
# ─────────────────────────────────────────────────────────────────────
constraints:
  must:
    - "3-tier 레이어 분리(Presentation/Logic/Data) 준수 — ARCHITECTURE_INVARIANTS.md Part 1"
    - "Base repo: github.com/jhkim43/reg-detection @ dev/nanobot 위에서 작업"
    - "백엔드는 nanobot(Python) fork 기반 — Agent 워크플로우 재사용"
    - "프론트엔드는 deskrpg(Next.js + TypeScript) fork 기반"
    - "LLM은 OpenAI/Claude API만 사용 (자체 호스팅 X)"
    - "LLM 영향도 분석은 반드시 Citation(원문 근거 구절) 포함 — hallucination 방지"
    - "수집된 규제 본문은 Obsidian markdown vault 형식으로 저장"
    - "Vault는 git 저장소로 sync해 팀원 공유 — Private repo 강제"
    - "구조화 데이터는 SQLite에 저장 (단일 파일 DB)"
    - "Crawler는 nanobot과 별도 Python 서비스(scrapy/playwright) — 스케줄·재시도 패턴 분리"
    - "협업 흐름: feature → dev/nanobot → main 마일스톤마다 병합"
    - "12주 일정 내 FSS 1개 소스 완전 동작 + 시연 acceptance 4단계 충족"
    - "LLM 호출은 LLMUsageRecord에 기록 (예산 추적용 nanobot fork 커스텀 기능)"
    - "Presentation→Data 직접 접근 금지 (DTO/API 경유)"

  must_not:
    - "PostgreSQL/pgvector를 MVP 의존성에 포함 (stretch goal로만)"
    - "Obsidian vault를 public repo에 올리기 (민감 규제 본문 노출 방지)"
    - "LLM 응답을 Citation 없이 사용자에게 노출"
    - "ARCHITECTURE_INVARIANTS.md Part 1의 4대 절대 규칙 위반"
    - "차터에 명시된 5개 소스 외 추가 소스 추가 (scope creep 방지)"
    - "deskrpg 원본 AI 미팅룸/맵 에디터 코드를 유지 (불필요 기능 제거)"
    - "비용 모니터링 없이 LLM 호출 (월 예산 $40 초과 위험)"
    - "Crawler 실패 시 silent fail (Flexible Parser는 반드시 알림)"

  should:
    - "RAG는 BM25부터 — 정확도 부족 시 pgvector stretch"
    - "RegulationVersion diff는 LLM 1줄 요약으로 시작 (텍스트 diff는 stretch)"
    - "GitHub Actions CI로 게이트(.harness/gates) 자동 실행"
    - "Notification(앱 토스트)은 사용자가 RPG 맵 밖에 있을 때만 fallback (MVP는 NPCReport만)"
    - "부서(target_department)는 자유 텍스트로 시작 (시연: '리테일'), enum 변환은 v2"
    - "4개 소스(BOK/FSC/국회·관보/BCBS) 인터페이스 증명은 코드 stub + mock 데이터 1건"
    - "Agent 타입은 MVP에서 Crawler + ImpactAnalyzer 2개만 (요약/디스패처 NPC는 stretch)"
    - "LLM 캐싱(prompt cache, embedding cache) 적극 활용 — $100/2.5개월 예산 보호"

# ─────────────────────────────────────────────────────────────────────
# Acceptance Criteria — testable 만 작성. complexity가 Pair Mode를 결정
# ─────────────────────────────────────────────────────────────────────
acceptance_criteria:
  - id: "AC-001"
    description: |
      FSS 보도·규정·해설 3개 게시판을 크롤링해 신규/개정 Regulation을
      SQLite + Obsidian vault에 저장한다 (1게시판 1건 이상 검증 가능).
    verification: "automated"
    priority: "must"
    complexity: "high"
    rationale: "3-tier 전체 + 외부 사이트 + Flexible Parser → Pair Mode + Test Designer 강제"

  - id: "AC-002"
    description: |
      신규 Regulation 발견 후 1시간 이내(시연일 기준)에 NPCReport(NEW_REGULATION)이
      대시보드 화면에 시각·청각 효과로 표시된다.
    verification: "manual"
    priority: "must"
    complexity: "medium"
    rationale: "스케줄러 + 이벤트 전파 → Pair Mode 선택적"

  - id: "AC-003"
    description: |
      사용자 캐릭터가 분석 NPC에게 자연어로 '리테일 영향'을 질문하면
      ImpactAnalysis 응답이 in-world 말풍선으로 표시되며, 응답에 1개 이상의
      Citation(원문 인용 + char_offset)이 포함된다.
    verification: "both"
    priority: "must"
    complexity: "high"
    rationale: "LLM API + RAG + Presentation → Pair Mode + Test Designer 강제"

  - id: "AC-004"
    description: |
      대시보드 필터가 4종 이상 동작한다: 소스(source_codes), 분류(change_types),
      부서 영향(target_departments), 날짜 범위(date_from/to).
    verification: "automated"
    priority: "must"
    complexity: "low"
    rationale: "단순 쿼리 + UI → Direct 구현"

  - id: "AC-005"
    description: |
      시연 시나리오 4단계가 끊김 없이 동작한다:
      (1) 사용자 캐릭터 입장
      (2) 크롤러 NPC가 신규 Regulation 보고 (NPCReport)
      (3) 사용자가 분석 NPC에게 '리테일 영향' 질문 (askAnalystNPC)
      (4) 분석 NPC가 Citation 포함 응답 (말풍선)
    verification: "manual"
    priority: "must"
    complexity: "high"
    rationale: "전체 통합 시나리오 — 발표 acceptance"

  - id: "AC-006"
    description: |
      Obsidian vault가 git 저장소(private)로 sync되며, VaultDocument 변경이
      git commit 이벤트로 추적된다.
    verification: "automated"
    priority: "must"
    complexity: "medium"
    rationale: "Data 레이어 + 외부 git → Pair Mode 선택적"

  - id: "AC-007"
    description: |
      4개 소스(BOK/FSC/국회·관보/BCBS)의 RegulationSource 엔트리가 SQLite에
      등록되고, 각 소스마다 mock 데이터 1건이 Vault + Regulation 테이블에
      존재한다 (확장성 증명).
    verification: "automated"
    priority: "must"
    complexity: "low"
    rationale: "데이터 seeding → Direct 구현"

  - id: "AC-008"
    description: |
      모든 LLM API 호출이 LLMUsageRecord에 기록되며, 누적 cost_usd >= $40 시
      stderr 또는 NPC 알림으로 경고가 발생한다.
    verification: "automated"
    priority: "must"
    complexity: "medium"
    rationale: "nanobot fork 커스텀 기능 — Pair Mode 선택적"

  - id: "AC-009"
    description: |
      RegulationVersion 이력이 동일 external_id에 대해 최소 2회 이상 캡처된다
      (개정 케이스 시뮬레이션). diff_summary는 LLM 1줄 요약으로 채워진다.
    verification: "automated"
    priority: "should"
    complexity: "medium"
    rationale: "변경 이력 페인 포인트 해소 — Pair Mode 선택적"

  - id: "AC-010"
    description: |
      .harness/gates의 default 게이트(check-secrets/boundaries/structure/spec/
      layers/security/deps)가 모두 PASS 한다.
    verification: "automated"
    priority: "must"
    complexity: "low"
    rationale: "harness 게이트 자동 실행 — Direct 구현"

# ─────────────────────────────────────────────────────────────────────
# Ontology — Ontologist subagent 추출 결과 (14 entities, 10 actions)
# ─────────────────────────────────────────────────────────────────────
ontology:
  entities:
    - name: Regulation
      korean_name: 규제
      description: "한 건의 규제 변동(보도·규정·해설 통합) 최상위 엔티티"
      fields:
        - { name: id, type: UUID, required: true }
        - { name: source_id, type: reference, required: true, ref: RegulationSource }
        - { name: external_id, type: string, required: true }
        - { name: title, type: string, required: true }
        - { name: board_type, type: enum, required: true, values: [보도, 규정, 해설] }
        - { name: change_type, type: enum, required: true, values: [NEW, AMENDED] }
        - { name: published_at, type: date, required: true }
        - { name: detected_at, type: date, required: true }
        - { name: source_url, type: string, required: true }
        - { name: vault_path, type: string, required: true }
        - { name: raw_text, type: string, required: true }
      relationships:
        - { target: RegulationSource, type: belongs_to }
        - { target: ImpactAnalysis, type: has_many }
        - { target: RegulationVersion, type: has_many }
        - { target: Notification, type: has_many }
        - { target: VaultDocument, type: has_one }

    - name: RegulationSource
      korean_name: 규제 소스
      description: "규제 발행 출처 기관/사이트. MVP는 FSS만 FULL"
      fields:
        - { name: id, type: UUID, required: true }
        - { name: code, type: enum, required: true, values: [FSS, BOK, FSC, NA_GAZETTE, BCBS] }
        - { name: name_ko, type: string, required: true }
        - { name: base_url, type: string, required: true }
        - { name: language, type: enum, required: true, values: [KO, EN] }
        - { name: mvp_status, type: enum, required: true, values: [FULL, INTERFACE_ONLY] }
        - { name: parser_config, type: string, required: true, note: "Flexible Parser JSON 직렬화" }
      relationships:
        - { target: Regulation, type: has_many }
        - { target: CrawlJob, type: has_many }

    - name: RegulationVersion
      korean_name: 규제 버전 이력
      description: "동일 external_id의 개정 이력 시계열"
      fields:
        - { name: id, type: UUID, required: true }
        - { name: regulation_id, type: reference, required: true, ref: Regulation }
        - { name: version_no, type: number, required: true }
        - { name: diff_summary, type: string, required: false, note: "LLM 1줄 요약" }
        - { name: snapshot_text, type: string, required: true }
        - { name: captured_at, type: date, required: true }
      relationships:
        - { target: Regulation, type: belongs_to }

    - name: ImpactAnalysis
      korean_name: 영향도 분석
      description: "LLM이 부서별 영향을 표준화 형식으로 산출 (시연 오프닝)"
      fields:
        - { name: id, type: UUID, required: true }
        - { name: regulation_id, type: reference, required: true, ref: Regulation }
        - { name: requested_by, type: reference, required: false, ref: UserCharacter }
        - { name: target_department, type: string, required: true, note: "MVP는 자유 텍스트, 시연: '리테일'" }
        - { name: severity, type: enum, required: true, values: [LOW, MEDIUM, HIGH] }
        - { name: summary, type: string, required: true }
        - { name: llm_model, type: string, required: true }
        - { name: token_usage, type: number, required: true }
        - { name: created_at, type: date, required: true }
      relationships:
        - { target: Regulation, type: belongs_to }
        - { target: Citation, type: has_many }
        - { target: UserCharacter, type: belongs_to }

    - name: Citation
      korean_name: 근거 인용
      description: "ImpactAnalysis 결론의 원문 근거 구절. hallucination 방지"
      fields:
        - { name: id, type: UUID, required: true }
        - { name: impact_analysis_id, type: reference, required: true, ref: ImpactAnalysis }
        - { name: regulation_id, type: reference, required: true, ref: Regulation }
        - { name: quoted_text, type: string, required: true }
        - { name: char_offset_start, type: number, required: true }
        - { name: char_offset_end, type: number, required: true }
        - { name: relevance_score, type: number, required: false, note: "BM25 점수" }
      relationships:
        - { target: ImpactAnalysis, type: belongs_to }
        - { target: Regulation, type: belongs_to }

    - name: Agent
      korean_name: 에이전트
      description: "nanobot 워크플로우 단위이자 deskrpg NPC. 추상 베이스"
      fields:
        - { name: id, type: UUID, required: true }
        - { name: agent_type, type: enum, required: true, values: [CRAWLER, IMPACT_ANALYZER] }
        - { name: display_name, type: string, required: true }
        - { name: sprite_asset_id, type: string, required: true, note: "deskrpg 픽셀 자산 키" }
        - { name: status, type: enum, required: true, values: [IDLE, WORKING, REPORTING, ERROR] }
        - { name: current_task_id, type: reference, required: false }
      relationships:
        - { target: CrawlJob, type: has_many }
        - { target: ImpactAnalysis, type: has_many }
        - { target: NPCReport, type: has_many }
        - { target: LLMUsageRecord, type: has_many }

    - name: CrawlerAgent
      korean_name: 크롤러 NPC
      description: "Agent의 구체 타입 — 별도 Python 서비스(scrapy/playwright)"
      fields:
        - { name: assigned_source_id, type: reference, required: true, ref: RegulationSource }
        - { name: poll_interval_minutes, type: number, required: true }
      relationships:
        - { target: Agent, type: has_one, note: "is_a (specialization)" }
        - { target: RegulationSource, type: belongs_to }

    - name: ImpactAnalyzerAgent
      korean_name: 분석 NPC
      description: "Agent의 구체 타입 — RAG(BM25) + LLM API"
      fields:
        - { name: rag_strategy, type: enum, required: true, values: [BM25, HYBRID] }
        - { name: llm_provider, type: enum, required: true, values: [OPENAI, CLAUDE] }
      relationships:
        - { target: Agent, type: has_one, note: "is_a (specialization)" }
        - { target: ImpactAnalysis, type: has_many }

    - name: UserCharacter
      korean_name: 사용자 캐릭터
      description: "deskrpg 입장 플레이어. 시연 시나리오 1인칭"
      fields:
        - { name: id, type: UUID, required: true }
        - { name: display_name, type: string, required: true }
        - { name: department, type: string, required: false }
        - { name: sprite_asset_id, type: string, required: true }
      relationships:
        - { target: ImpactAnalysis, type: has_many }
        - { target: NPCReport, type: has_many }
        - { target: DashboardFilter, type: has_many }

    - name: CrawlJob
      korean_name: 수집 작업
      description: "한 번의 폴링 사이클 실행 기록"
      fields:
        - { name: id, type: UUID, required: true }
        - { name: crawler_agent_id, type: reference, required: true, ref: CrawlerAgent }
        - { name: source_id, type: reference, required: true, ref: RegulationSource }
        - { name: started_at, type: date, required: true }
        - { name: finished_at, type: date, required: false }
        - { name: status, type: enum, required: true, values: [RUNNING, SUCCESS, FAILED] }
        - { name: items_found, type: number, required: false }
        - { name: parser_error, type: string, required: false }
      relationships:
        - { target: CrawlerAgent, type: belongs_to }
        - { target: RegulationSource, type: belongs_to }

    - name: NPCReport
      korean_name: NPC 보고
      description: "NPC가 사용자에게 in-world 전달하는 보고 (시각·청각)"
      fields:
        - { name: id, type: UUID, required: true }
        - { name: agent_id, type: reference, required: true, ref: Agent }
        - { name: user_character_id, type: reference, required: true, ref: UserCharacter }
        - { name: report_type, type: enum, required: true, values: [NEW_REGULATION, ANALYSIS_READY, ERROR] }
        - { name: payload_ref, type: string, required: true, note: "Regulation.id 또는 ImpactAnalysis.id" }
        - { name: visual_effect, type: string, required: true }
        - { name: audio_effect, type: string, required: true }
        - { name: created_at, type: date, required: true }
        - { name: acknowledged_at, type: date, required: false }
      relationships:
        - { target: Agent, type: belongs_to }
        - { target: UserCharacter, type: belongs_to }

    - name: Notification
      korean_name: 알림
      description: "RPG 맵 밖 fallback 알림 (앱 토스트/배지). MVP에서는 stretch"
      fields:
        - { name: id, type: UUID, required: true }
        - { name: regulation_id, type: reference, required: true, ref: Regulation }
        - { name: channel, type: enum, required: true, values: [IN_APP, TOAST, BADGE] }
        - { name: created_at, type: date, required: true }
        - { name: read_at, type: date, required: false }
      relationships:
        - { target: Regulation, type: belongs_to }

    - name: DashboardFilter
      korean_name: 대시보드 필터
      description: "AC-004의 4종 필터 상태"
      fields:
        - { name: id, type: UUID, required: true }
        - { name: user_character_id, type: reference, required: true, ref: UserCharacter }
        - { name: source_codes, type: string, required: false, note: "JSON array<string>" }
        - { name: change_types, type: string, required: false, note: "JSON array<enum>" }
        - { name: target_departments, type: string, required: false, note: "JSON array<string>" }
        - { name: date_from, type: date, required: false }
        - { name: date_to, type: date, required: false }
      relationships:
        - { target: UserCharacter, type: belongs_to }

    - name: VaultDocument
      korean_name: Vault 문서
      description: "Obsidian markdown vault 한 파일 — git sync 대상"
      fields:
        - { name: vault_path, type: string, required: true, note: "PK" }
        - { name: regulation_id, type: reference, required: true, ref: Regulation }
        - { name: frontmatter, type: string, required: true, note: "YAML 직렬화" }
        - { name: body_markdown, type: string, required: true }
        - { name: last_synced_at, type: date, required: true }
      relationships:
        - { target: Regulation, type: belongs_to }

    - name: LLMUsageRecord
      korean_name: LLM 사용량 기록
      description: "$100/2.5개월 예산 추적 (nanobot fork 커스텀)"
      fields:
        - { name: id, type: UUID, required: true }
        - { name: agent_id, type: reference, required: true, ref: Agent }
        - { name: provider, type: enum, required: true, values: [OPENAI, CLAUDE] }
        - { name: model, type: string, required: true }
        - { name: input_tokens, type: number, required: true }
        - { name: output_tokens, type: number, required: true }
        - { name: cost_usd, type: number, required: true }
        - { name: cached, type: boolean, required: true }
        - { name: created_at, type: date, required: true }
      relationships:
        - { target: Agent, type: belongs_to }

  actions:
    - name: crawlRegulationSource
      korean_name: 규제 소스 크롤링
      actor: CrawlerAgent
      input: "RegulationSource + poll_interval_minutes"
      output: "신규/개정 Regulation 목록 + CrawlJob 기록"
      side_effects:
        - "VaultDocument 신규 생성"
        - "SQLite Regulation/RegulationVersion insert"
        - "신규 발견 시 NPCReport(NEW_REGULATION) 생성"
        - "parser_error 시 알림 트리거 (Flexible Parser)"

    - name: classifyChangeType
      korean_name: 신규/개정 분류
      actor: System(Logic)
      input: "신규 발견 Regulation 후보 + 기존 RegulationVersion 이력"
      output: "change_type ∈ {NEW, AMENDED}"
      side_effects:
        - "AMENDED 시 RegulationVersion 추가 + diff_summary(LLM 1줄) 산출"

    - name: analyzeImpact
      korean_name: 영향도 분석
      actor: ImpactAnalyzerAgent
      input: "Regulation + target_department"
      output: "ImpactAnalysis + Citation 목록"
      side_effects:
        - "LLM API 호출 (OpenAI/Claude)"
        - "LLMUsageRecord 적재"
        - "NPCReport(ANALYSIS_READY) 생성"
        - "BM25 인덱스 조회"

    - name: askAnalystNPC
      korean_name: 분석 NPC에게 질문
      actor: UserCharacter
      input: "자연어 질문 (예: '리테일 영향')"
      output: "ImpactAnalysis 응답 (in-world 말풍선)"
      side_effects:
        - "analyzeImpact 트리거"
        - "NPCReport 생성"

    - name: enterDashboard
      korean_name: 대시보드 입장
      actor: UserCharacter
      input: "사용자 세션"
      output: "RPG 맵 렌더 + 활성 NPC + Pending NPCReport"
      side_effects:
        - "deskrpg 씬 초기화"

    - name: applyFilter
      korean_name: 필터 적용
      actor: UserCharacter
      input: "DashboardFilter (≥4종)"
      output: "필터링된 Regulation 목록 (카드/타임라인)"
      side_effects: []

    - name: syncVaultToGit
      korean_name: Vault git 동기화
      actor: System(Data)
      input: "변경된 VaultDocument 집합"
      output: "git commit + push (private repo)"
      side_effects:
        - "팀원 vault에 변경 전파"

    - name: parseFlexible
      korean_name: 유연 파싱
      actor: CrawlerAgent
      input: "원본 HTML + parser_config"
      output: "구조화 Regulation 후보"
      side_effects:
        - "파싱 실패 시 parser_error 기록 + 알림"

    - name: acknowledgeReport
      korean_name: NPC 보고 확인
      actor: UserCharacter
      input: "NPCReport id"
      output: "acknowledged 상태 전이"
      side_effects:
        - "시각·청각 효과 종료"

    - name: trackLLMUsage
      korean_name: LLM 사용량 추적
      actor: System(nanobot fork)
      input: "LLM API 호출 응답 (토큰·모델)"
      output: "LLMUsageRecord + 누적 cost_usd"
      side_effects:
        - "예산 임계치($40 누적) 초과 시 경고"

  # 동의어 정규화 표 — 인터뷰·차터에서 같은 개념의 다양한 표현
  synonyms:
    - { canonical: Regulation, aliases: [규제, 규정, 공시, 규제 변동, 규제 항목] }
    - { canonical: RegulationSource, aliases: [규제 소스, 소스, 게시판 출처] }
    - { canonical: ImpactAnalysis, aliases: [영향도 분석, 영향도, 영향 분석 결과] }
    - { canonical: ImpactAnalyzerAgent, aliases: [분석 NPC, 영향도 분석기, RAG agent, analyzer] }
    - { canonical: CrawlerAgent, aliases: [크롤러 NPC, 수집 NPC, 크롤러, 크롤링 엔진, scraper] }
    - { canonical: Agent, aliases: [에이전트, NPC, nanobot agent] }
    - { canonical: UserCharacter, aliases: [사용자, 플레이어, 사용자 캐릭] }
    - { canonical: Citation, aliases: [근거 인용, 근거 구절, 근거 문구] }
    - { canonical: NPCReport, aliases: [NPC 보고, in-world 보고, 말풍선 보고] }
    - { canonical: VaultDocument, aliases: [Obsidian 문서, vault 파일, markdown 원문] }
    - { canonical: DashboardFilter, aliases: [필터, 필터링 조건] }
    - { canonical: RegulationVersion, aliases: [개정 이력, 버전, 변경 이력] }
    - { canonical: change_type=NEW, aliases: [신규, new] }
    - { canonical: change_type=AMENDED, aliases: [개정, amended, 변경] }
    - { canonical: LLMUsageRecord, aliases: [LLM 사용량, 토큰 사용량, 비용 기록] }

# ─────────────────────────────────────────────────────────────────────
# Architecture — 3-tier (ARCHITECTURE_INVARIANTS.md Part 1 준수)
# ─────────────────────────────────────────────────────────────────────
architecture:
  pattern: "3-tier-layered"

  layers:
    presentation:
      description: "Next.js + TypeScript (deskrpg fork) — RPG UI · 대시보드 · NPC 조종"
      directories:
        - "frontend/app"          # Next.js app router
        - "frontend/components"   # React 컴포넌트 + deskrpg UI
        - "frontend/scenes"       # RPG 맵 · NPC 스프라이트 렌더
        - "frontend/lib/api"      # 백엔드 호출 클라이언트
      responsibilities:
        - "RPG 맵 렌더 (deskrpg 픽셀 자산)"
        - "사용자 입력 처리 (캐릭터 이동·NPC 클릭·말풍선)"
        - "대시보드 카드·필터·타임라인 UI"
        - "NPCReport 시각·청각 효과 재생"
        - "Obsidian vault 원문 임베드 또는 외부 링크"
      cannot_access:
        - "database"
        - "external_services (LLM API, 크롤링 대상)"
        - "Obsidian vault 파일시스템 직접 접근"

    logic:
      description: "Python (nanobot fork + 별도 Crawler 서비스) — Agent 워크플로우 · 영향도 · RAG"
      directories:
        - "backend/nanobot"            # nanobot fork 본체
        - "backend/agents"             # CrawlerAgent · ImpactAnalyzerAgent
        - "backend/services/impact"    # analyzeImpact + Citation 추출
        - "backend/services/rag"       # BM25 인덱스 + 검색
        - "backend/services/llm"       # LLM 호출 + LLMUsageRecord
        - "crawler"                    # 별도 서비스 (scrapy/playwright)
      responsibilities:
        - "Agent 워크플로우 오케스트레이션"
        - "신규/개정 분류 (classifyChangeType)"
        - "영향도 분석 + Citation 생성"
        - "RAG (BM25 우선, pgvector stretch)"
        - "Flexible Parser + 파싱 실패 알림"
        - "LLM 사용량 추적 (예산 가드)"
      cannot_access:
        - "Next.js Presentation 코드 import 금지"

    data:
      description: "SQLite + Obsidian markdown vault (git sync, private repo)"
      directories:
        - "backend/data/sqlite"          # SQLite 파일 + 마이그레이션
        - "backend/data/repositories"    # Repository 패턴 구현
        - "vault/"                       # Obsidian vault (gitignore 후 별도 private repo sync)
      responsibilities:
        - "SQLite CRUD (Regulation·Version·ImpactAnalysis·Citation 등)"
        - "VaultDocument markdown 파일 read/write"
        - "git commit + push (private repo)"
        - "BM25 인덱스 영속화"
        - "LLMUsageRecord 적재"
      cannot_access:
        - "presentation"

  layer_communication:
    presentation_to_logic: "REST/HTTP + WebSocket (deskrpg ↔ nanobot)"
    logic_to_data: "Repository 패턴 (Python) — DTO/Domain Model 분리"
    data_format: "DTO (Python dataclass / TypeScript interface)"
    notes:
      - "Crawler 서비스는 nanobot과 message queue 또는 직접 HTTP로 통신"
      - "WebSocket은 NPCReport 푸시 (in-world 실시간 보고)"

# ─────────────────────────────────────────────────────────────────────
# Scope — MVP / Future
# ─────────────────────────────────────────────────────────────────────
scope:
  mvp:
    - "FSS 보도·규정·해설 게시판 크롤러 (1개 소스 end-to-end)"
    - "신규/개정 자동 분류"
    - "LLM 영향도 분석 (Citation 포함)"
    - "deskrpg fork RPG 대시보드 (캐릭터·NPC 2종·필터 4종·타임라인)"
    - "Obsidian markdown vault 저장 + git sync (private)"
    - "시연 시나리오 4단계 (AC-005)"
    - "4개 소스(BOK/FSC/국회·관보/BCBS) 인터페이스 stub + mock 1건"
    - "LLM 사용량 추적 + $40 임계 경고"
    - "GitHub Actions CI + .harness/gates default 통과"

  future:
    - "BOK/FSC/국회·관보/BCBS 본격 크롤러 구현"
    - "BCBS 영문 본문 번역 자동화"
    - "Vector DB (pgvector) 의미 검색"
    - "Notification 채널 확장 (이메일/Slack)"
    - "픽셀 아트 자산 신규 제작 (NPC 스프라이트·맵 타일)"
    - "RegulationVersion 텍스트 diff (현재는 LLM 1줄 요약)"
    - "Agent 타입 확장 (요약 NPC·디스패처 NPC)"
    - "부서(target_department) enum 정규화 + 부서별 영향도 매트릭스"
    - "프로덕션 운영 (멀티 테넌트·권한·SSO·audit)"
    - "모바일 반응형 UI"
    - "Notification ↔ NPCReport 듀얼 채널 (RPG 맵 밖 fallback)"

# ─────────────────────────────────────────────────────────────────────
# Tech Decisions — 결정과 이유
# ─────────────────────────────────────────────────────────────────────
tech_decisions:
  - decision: "Python nanobot fork를 Logic 레이어 백본으로 채택"
    reason: "Agent 워크플로우 + MCP + 다채널 전송 + 메모리 등 RegTrack 핵심 요구를 거의 다 충족. 처음부터 짜는 비용 절감"
    alternatives_considered:
      - "FastAPI + LangGraph 직접 구성 (자유도 ↑, 일정 risk ↑)"
      - "OpenAI Assistants API (벤더 lock-in)"

  - decision: "Next.js + TypeScript (deskrpg fork)를 Presentation 채택"
    reason: "wow 모먼트(픽셀 RPG NPC 보고)의 핵심. 자체 구현 시 12주 안에 불가"
    alternatives_considered:
      - "Streamlit (시연 효과 ↓, 시간 ↑ 절약)"
      - "deskrpg embed only (시연 셸로만 사용)"

  - decision: "Crawler를 nanobot과 분리한 별도 Python 서비스(scrapy/playwright)"
    reason: "스케줄·재시도·브라우저 자동화 패턴이 nanobot agent 모델과 다름. 분리 시 운영 단순화"
    alternatives_considered:
      - "nanobot agent 안에 scraper 통합"
      - "Cloudflare Workers 등 외부 크롤링"

  - decision: "Data 레이어: SQLite + Obsidian markdown vault (PostgreSQL/pgvector 제거)"
    reason: "시연용 데이터량 적고 단일 노트북 배포. vault는 git sync로 팀 공유 자연스러움"
    alternatives_considered:
      - "PostgreSQL + pgvector (운영 복잡도 ↑)"
      - "Vault만 사용 (메타 쿼리 어려움)"

  - decision: "RAG는 BM25부터 (pgvector는 stretch)"
    reason: "$100 예산에서 임베딩 비용·인프라 비용 부담. BM25는 한국어 형태소 분석기로 충분"
    alternatives_considered:
      - "pgvector + OpenAI embeddings (비용 ↑)"
      - "Qdrant/Weaviate 외부 서비스"

  - decision: "LLM은 OpenAI/Claude API만 (자체 호스팅 X)"
    reason: "예산·일정·인프라 부담 회피. Citation 기반 hallucination 통제로 충분"
    alternatives_considered:
      - "Llama 3 자체 호스팅 (GPU 비용)"
      - "Bedrock/Vertex (벤더 lock-in)"

  - decision: "Obsidian vault git sync + private repo 강제"
    reason: "팀원 공유 + 버전 관리 + Obsidian 자체가 KB 브라우저로 활용. 단 민감 본문 노출 방지를 위해 private 강제"
    alternatives_considered:
      - "Obsidian Sync 유료 서비스"
      - "vault를 데이터베이스로만 (사람 검색 ↓)"

  - decision: "협업: feature → dev/nanobot → main 마일스톤 머지"
    reason: "4명 팀 + base repo 이미 dev/nanobot 브랜치 활용 중"
    alternatives_considered:
      - "trunk-based (작은 팀에 부담)"
      - "git flow (12주에 과도)"

  - decision: "12주 광기 수용 — 양보 우선순위 명시 X (사용자 결정)"
    reason: "사용자 명시적 선언. 다만 마일스톤 슬립 시 재논의 트리거를 Risk Register에 적시"
    alternatives_considered:
      - "양보 순서: 4개 소스 인터페이스 → deskrpg 고급 자산 → RAG 고도화"

# ─────────────────────────────────────────────────────────────────────
# Validation — Seed Architect 자가 검증 결과
# ─────────────────────────────────────────────────────────────────────
validation:
  goal_summary_clear: true            # ✅ 한 문장
  must_constraints: 14                # ✅ ≥1
  must_not_constraints: 8             # ✅ ≥1
  acceptance_criteria_count: 10       # ✅ ≥2
  ac_all_testable: true               # ✅ verification 명시
  ac_all_have_complexity: true        # ✅ low/medium/high 명시
  ontology_entity_count: 15           # ✅ ≥1
  mvp_scope_defined: true             # ✅ 9 항목
  no_tbd_placeholders: true           # ✅ TODO/TBD 없음

  ac_complexity_distribution:
    low: 3      # AC-004, AC-007, AC-010
    medium: 4   # AC-002, AC-006, AC-008, AC-009
    high: 3     # AC-001, AC-003, AC-005

# ─────────────────────────────────────────────────────────────────────
# Resolved Ambiguities — 인터뷰에서 풀리지 않은 8개를 immutable 결정으로 박음
# ─────────────────────────────────────────────────────────────────────
resolved_ambiguities:
  - issue: "픽셀 아트 자산 제작 책임자 미정"
    decision: "MVP는 deskrpg 기본 자산 재활용 + 색상·이름 변경만. 신규 자산 제작은 future."
  - issue: "부서(target_department) 분류 체계 미정"
    decision: "MVP는 자유 텍스트(시연: '리테일'). enum 정규화는 future."
  - issue: "RegulationVersion diff 산출 방식 미정"
    decision: "MVP는 LLM 1줄 요약. 텍스트 diff는 future."
  - issue: "4개 소스 interface_only 증명 경계 미정"
    decision: "코드 stub + mock 데이터 1건/소스 (총 4건) — AC-007에서 검증."
  - issue: "Notification vs NPCReport 트리거 관계 미정"
    decision: "MVP는 NPCReport만. Notification은 future."
  - issue: "Obsidian vault git sync 보안 경계 미정"
    decision: "Private repo 강제. PRD에 보안 정책 명시."
  - issue: "BCBS(영문) 처리 미정"
    decision: "MVP는 RegulationSource.language=EN 메타만 등록. 번역은 future."
  - issue: "Agent 타입 확장 함의 미정"
    decision: "MVP는 CRAWLER + IMPACT_ANALYZER 2개만. 추가 타입은 future."
