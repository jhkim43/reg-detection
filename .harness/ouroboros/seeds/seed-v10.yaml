# ─────────────────────────────────────────────────────────────────────
# Technical Decisions (D-23 ~ D-30, v9의 D-22까지 이어서)
# ─────────────────────────────────────────────────────────────────────
tech_decisions:
  - decision: "D-23: task/sub-agent event는 nanobot이 원천 (push 모델)"
    reason: |
      v9까지의 LLM 응답 본문 parsing 흐름은 LLM이 형식을 빠뜨릴 때 등록 누락
      (smoke test에서 실제 발생). nanobot의 agent loop이 tool을 실제로 실행
      하는 시점이 유일하게 정확한 trigger이므로 그 시점에 deskrpg에 push하는
      모델로 전환.
    alternatives_considered:
      - "Pull 모델 (deskrpg가 nanobot에 GET 폴링) — polling cost + 지연 + race"
      - "Hybrid (push 1st-class + parser fallback) — 결정 사항 단순화 우선 reject"

  - decision: "D-24: chat history의 canonical source = PostgreSQL chat_messages"
    reason: |
      DB가 영속성·UI 쿼리·NPC 삭제 cascade에 최적. nanobot session jsonl은
      nanobot agent loop의 working set이라 nanobot이 자체 관리하되 NPC 삭제
      시 deskrpg가 cleanup endpoint로 정리 trigger.
    alternatives_considered:
      - "nanobot jsonl을 canonical로 — UI 쿼리 비효율 + DB cascade 못 씀"
      - "Dual write 그대로 유지 — 누구 정리하나 모호, NPC 삭제 시 누수"

  - decision: "D-25: sub-agent 권한 = parent_agent_id FK + cascade"
    reason: |
      사용자 hire NPC와 nanobot spawn sub-agent를 명확히 구분. parent 삭제 시
      자식도 같이 정리 (orphan 방지). 사용자가 sub-agent를 직접 삭제 못 함
      (lifecycle은 parent agent만 제어).
    alternatives_considered:
      - "동등 1급 시민 (구분 X) — orphan 위험 + 사용자가 자율형 child를 임의 삭제 가능"
      - "별 sub_agents 테이블 — JOIN 복잡, 본질적으로 같은 NPC 모델"

  - decision: "D-26: agentId 발급자 = nanobot"
    reason: |
      nanobot이 자신의 agent 식별자를 자유롭게 정함 → deskrpg는 그 ID를 그대로
      받아 npcs.openclawConfig.agentId에 저장. mapping table 불필요. nanobot
      입장에서 self-consistent, debug 시 ID 한 종류만 추적.
    alternatives_considered:
      - "deskrpg가 발급 (nanobot 미리 요청 후 ID 받음) — round-trip 비용 + 두 ID mapping 추적"

  - decision: "D-27: internal endpoint 인증 = INTERNAL_RPC_SECRET (x-deskrpg-internal-secret 헤더)"
    reason: |
      nanobot은 server-to-server 호출이라 user-auth(x-user-id) 부적합. 기존
      /api/internal/llm-usage 패턴 재사용. ownerUserId/channelId는 body로 명시
      전달.
    alternatives_considered:
      - "기존 /api/npcs를 x-user-id 헤더로 호출 — nanobot이 사용자 UUID 알아야 함, brittle"
      - "mTLS — 인프라 복잡 + 본 cycle scope 외"

  - decision: "D-28: chatSend body.metadata로 user context 명시 전달"
    reason: |
      현재 session_id에 userUUID가 임베드되어 있으나 (ot-{ch8}-{agentId}-dm-{user})
      meeting/poll/summary 타입에선 마지막 segment가 user 아님. type별 분기 brittle.
      body.metadata 필드로 structured 전달이 모든 type 통일 + 확장성.
    alternatives_considered:
      - "session_id parse (단기 우회) — brittle, meeting 흐름 미지원"
      - "HTTP 헤더로 (x-deskrpg-user-id 등) — body가 더 structured"

  - decision: "D-29: NPC 삭제 cleanup = 즉시 push (deskrpg → nanobot cleanup endpoint)"
    reason: |
      cron sweep은 지연(N분) + 데이터 누수 위험. NPC 삭제 시점에 deskrpg가
      nanobot에 즉시 알리면 정합성 명확. best-effort (실패해도 NPC 삭제는 진행
      — silent-fail).
    alternatives_considered:
      - "nanobot 측 cron sweep — 지연, nanobot이 deskrpg DB poll해야"
      - "Hybrid (push + cron backup) — 코드 두 곳, Phase 5+에서 도입 검토"
      - "정리 안 함 — 디스크 누수, 운영 위생 X"

  - decision: "D-30: ToolExecutionEvent shape를 stable contract로 문서화"
    reason: |
      다른 팀원(nanobot fork)와 본인(deskrpg)이 별 PR로 parallel 작업 가능
      해지려면 API contract가 미리 fixed되어야 함. OpenAPI 또는 markdown spec
      으로 단일 진실원천 유지.
    alternatives_considered:
      - "TypeScript type만으로 — Python(nanobot) 쪽에서 사용 어려움"
      - "Protobuf — overkill, JSON으로 충분"

