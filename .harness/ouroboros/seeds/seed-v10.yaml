post_creation_amendments: []

# ─────────────────────────────────────────────────────────────────────
# Goal — north star
# ─────────────────────────────────────────────────────────────────────
goal:
  summary: |
    자율형 agent(nanobot)가 무엇을 하는지 사용자가 deskrpg UI에서 본다 — task
    생성/진행/완료, sub-agent spawn/종료를 nanobot이 원천(source of truth)으로
    push하고 deskrpg가 UI 가시화 + lifecycle 관리.

  detail: |
    seed-v9까지 deskrpg는 nanobot이 응답한 본문에 박힌 ```json:task``` 코드블록을
    정규식으로 parse하여 task를 등록했고, NPC의 system prompt에 task protocol을
    매번 prepend (withTaskReminder, injectTaskPrompt) 하여 LLM에게 형식을 강제했다.
    구조적 결함:
      (1) LLM이 형식을 빠뜨리면 task 등록 누락 (parser miss, 2026-05-19 smoke
          test: "등록해" 2회 → 1건만 반영)
      (2) reasoning 모델(qwen3.6-35b-a3b 등)에서 task block 출력에 LLM의
          출력 예산을 낭비 → 자연어 응답이 빈 박스로 보이는 UX 결함
      (3) 본문 prepend로 인한 매 turn 200~700 tokens 누적 → 응답 지연
      (4) sub-agent 흐름이 아예 부재 — nanobot이 자체적으로 child agent를
          spawn해도 deskrpg UI에는 안 보임

    seed-v10은 이 흐름을 뒤집는다:
      - **nanobot이 원천**: tool execution event(시작/진행/완료/중단)와
        sub-agent lifecycle(spawn/delete)을 nanobot이 deskrpg internal API로 push
      - **deskrpg는 수신 + UI 렌더링**: legacy task-parser/withTaskReminder/
        injectTaskPrompt 흐름 전체 제거 → 자연어 응답만 chat_messages 적재
      - **observability 우선**: 사용자가 board(task tab) + 맵(NPC) 둘 다에서
        agent 활동을 실시간 본다

  non_goals:
    - "nanobot fork 자체를 deskrpg가 대체 — 본 cycle은 push contract만 정의"
    - "qwen reasoning 모델 자체의 응답 속도 개선 — Candidate 4로 트래킹"
    - "multimodal chat input(이미지/PDF) 지원 — Candidate 2로 트래킹"
    - "chat history의 모든 메시지를 nanobot이 매 호출마다 DB에서 reload — 본 cycle은 PostgreSQL을 canonical로 두되 nanobot session jsonl은 ephemeral cache로 유지"
    - "기존 NPC 사용자 hire 흐름(POST /api/npcs) 폐기 — 사용자 hire와 sub-agent 둘 다 공존"

# ─────────────────────────────────────────────────────────────────────
# Constraints
# ─────────────────────────────────────────────────────────────────────
constraints:
  must:
    - "nanobot이 task 생성/진행/완료/중단 event의 단일 source of truth가 된다 (LLM 응답 본문 parsing 의존 금지)"
    - "deskrpg internal endpoint는 INTERNAL_RPC_SECRET 헤더(`x-deskrpg-internal-secret`) + body의 ownerUserId/channelId로 인증·식별 — `x-user-id` 헤더 불요"
    - "sub-agent의 agentId는 nanobot이 발급 (deskrpg는 그 ID를 그대로 npcs.openclawConfig.agentId에 저장, mapping table 불필요)"
    - "sub-agent NPC는 npcs.parent_agent_id FK로 parent 추적, parent 삭제 시 ON DELETE CASCADE"
    - "chat_messages 테이블이 chat 본문의 canonical source — nanobot session jsonl은 ephemeral cache (NPC 삭제 시 cleanup endpoint로 정리)"
    - "deskrpg → nanobot chatSend body.metadata 필드로 user 식별 정보 전달: {user_id, character_id, channel_id, parent_npc_id?}. nanobot은 이 metadata를 session 단위로 저장 후 push 시점에 internal endpoint body에 그대로 forward"
    - "NPC 삭제 시 deskrpg가 nanobot cleanup endpoint를 명시 호출 — sessions/api_*.jsonl + .token.json + workspace-${agentId} 삭제 (silent-fail 허용, chat 흐름 비차단)"
    - "legacy task 흐름 완전 제거 — task-parser.js / task-prompt.js의 withTaskReminder + buildTaskReminder / server.js의 parseNpcResponse 호출 전체 삭제"
    - "본 cycle = parallel-change 흐름의 migrate 단계 — expand는 phase 4.5에서 완료됨 (cancel endpoint + DB tracking + Option A)"
    - "task가 실행 중일 때 사용자 abort → nanobot이 _cancel_active_tasks로 in-flight tool 중단 (phase 4.5에서 인프라 안착) + nanobot cancel hook이 task event status='cancelled' push (다른 팀원 작업) → deskrpg가 board UI 즉시 반영. cancel granularity는 session 단위 (개별 tool granular cancel은 nanobot 미지원, 본 cycle 수용)"

  must_not:
    - "LLM 응답 본문에서 task action을 정규식 parsing (task-parser.js 흐름 부활 금지)"
    - "매 user 메시지에 task protocol reminder prepend (withTaskReminder 부활 금지)"
    - "NPC persona의 Identity 문서에 task protocol 본문 prepend (injectTaskPrompt 부활 금지 — 단 short hint 1~2줄은 허용 검토)"
    - "sub-agent NPC를 사용자가 직접 hire/delete (UI에서 hire 모달이 sub-agent type을 노출하면 안 됨 — parent agent만 lifecycle 제어)"
    - "nanobot session jsonl을 chat history의 canonical로 사용 (deskrpg UI 표시용 메시지는 항상 PostgreSQL chat_messages 기반)"
    - "internal endpoint를 사용자 인증(x-user-id)으로 노출 — internal-secret 전용"
    - "nanobot이 발급한 agentId를 deskrpg가 재발급(별 UUID로 변환)하여 매핑"

  should:
    - "tool execution event push 실패 시 nanobot 측에서 at-least-once retry — deskrpg internal endpoint는 npcTaskId(idempotency key)로 dedup"
    - "sub-agent NPC는 일반 NPC와 시각 구분되는 UI 마크 (예: 🤖 뱃지 또는 별 sprite 톤) — 사용자가 자율형 child임을 인식 가능"
    - "Candidate 4 (qwen reasoning_content forward)는 backlog로 트래킹 — seed-v10 backlog-1/2/3 머지 후 자연 해소 검증 → 잔존 시 별 PR"
    - "다른 팀원(nanobot fork)과 본인(deskrpg)의 작업은 API contract만 명확하면 parallel 진행 가능"

# ─────────────────────────────────────────────────────────────────────
# Acceptance Criteria
# ─────────────────────────────────────────────────────────────────────
acceptance_criteria:
  - id: "AC-001"
    description: |
      deskrpg에 `POST /api/internal/tasks` endpoint 신설. `INTERNAL_RPC_SECRET`
      헤더 인증. body: {channelId, npcId, npcTaskId, title, summary?, status,
      assignerCharacterId, ownerUserId, action: "create"|"update"|"complete"|
      "cancel"}. action별 적절한 DB op (insert / update set status). npcTaskId
      idempotency key로 중복 호출 방지.
    verification: "automated"
    priority: "must"
    complexity: "medium"

  - id: "AC-002"
    description: |
      deskrpg에 `POST /api/internal/npcs` (sub-agent create) + `DELETE
      /api/internal/npcs/{id}` (sub-agent delete) endpoint 신설.
      INTERNAL_RPC_SECRET 인증. body: {ownerUserId, channelId, name, agentId
      (nanobot 발급), parentAgentId, identity, soul, appearance?, position?}.
      nanobot이 발급한 agentId를 그대로 npcs.openclawConfig.agentId로 저장.
    verification: "automated"
    priority: "must"
    complexity: "medium"

  - id: "AC-003"
    description: |
      legacy task 흐름 완전 제거: `task-parser.js`(parseNpcResponse,
      isValidTaskAction) 파일 삭제 + `task-prompt.js`의 withTaskReminder /
      buildTaskReminder 제거 + server.js의 호출처(L303/372/375/734/742/843)
      단순화. NPC 응답 본문은 그대로 chat_messages에 적재, task action은 별
      channel(push)로만 처리.
    verification: "both"
    priority: "must"
    complexity: "medium"

  - id: "AC-004"
    description: |
      `injectTaskPrompt` + `buildTaskCorePrompt` 제거 검토. NPC persona의
      Identity에서 task protocol 본문(~500 tokens 1회) 빠짐. 단순 hint 1~2줄
      (예: "사용자가 업무 지시 시 nanobot이 자동으로 task 등록한다") 정도는
      유지 가능. 결정은 /trd 단계에서.
    verification: "manual"
    priority: "should"
    complexity: "low"

  - id: "AC-005"
    description: |
      Drizzle migration 신설: `npcs.parent_agent_id` 컬럼 추가 (text, nullable,
      ON DELETE CASCADE references npcs.id). NULL이면 사용자가 hire한 일반 NPC,
      NOT NULL이면 sub-agent. schema.ts + server-db.js (CJS PostgreSQL + SQLite
      모두 + ensureSqliteCompatibility) parity. 인덱스 idx_npcs_parent_agent_id.
    verification: "automated"
    priority: "must"
    complexity: "low"

  - id: "AC-006"
    description: |
      deskrpg `nanobot-client.js` chatSend가 nanobot HTTP body에 metadata 필드
      포함: {user_id, character_id, channel_id, parent_npc_id?}. nanobot이 이
      metadata를 session 메모리에 저장 후 push 시점에 internal endpoint body로
      forward 가능. deskrpg 측은 body schema 확장 + server.js에서 metadata 인자
      추가 + nanobot-client.js buildNanobotRequestBody에 metadata field 처리.
    verification: "automated"
    priority: "must"
    complexity: "low"

  - id: "AC-007"
    description: |
      NPC 삭제 시 deskrpg가 nanobot 측 cleanup endpoint
      `POST /v1/agents/{agentId}/cleanup`을 명시 호출. nanobot이 sessions/api_*.jsonl
      + .token.json + workspace-${agentId} 파일을 일괄 정리. deskrpg 측은
      best-effort (network err 비치명, chat 흐름 비차단). nanobot 측 endpoint
      신설은 다른 팀원 작업. deskrpg는 cleanup helper(postNanobotAgentCleanup)
      추가 + DELETE /api/npcs/[id] 흐름에서 호출.
    verification: "automated"
    priority: "must"
    complexity: "medium"

  - id: "AC-008"
    description: |
      sub-agent NPC가 UI에 동적으로 등장/사라짐. 맵에서 일반 NPC와 시각적으로
      구분 (🤖 뱃지 또는 별 sprite tint). 사용자는 sub-agent를 직접 hire 못 함
      (NpcHireModal에 sub-agent 옵션 노출 X). 사용자는 sub-agent와 대화는 가능
      하나 lifecycle 제어는 parent agent (또는 nanobot)만 수행.
    verification: "both"
    priority: "should"
    complexity: "medium"

  - id: "AC-009"
    description: |
      legacy 흐름 제거 후 prompt_tokens 측정: 깨끗한 NPC와 14턴 대화에서
      누적 prompt_tokens가 phase 4.5(Option A 후) baseline ~12000~15000 →
      v10 적용 후 ~6500~9000으로 추가 감소 확인. (withTaskReminder ~200
      tokens × N + injectTaskPrompt ~500 tokens × 1 절감 추정)
    verification: "manual"
    priority: "should"
    complexity: "low"

  - id: "AC-010"
    description: |
      tool execution event push contract 정의: nanobot이 deskrpg에 보낼 event
      shape를 docs/api/internal-tasks-events.md (또는 OpenAPI 스펙)으로 명문화.
      다른 팀원(nanobot fork) + 본인(deskrpg)이 같은 contract 참조. event
      status: "started" | "progressing" | "completed" | "cancelled". optional
      metadata: timing, error_message, partial_result_summary.
    verification: "manual"
    priority: "must"
    complexity: "low"

# ─────────────────────────────────────────────────────────────────────
# Ontology — 도메인 모델
# ─────────────────────────────────────────────────────────────────────
ontology:
  entities:
    - name: "NPC"
      table: "npcs"
      fields:
        - { name: "id", type: "uuid", required: true }
        - { name: "channelId", type: "uuid (reference Channel)", required: true }
        - { name: "name", type: "string", required: true }
        - { name: "appearance", type: "jsonb", required: true }
        - { name: "openclawConfig", type: "jsonb (agentId, personaConfig, sessionKeyPrefix, locale)", required: true }
        - { name: "parentAgentId", type: "string nullable (NEW v10)", required: false }
        - { name: "positionX", type: "int", required: true }
        - { name: "positionY", type: "int", required: true }
      relationships:
        - { target: "Channel", type: "belongs_to" }
        - { target: "ChatMessage", type: "has_many (cascade)" }
        - { target: "Task", type: "has_many (cascade)" }
        - { target: "NanobotAgentSession", type: "has_many (cascade, phase 4)" }
        - { target: "NPC (self via parent_agent_id)", type: "has_many sub-agents" }

    - name: "Task"
      table: "tasks"
      fields:
        - { name: "id", type: "uuid", required: true }
        - { name: "channelId", type: "uuid (reference Channel)", required: true }
        - { name: "npcId", type: "uuid (reference NPC)", required: true }
        - { name: "assignerId", type: "uuid (reference Character)", required: true }
        - { name: "npcTaskId", type: "string (nanobot 발급 idempotency key)", required: true }
        - { name: "title", type: "string", required: true }
        - { name: "summary", type: "text", required: false }
        - { name: "status", type: "enum (backlog|in_progress|completed|cancelled)", required: true }
      relationships:
        - { target: "NPC", type: "belongs_to" }
        - { target: "Channel", type: "belongs_to" }
      note: "v10에서 row 생성·갱신은 100% /api/internal/tasks를 통해서만 (nanobot push)"

    - name: "ChatMessage"
      table: "chat_messages"
      fields:
        - { name: "id", type: "uuid", required: true }
        - { name: "characterId", type: "uuid (reference Character)", required: true }
        - { name: "npcId", type: "uuid (reference NPC)", required: true }
        - { name: "role", type: "enum (user|assistant)", required: true }
        - { name: "content", type: "text (raw 자연어, task block 제거 X)", required: true }
      relationships:
        - { target: "NPC", type: "belongs_to" }
        - { target: "Character", type: "belongs_to" }
      note: "v10에서 canonical source. content는 LLM 자연어 응답 그대로 (task-parser sanitize 제거)"

    - name: "NanobotSession (ephemeral cache)"
      storage: "filesystem (~/.nanobot/api-workspace/sessions/api_{sessionKey}.{jsonl|token.json})"
      lifecycle: "nanobot이 첫 chat 시 자동 생성, NPC 삭제 시 cleanup endpoint로 deskrpg가 명시 정리 (AC-007)"
      role: "nanobot agent loop의 working set — LLM prompt 재구성용. UI 표시용 X."

    - name: "ToolExecutionEvent"
      shape: |
        {
          event_type: "task" | "sub_agent",
          action: "create" | "update" | "complete" | "cancel",
          status: "started" | "progressing" | "completed" | "cancelled",
          npc_id: uuid,
          npc_task_id?: string (task event only),
          agent_id?: string (sub_agent event only),
          parent_agent_id?: string,
          metadata: {
            user_id, character_id, channel_id,
            timing: {started_at, completed_at?},
            error_message?
          }
        }
      transport: "POST /api/internal/tasks 또는 /api/internal/npcs (event_type별)"
      role: "nanobot → deskrpg push 이벤트의 단일 stable shape (AC-010)"

  actions:
    - name: "send_chat (사용자 → NPC)"
      actor: "user (via deskrpg UI)"
      input: "message text + npcId"
      output: "NPC 자연어 응답 stream"
      side_effects:
        - "chat_messages 2 rows insert (user + assistant)"
        - "nanobot이 자동으로 tool 실행 시 → tool_execution_event push"
        - "(필요시) sub-agent spawn event push"

    - name: "push_task_event (nanobot → deskrpg)"
      actor: "nanobot agent loop emission hook (다른 팀원 작업)"
      input: "ToolExecutionEvent + INTERNAL_RPC_SECRET"
      output: "tasks 테이블 row 생성/갱신"
      side_effects:
        - "socket.io 'task:event' broadcast → UI 즉시 업데이트"

    - name: "spawn_sub_agent (nanobot → deskrpg)"
      actor: "nanobot agent loop"
      input: "{ownerUserId, channelId, parentAgentId, agentId, name, identity, soul}"
      output: "npcs row 생성 + UI에 NPC 등장"
      side_effects:
        - "deskrpg가 writeNanobotAgentFiles로 mirror 작성 (T-F03 helper 재사용)"
        - "socket.io 'npc:spawned' broadcast"

    - name: "delete_npc (사용자 또는 cascade)"
      actor: "user (UI) 또는 cascade(parent_agent_id ON DELETE)"
      input: "npcId"
      output: "npcs row 삭제 + 자식 sub-agents cascade"
      side_effects:
        - "PostgreSQL: chat_messages, tasks, nanobot_agent_sessions cascade"
        - "deskrpg: deleteNanobotAgentWorkspace (mirror 정리, T-F03)"
        - "nanobot: POST /v1/agents/{agentId}/cleanup (AC-007)"
        - "socket.io 'npc:deleted' broadcast"

