  - id: "v10-backlog-5"
    title: "task-level granular cancel (nanobot tool 단위 cancel)"
    priority: "medium"
    owner: "다른 팀원 (nanobot fork) — 검토 필요"
    detail: |
      현재 nanobot의 cancel은 session_key 단위만 (개별 tool granular cancel X).
      task board에서 task 한 건만 취소 시 같은 session의 다른 in-flight 작업도
      함께 멈춤 (TRD-D-37). 일반적 시나리오엔 문제 없으나, multi-tool chain
      동시 진행 케이스에서 정확한 control 위해 nanobot에 task_id ↔ asyncio.Task
      mapping + POST /v1/tools/{task_id}/cancel endpoint 신설 검토.
    detail_extra: |
      v10 머지 후 실 사용에서 multi-tool 동시 진행 빈도 측정 → 필요성 결정.

# ─────────────────────────────────────────────────────────────────────
# Migration Strategy from v9
# ─────────────────────────────────────────────────────────────────────
migration_strategy:
  phase: "migrate (parallel-change)"
  precondition: "expand 단계 완료 — phase 4.5에서 cancel endpoint + DB tracking + Option A 안착"
  steps:
    - "1. /trd로 layer mapping + interface design"
    - "2. /decompose로 atomic task 분해"
    - "3. AC-005 (parent_agent_id FK migration) — DB 변경 먼저"
    - "4. AC-001/002 (internal endpoint 신설) — push 받을 곳 준비"
    - "5. AC-006 (chatSend metadata 확장) — 다른 팀원이 활용할 spec 안착"
    - "6. AC-010 (event contract 문서화) — 다른 팀원과 sync"
    - "7. AC-007 (cleanup endpoint 호출) — nanobot 측 endpoint 신설 대기 (다른 팀원)"
    - "8. AC-003 (legacy 제거) — push 흐름 동작 확인 후"
    - "9. AC-004 (injectTaskPrompt 결정 및 적용)"
    - "10. AC-008 (sub-agent UI) — Phase 6"
  rollback: "AC-003 머지 전까지는 legacy 흐름 그대로 동작 (parallel-change expand가 새 흐름 enable 후 contract). 머지 후 회귀 시 revert 가능."

# ─────────────────────────────────────────────────────────────────────
# Glossary — 본 cycle 핵심 용어
# ─────────────────────────────────────────────────────────────────────
glossary:
  tool_execution_event:
    definition: "nanobot의 agent loop이 tool을 실제로 실행한 시점에 발화하는 lifecycle event (started/progressing/completed/cancelled)"
    not_to_be_confused_with: "LLM 응답 본문의 task action 코드블록 (v10에서 제거됨)"

  sub_agent:
    definition: "nanobot이 자체적으로 spawn한 child agent. deskrpg의 npcs 테이블에 parent_agent_id NOT NULL인 row로 표현"
    not_to_be_confused_with: "사용자가 hire한 일반 NPC (parent_agent_id NULL)"

  canonical:
    definition: "데이터 신뢰의 단일 진실 원천 (single source of truth). 충돌 시 canonical 이 정답"

  ephemeral_cache:
    definition: "canonical 데이터의 derivative — nanobot이 자체 관리하지만 NPC 삭제 시 cleanup endpoint로 정리"
