# ─────────────────────────────────────────────────────────────────────
# Tech Decisions — v1 9개 + v2 추가 2개
# ─────────────────────────────────────────────────────────────────────
tech_decisions:
  - decision: "Python nanobot fork를 Logic 레이어 백본으로 채택"
    reason: "Agent 워크플로우 + MCP + 다채널 전송 + 메모리 등 RegTrack 핵심 요구를 거의 다 충족. 처음부터 짜는 비용 절감"
    alternatives_considered:
      - "FastAPI + LangGraph 직접 구성 (자유도 ↑, 일정 risk ↑)"
      - "OpenAI Assistants API (벤더 lock-in)"

  - decision: "Next.js + TypeScript (deskrpg fork)를 Presentation 채택"
    reason: "wow 모먼트(픽셀 RPG NPC 보고)의 핵심. 자체 구현 시 12주 안에 불가"
    alternatives_considered:
      - "Streamlit (시연 효과 ↓, 시간 ↑ 절약)"
      - "deskrpg embed only (시연 셸로만 사용)"

  - decision: "Crawler를 nanobot과 분리한 별도 Python 서비스(scrapy/playwright)"
    reason: "스케줄·재시도·브라우저 자동화 패턴이 nanobot agent 모델과 다름. 분리 시 운영 단순화"
    alternatives_considered:
      - "nanobot agent 안에 scraper 통합"
      - "Cloudflare Workers 등 외부 크롤링"

  - decision: "Data 레이어: SQLite + Obsidian markdown vault (PostgreSQL/pgvector 제거)"
    reason: "시연용 데이터량 적고 단일 노트북 배포. vault는 git sync로 팀 공유 자연스러움"
    alternatives_considered:
      - "PostgreSQL + pgvector (운영 복잡도 ↑)"
      - "Vault만 사용 (메타 쿼리 어려움)"

  - decision: "RAG는 BM25부터 (pgvector는 stretch)"
    reason: "$100 예산에서 임베딩 비용·인프라 비용 부담. BM25는 한국어 형태소 분석기로 충분"
    alternatives_considered:
      - "pgvector + OpenAI embeddings (비용 ↑)"
      - "Qdrant/Weaviate 외부 서비스"

  - decision: "LLM은 OpenAI/Claude API만 (자체 호스팅 X)"
    reason: "예산·일정·인프라 부담 회피. Citation 기반 hallucination 통제로 충분"
    alternatives_considered:
      - "Llama 3 자체 호스팅 (GPU 비용)"
      - "Bedrock/Vertex (벤더 lock-in)"

  - decision: "Obsidian vault git sync + private repo 강제"
    reason: "팀원 공유 + 버전 관리 + Obsidian 자체가 KB 브라우저로 활용. 단 민감 본문 노출 방지를 위해 private 강제"
    alternatives_considered:
      - "Obsidian Sync 유료 서비스"
      - "vault를 데이터베이스로만 (사람 검색 ↓)"

  - decision: "협업: feature → dev/nanobot → main 마일스톤 머지"
    reason: "4명 팀 + base repo 이미 dev/nanobot 브랜치 활용 중"
    alternatives_considered:
      - "trunk-based (작은 팀에 부담)"
      - "git flow (12주에 과도)"

  - decision: "12주 광기 수용 — 양보 우선순위 명시 X (사용자 결정)"
    reason: "사용자 명시적 선언. 다만 마일스톤 슬립 시 재논의 트리거를 Risk Register에 적시"
    alternatives_considered:
      - "양보 순서: 4개 소스 인터페이스 → deskrpg 고급 자산 → RAG 고도화"

  # ─── v2 추가 ───
  - decision: "AI 미팅룸을 RegTrack '주간 컴플 회의실'로 repurpose (P0 포함)"
    reason: "deskrpg 원본 기능 cut 시 제거 공수 발생 + wow 추가 기회 상실. 도메인 적합 변환으로 코드 재활용 + 신규 시연 임팩트"
    alternatives_considered:
      - "CUT (v1 원안) — 안전하지만 wow 상실 + 제거 공수"
      - "HIDE (코드 유지·UI 숨김) — 데드 코드 risk"
      - "그대로 유지 (RegTrack 무관) — 부적절"

  - decision: "주간 회의 시연은 메인 4단계와 분리된 보너스 30초 페이즈"
    reason: "발표 5분 한도 보호. 메인 시나리오(AC-005)는 그대로 유지하고 추가 임팩트만 +30초"
    alternatives_considered:
      - "메인 시나리오를 5단계로 확장 (시간 초과 risk)"
      - "주간 회의를 별도 영상으로 사전 녹화 (현장 시연 효과 ↓)"

  # ─── v4 추가 ───
  - decision: "Vault git sync는 Obsidian Git community plugin + 수동 push로 단순화 (백엔드 자동 sync 제거)"
    reason: "시연용 데이터량 적음 + 1인 push 가정 + Obsidian 사용자 표준 패턴 + 백엔드 공수 2~3일 절감 + git subprocess 충돌 처리 코드/테스트 제거"
    alternatives_considered:
      - "v3 원안: 백엔드가 1초 debounce + git subprocess (공수 +2~3일)"
      - "백엔드 commit-only + 수동 push (균형, 단 일관성 ↓)"
      - "git sync 빼고 클라우드 폴더 (충돌 잦음, 비권장)"

  - decision: "Scope change governance: 주 1회 금요일 30분 retrospective + 소/중/대형 triage matrix"
    reason: "유기적 발견 인정 + 일정 슬립 방지. 변경 batch로 묶어 의사결정 비용 압축"
    alternatives_considered:
      - "변경 자유 (잦은 seed 재발행으로 일정 슬립 위험)"
      - "scope 동결 (유연성 포기, 학습 차단)"

  # ─── v5 추가 (Obsidian Local REST API 통합) ───
  - decision: "Vault 접근은 Obsidian Local REST API plugin (port 27123) — Backend가 파일시스템 직접 접근 X"
    reason: "팀원이 이미 skills/obsidian/SKILL.md + docs/obsidian-interface.md로 구현. graph view·태그·wikilink 자동 활용. 백엔드 코드 단순화 (filesystem 권한 처리 X)"
    alternatives_considered:
      - "Backend 파일시스템 직접 write (v4 가정 — 팀원 작업 폐기, 재작업 +1주)"
      - "추상화 레이어 추가해서 둘 다 지원 (공수 ↑, 시연용엔 과도)"
    side_effects:
      - "Obsidian app이 시연 동안 항상 실행 중이어야 함"
      - "Bearer Token 관리·SSRF whitelist 설정 필요"
      - "네트워크 호출 latency 발생 (로컬 환경에선 무시 가능)"

  - decision: "VaultDocument frontmatter 규칙: '#topic' 태그 + '## Connected Knowledge' 섹션 + 1+ [[wikilink]] 강제 (skills/obsidian/SKILL.md 'Captain's Special Instructions' 준수)"
    reason: "팀원 skill 정책 일치 + Obsidian graph view 시각 효과 (시연 wow 강화). 단순 노트 dump 방지"
    alternatives_considered:
      - "frontmatter free-form (graph view 효과 ↓)"
      - "더 엄격한 schema (Json Schema 검증 — 공수 ↑)"

  # ─── v6 추가 (OpenRouter + Qwen 채택) ───
  - decision: "LLM provider를 OpenRouter (qwen 모델)로 채택"
    reason: |
      팀 결정 + 결제 완료. OpenRouter는 OpenAI 호환 API라 코드 변경 minimal.
      Qwen 모델이 GPT-4o-mini 대비 약 50~70% 저렴 → $100 예산 여유 ↑.
      단일 provider로 가입·키 관리 단순화.
    alternatives_considered:
      - "OpenAI 직접 (gpt-4o-mini, 가정 모델 — 가격 ↑)"
      - "Claude 직접 (claude-haiku, anthropic SDK 별도)"
      - "여러 provider 동시 (운영 복잡도 ↑)"
    side_effects:
      - "OpenRouter prompt cache 지원은 Qwen 변종마다 다름 — 확인 필요"
      - "OpenRouter 응답 latency가 직접 호출보다 약간 ↑ (proxy hop)"
      - "정확한 Qwen 모델명은 v7에서 확정 (default placeholder: qwen/qwen-2.5-72b-instruct)"

  - decision: "AC-008 단계별 임계치: $30 yellow / $60 orange / $90 red"
    reason: "Qwen 저렴해도 통제 가시화 강화. 단계별 색상은 시연 시 wow 강화 (위젯 실시간 색 변화)"
    alternatives_considered:
      - "단일 $40 (v3 원안) — 단계 없음, 시각 효과 약함"
      - "$60 단일 상향 — Qwen 저렴 반영"
      - "$80 단일 상향 — 공격적"

  # ─── v7 추가 (Qwen 모델 확정) ───
  - decision: "Default LLM model: qwen/qwen3.6-35b-a3b (MoE, 35B 전체 / 3B active)"
    reason: |
      OpenRouter 가격 $0.15/$1.00 per 1M tokens (prompt/completion) — 가성비 최상위.
      MoE 구조로 3B active만 추론에 사용 → 빠른 latency + 저비용.
      Qwen3.6 시리즈는 최신 instruct-tuned, 한국어 정확도 우수 (예상).
      시연 기간 총 비용 추정 ~$1.30 → $100 예산 대비 1.3% → AC-008 단계 도달 거의 불가능.
    alternatives_considered:
      - "qwen/qwen3.6-flash ($0.19/$1.13) — 약간 더 빠르나 가격 ↑"
      - "qwen/qwen3.6-27b ($0.32/$3.20) — denser, 완성도 ↑ but 가격 ↑↑"
      - "qwen/qwen3.6-max-preview ($1.04/$6.24) — 최강 but 12주 예산 부담"
      - "qwen/qwen3.5-35b-a3b ($0.14/$1.00) — 이전 버전, 거의 동일 가격"
    side_effects:
      - "MoE 모델 특성: 일부 도메인(법률·금융 전문) 정확도 ↓ 가능성 → benchmark 필요 (W6)"
      - "OpenRouter prompt cache 지원 여부 미검증 (W6 LLMClient 구현 시 확인)"
      - "R-13 (Qwen 정확도): benchmark 미달 시 qwen3.6-27b 또는 plus로 전환 검토 (seed-v8)"

  # ─── v8 추가 (deskrpg 라이센스 명시) ───
  - decision: "deskrpg fork는 학술용·시연용으로만 사용 (Sustainable Use License 1.0 준수). 상업 배포는 명시적 non-goal로 차단."
    reason: |
      deskrpg(github.com/dandacompany/deskrpg)는 Sustainable Use License 1.0 적용 —
      비상업·내부 사용은 허용, 상업 배포는 별도 라이센스 필요. AIMBA ABP 학술 시연은
      "internal use + non-commercial"에 해당 → 위반 없음.
      LPC asset 일부는 LICENSE-assets.md에서 CC-BY-SA 3.0 등 별도 라이센스 — 헤더 유지 필수.
      Commercial pivot 가능성을 차단하기보다 명시적 non-goal로 두고 향후 별도 검토.
    alternatives_considered:
      - "라이센스 호환 OSS 프론트(Phaser·Excalibur 등)로 재구현 (12주 일정 risk + wow 상실)"
      - "deskrpg fork 후 자체 라이센스로 재배포 (Sustainable Use License 1.0 위반)"
      - "deskrpg embed only (iframe) — 코드 분석·커스텀 불가, RPG NPC 통합 어려움"
    side_effects:
      - "Commercial launch 시 프론트엔드 재구현 또는 별도 라이센스 협의 필요"
      - "LICENSE·LICENSE-assets.md 파일을 RegTrack repo 루트에 그대로 유지·노출 (제거 금지)"
      - "deskrpg upstream pull은 시연 종료 후로 연기 (M5 retro 안건)"
      - "R-18로 추적: 라이센스 위반 risk (현재 학술 범위 내, severity Medium)"

  # ─── v9 신규 (Postgres + nanobot parity) ───
  - decision: "D-15: 구조화 데이터 저장소로 PostgreSQL 채택 (로컬 docker-compose)"
    reason: |
      seed-v8 must_not 위반 사실: deskrpg fork에 pg^8.20.0이 runtime dep로 활성 + drizzle.config.ts
      dialect: 'postgresql' + DB_TYPE 분기에서 Postgres 우선. SQLite를 강제하면 fork 의도와 충돌하고
      retroactive 제거 비용이 큼. 팀이 SQLite를 사용할 계획 없음을 확인 → PostgreSQL을 must로 승격.
      운영 친화(connection pooling·HA·jsonb)·팀 익숙도·docker-compose 한 줄로 셋업 가능 이점.
    alternatives_considered:
      - "SQLite 유지 + Postgres 코드 제거: fork 정합성·dual-mode 모두 손실"
      - "둘 다 유지 (dual-mode): dead code + 테스트 매트릭스 2배"
      - "원격 호스팅 Postgres (Supabase 등): 학술 시연·로컬 우선 정책과 어긋남"
    side_effects:
      - "docker-compose.yml에 postgres 서비스 추가 (healthcheck + named volume)"
      - "DATABASE_URL 환경변수 필수 (SQLITE_PATH 제거)"
      - "drizzle 마이그레이션은 PG 전용 (schema-sqlite.ts 제거)"
      - "R-19로 추적: openclaw 제거 작업과 같은 PR에 묶일 경우 회귀 위험 증대 → 분할 권고"

  - decision: "D-16: pgvector는 v8 stretch 그대로 유지 (MVP 포함 아님)"
    reason: |
      Postgres가 must로 승격됐어도 pgvector extension은 별도 install + 인덱스 + 임베딩 생성 비용
      (LLM 호출당 토큰 소비). 데이터 양(FSS 1소스 + 4 mock), 시연 임계('리테일 영향' 1 질문),
      $100/2.5개월 예산을 고려하면 BM25 + Obsidian wikilink 큐레이션으로 충분할 가능성 큼.
      시연 직전 정확도 미달 발견 시 1일 작업으로 enable 가능 (Postgres extension 추가 + embedding 백필).
    alternatives_considered:
      - "MVP에 pgvector 포함: 임베딩 비용 + 인덱스 운영 + 시연 임계와 ROI 불일치"
      - "BM25도 제외 (LLM full-text가 알아서): 5분 시연에서 latency 위험 + 비용 폭증"
    side_effects:
      - "v10 pending: 시연 직전 정확도 평가 시점에 pgvector enable 여부 결정"

  - decision: "D-17: SQLite 코드 일괄 제거 (parallel-change contract phase)"
    reason: |
      D-15 결정에 따라 SQLite는 사용 안 함. 'import만 끊기' 옵션은 dead code(schema-sqlite.ts,
      better-sqlite3, DB_TYPE 분기, sqlite-base-schema.js)를 영구 유지 → 타입 체크·테스트 매트릭스·
      신규 기여자 혼란. 마이그레이션 데이터 없음 (Q10-4 확인) → 롤백 시나리오는 git revert 한 줄.
    alternatives_considered:
      - "import만 끊고 코드 유지: dead code 비용 영구"
      - "parallel-change Expand→Migrate→Contract 3단계로 PR 분할: 데이터 없음 케이스에는 과한 절차"
    side_effects:
      - "package.json에서 better-sqlite3 dep 제거"
      - "deskrpg/src/db/sqlite-base-schema.js, schema-sqlite.ts 파일 삭제"
      - "deskrpg/src/db/index.ts의 DB_TYPE 분기 제거 (Postgres 단일 경로)"
      - "drizzle-sqlite.config.ts 파일 삭제"
      - "AC-021 verification의 일부"

  - decision: "D-18: AI_PROVIDER=nanobot 단일 경로 (openclaw 모드 제거, dual-mode 없음)"
    reason: |
      Q4 확인: 이번 프로젝트는 openclaw 사용 의도 없음. dual-mode 유지는 코드 복잡도(provider 분기
      도처) + 테스트 매트릭스 2배 + 신규 기여자 혼란을 초래. 본 프로젝트의 'nanobot fork가 openclaw를
      대체'라는 정의 자체가 openclaw 코드 잔존을 정당화하지 못함.
    alternatives_considered:
      - "dual-mode 유지 (env var로 선택): 영구 dead path + 회귀 매트릭스 2배"
      - "openclaw fallback만 남김 (nanobot 실패 시): 시연 환경에 fallback 필요 없음 + 디버깅 어려움"
    side_effects:
      - "AI_PROVIDER 기본값 'openclaw' → 'nanobot'"
      - "socket-handlers.ts의 OpenClawGateway 분기 제거"
      - "nanobot-client.js의 dual-mode 코드 제거"
      - "AC-021 verification의 핵심"

  - decision: "D-19: nanobot 게이트웨이는 openclaw 9 functional categories에 대해 functional parity 제공"
    reason: |
      Q2: '기능적 이점을 그대로' 우선. behavioral parity(byte 단위 latency·chunk 형식)는 명시적 요구
      아니므로 비용 대비 ROI 낮음. functional parity로 deskrpg UI/서버 호출자 코드 변경 최소화.
      9 categories는 코드 스캔(Explore agent)으로 검증됨: lifecycle / streaming / file mgmt /
      pairing / error mapping / config / auth / telemetry / provider abstraction.
    alternatives_considered:
      - "drop-in replacement (모든 인터페이스 시그니처 동일): 작업량 폭증 + 시연 일정 risk"
      - "behavioral parity (latency·chunk 단위): 측정·튜닝 비용 vs 학술 시연 ROI 미달"
      - "subset만 (chat streaming만): pairing UI·error mapping 누락 시 deskrpg UI 봉인"
    side_effects:
      - "AC-013..021 9 AC로 카테고리별 분할"
      - "R-19로 추적: 128+ 터치포인트 회귀 위험"

  - decision: "D-20: nanobot도 Ed25519 device pairing + challenge-response 구현 (Q5 결정: full parity)"
    reason: |
      openclaw는 ~/.openclaw-devices/${hash}.json에 Ed25519 keypair를 저장하고 pairing challenge로
      인증. deskrpg의 OpenClawPairingStatusCard UI가 4상태(idle/connected/pairingRequired/error)에
      의존 — nanobot이 같은 페어링 흐름을 제공하지 않으면 UI 카드를 무력화하거나 'always connected'
      hack이 필요. 사용자(Q5)는 full parity를 선택 → UI 그대로 재활용.
    alternatives_considered:
      - "Bearer Token만 (페어링 UI 무력화): UI 4상태 hack 필요 + 보안 약화"
      - "Bearer + 페어링 UI 유지하되 1회 셋업 후 자동 통과: 페어링 실패 케이스 디버깅 어려움"
    side_effects:
      - "~/.nanobot-devices/ 디렉토리 신설 + Ed25519 keypair 생성/저장 로직"
      - "PairingStatusCard 컴포넌트 재활용 (브랜드만 'Nanobot Pairing'으로)"
      - "AC-016 verification의 핵심"
      - "R-20로 추적: 페어링 실패 시 시연 봉인"

  - decision: "D-21: 워크스페이스 경로 prefix ~/.openclaw/ → ~/.nanobot/ rename (Q6 결정)"
    reason: |
      Q6 결정: 파일시스템 경로는 브랜드 정리 차원에서 rename. 1회용 마이그레이션 스크립트로
      기존 사용자 영향 최소화 (~/.openclaw/* 발견 시 ~/.nanobot/*로 이동). 단, DB 컬럼명
      'openclawConfig'는 영향도 차원에서 유지 (D-24 참고).
    alternatives_considered:
      - "경로 유지 (~/.openclaw/): 코드 영향 0이지만 nanobot 시점에서 혼란"
      - "env var 추상화 (AGENT_WORKSPACE_DIR): 유연하지만 default 결정 회피"
    side_effects:
      - "migrateLegacyOpenClawPaths action 추가 (첫 부팅 시 자동 실행)"
      - "AC-015 verification의 일부"

  - decision: "D-22: NPC persona는 DB가 source of truth, .md 파일은 write-only mirror (Q7 a-W 결정)"
    reason: |
      Q7 분석: openclaw는 워크스페이스 .md 파일을 agent loop이 read. nanobot은 stateless이며 매 호출
      DB의 personaConfig로 system prompt 재구성. 둘 다 .md를 read하면 drift/loop/bloat 위험.
      → nanobot은 DB만 read, .md는 사이드 아티팩트(인간 디버깅·tail용)로 같이 쓰기만 함.
    alternatives_considered:
      - "Bidirectional sync (a-RW): drift·loop·bloat 위험 + 별도 conflict 해결 설계 필요"
      - ".md sync 자체 drop (b): 디버깅 어려움 (tail로 persona 확인 불가)"
    side_effects:
      - "nanobot agent loop은 워크스페이스 파일 read 안 함 (DB만)"
      - "updateNpcPersona action이 DB 갱신 + .md 파일 mirror 재작성"
      - "AC-015 verification의 핵심"

  - decision: "D-23: legacy npcs.openclawConfig.persona (string) fallback 코드 제거 (Q8 결정)"
    reason: |
      이미 deprecated된 legacy 필드 (nanobot-client.js:148-150, nanobot-chat.ts:37-47). 본 프로젝트는
      fork 직후이므로 마이그레이션할 기존 데이터 없음 (Q10-4 확인) → fallback 유지 명분 없음.
      .personaConfig{identity, soul}만 정식.
    alternatives_considered:
      - "유지 (upstream 머지 시 충돌 회피): 본 프로젝트는 upstream merge 계획 없음 (M5 retro)"
    side_effects:
      - "loadPersonaFromNpc 함수에서 legacy persona fallback 제거"
      - "AC-018 verification의 일부"

  - decision: "D-24: DB 컬럼명 npcs.openclawConfig 유지 (rename 안 함, 의미만 reinterpret)"
    reason: |
      Q3 결정: 영향도 측면에서 컬럼명 유지. DB 마이그레이션 + 모든 helper 함수(parseDbObject /
      buildPersonaConfig 등) rename 비용 vs 명확성 tradeoff에서 영향도 우선. 의미상 'agent gateway
      config'로 reinterpret (synonyms 섹션에 명시).
    alternatives_considered:
      - "agentConfig로 rename: 마이그레이션 + 18+ 파일 참조 변경 비용"
      - "rename 후 view 또는 alias 유지: 두 이름 영구 공존 → 혼란 가중"
    side_effects:
      - "ontology.synonyms에 'openclawConfig → gateway agent config' 매핑 추가"
      - "신규 기여자 onboarding 문서에 reinterpret 노트 필요"

