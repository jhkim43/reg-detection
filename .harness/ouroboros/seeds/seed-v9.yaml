  must_not_constraints: 21        # v8 14 + 7 (v9 openclaw 신규·dual-mode·md read·legacy persona 등)
  acceptance_criteria_count: 21   # v8 12 + 9 (v9 AC-013..021)
  ac_all_testable: true
  ac_all_have_complexity: true
  ontology_entity_count: 21       # v8 18 + 3 (v9 NanobotAgentSession·GatewayDeviceIdentity·GatewayChannelBinding)
  ontology_action_count: 22       # v8 16 + 6 (v9 pairDeviceWithChannel·chatSendStream·chatAbortStream·createNpcAgent·updateNpcPersona·migrateLegacyOpenClawPaths)
  tech_decision_count: 24         # v8 14 + 10 (v9 D-15..D-24)
  mvp_scope_defined: true
  no_tbd_placeholders: true

  ac_complexity_distribution:
    low: 5      # AC-004, AC-007, AC-010, AC-012, AC-018
    medium: 8   # AC-002, AC-006, AC-009, AC-015, AC-017, AC-019, AC-020, AC-021
    high: 8     # AC-001, AC-003, AC-005, AC-008, AC-011, AC-013, AC-014, AC-016
    # 합계 = 5 + 8 + 8 = 21 ✓

  ambiguity_at_seed: 0.08         # v9 인터뷰 최종 점수 (gate ≤ 0.20)

# ─────────────────────────────────────────────────────────────────────
# Resolved Ambiguities — v1 8개 + v2 추가 결정
# ─────────────────────────────────────────────────────────────────────
resolved_ambiguities:
  # v1 그대로
  - issue: "픽셀 아트 자산 제작 책임자 미정"
    decision: "MVP는 deskrpg 기본 자산 재활용 + 색상·이름 변경만. 신규 자산 제작은 future."
  - issue: "부서(target_department) 분류 체계 미정"
    decision: "MVP는 자유 텍스트(시연: '리테일'). enum 정규화는 future."
  - issue: "RegulationVersion diff 산출 방식 미정"
    decision: "MVP는 LLM 1줄 요약. 텍스트 diff는 future."
  - issue: "4개 소스 interface_only 증명 경계 미정"
    decision: "코드 stub + mock 데이터 1건/소스 (총 4건) — AC-007에서 검증."
  - issue: "Notification vs NPCReport 트리거 관계 미정"
    decision: "MVP는 NPCReport만. Notification은 future."
  - issue: "Obsidian vault git sync 보안 경계 미정"
    decision: "Private repo 강제. PRD에 보안 정책 명시."
  - issue: "BCBS(영문) 처리 미정"
    decision: "MVP는 RegulationSource.language=EN 메타만 등록. 번역은 future."
  - issue: "Agent 타입 확장 함의 미정"
    decision: "MVP는 CRAWLER + IMPACT_ANALYZER 2개만. 추가 타입은 future."

  # v2 추가
  - issue: "AI 미팅룸 처리 방식 (CUT vs KEEP vs REPURPOSE)"
    decision: "REPURPOSE — '주간 컴플라이언스 회의실'로 변환. P0 포함. 메인 시연과 분리된 보너스 페이즈."
  - issue: "맵 에디터·멀티플레이어 처리"
    decision: "CUT 유지 — RegTrack 무관, 시연 1인 모드"
  - issue: "LPC 캐릭터 커스터마이징 처리"
    decision: "KEEP — 공수 0, 시연 임팩트 +"
  - issue: "주간 회의의 시연 시점"
    decision: "시연일 직전 1회 자동 발화 (수동 트리거). 실제 cron 주기 실행은 stretch."
  - issue: "주간 회의 디지스트의 LLM 비용 영향"
    decision: "주 1회 호출 가정 시 시연 기간 동안 ~$5 추가. $100 예산 내 흡수 가능."

  # v4 추가
  - issue: "Vault git sync 자동화 수준 (백엔드 자동 vs 사용자 수동)"
    decision: "Obsidian Git plugin + 수동 push. AC-006 약화 (markdown 작성 + plugin 설정 확인만)."
  - issue: "크롤링 대상 변경 거버넌스 (진행 중 우선순위 바뀔 가능성)"
    decision: "주 1회 금요일 30분 retrospective + 소/중/대형 triage matrix (process_governance 섹션 참조)"

  # v5 추가 (base repo clone 후 팀원 작업 확인 결과)
  - issue: "Obsidian 통합 방식 (Backend 파일시스템 직접 vs 팀원의 REST API 방식)"
    decision: "팀원 구현(Obsidian Local REST API plugin) 채택 — skills/obsidian/SKILL.md 준수. Backend는 vault/ 파일시스템 직접 접근 X."
  - issue: "VaultDocument frontmatter 규칙 (free-form vs 강제)"
    decision: "팀원 'Captain's Special Instructions' 준수: #topic 태그 + ## Connected Knowledge 섹션 + 1+ [[wikilink]] 강제"
  - issue: "시연 환경 (Windows 호스트 + Oracle VM vs Mac 단일 노트북)"
    decision: "보류 — 다음 retro·PM 회의 안건. 영향: docker-compose 구성, Obsidian 호스트 IP, 시연 시스템 요구사항"
  - issue: "nanobot upstream + obsidian skill 충돌 시 우선순위"
    decision: "팀원 작업물(jhkim43/reg-detection dev 브랜치) 우선. nanobot upstream pull은 시연 후"

  # v6 추가 (LLM provider 변경)
  - issue: "LLM provider 선택 (OpenAI/Claude vs OpenRouter+Qwen)"
    decision: "OpenRouter + Qwen 채택 — 팀이 이미 결제·키 발급. OpenAI 호환 API라 코드 변경 minimal. Qwen이 저렴해 예산 여유 ↑"
  - issue: "정확한 Qwen 모델 변종"
    decision: "default placeholder: qwen/qwen-2.5-72b-instruct (범용·강력). 팀원 확인 후 v7에서 확정 (qwq-32b-preview, qwen-2.5-7b 등 가능성)"
  - issue: "AC-008 임계치 ($40 단일 vs 단계별)"
    decision: "단계별: $30 yellow / $60 orange / $90 red — 시각 효과 강화 + Qwen 저렴 반영"

  # v7 추가 (Qwen 모델 확정)
  - issue: "정확한 Qwen 변종 (v6 pending_v7)"
    decision: "qwen/qwen3.6-35b-a3b 채택 — MoE 35B/3B active, $0.15/$1.00 per 1M tokens. 시연 기간 ~$1.30 추정"

  # v8 추가 (deskrpg 라이센스)
  - issue: "deskrpg(github.com/dandacompany/deskrpg) 라이센스 사용 가능 여부"
    decision: "Sustainable Use License 1.0 — 학술·내부 사용 OK, 상업 배포 금지. AIMBA ABP 학술 시연 범위는 위반 없음. LPC asset의 LICENSE-assets.md(CC-BY-SA 3.0 등) 헤더는 유지 필수."
  - issue: "deskrpg fork 시점 (즉시 fork vs M4 진입 시)"
    decision: "M4 시작(W7) — 그 전까지는 reference 용도(코드 분석)로만 사용. fork 시점에 LICENSE/LICENSE-assets.md 그대로 보존."
  - issue: "팀 4인 역할·실명 명시 여부"
    decision: "현재 미확정 — 모든 문서는 일반 명칭(팀장/팀원1/팀원2/팀원3)으로 표기. 역할 확정 시 seed-v10+에서 갱신."

  # v9 추가
  - issue: "구조화 데이터 저장소 (SQLite 강제 vs PostgreSQL 채택) — seed-v8 must_not과 fork 실태 충돌"
    decision: "PostgreSQL 채택 (로컬 docker-compose). SQLite 코드 일괄 제거. v8 must_not 위반 해소 — D-15/D-17 참조."
  - issue: "pgvector MVP 포함 여부 (Postgres 채택 후)"
    decision: "v8 stretch 그대로 유지. BM25 + Obsidian wikilink로 시작, 시연 직전 정확도 미달 시 enable — D-16 참조."
  - issue: "OpenClaw 게이트웨이의 대체 범위 — seed-v8에 'openclaw' 0건이었으나 코드에 128+ 터치포인트"
    decision: "9 functional categories에 대해 nanobot이 functional parity 제공. AC-013..021 신설."
  - issue: "openclaw·nanobot dual-mode 운영 vs nanobot 단일 경로"
    decision: "nanobot 단일 경로 (AI_PROVIDER=nanobot). openclaw 경로 즉시 제거 — D-18 참조. Q4 확인됨."
  - issue: "Functional parity vs Behavioral parity vs Drop-in replacement"
    decision: "Functional parity만 보장. byte 단위 latency·chunk 형식 동일성은 비기능 — D-19 참조. Q2 확인됨."
  - issue: "Ed25519 device pairing을 nanobot도 구현? (Bearer Token만으로 가능)"
    decision: "Full parity로 Ed25519 구현 + PairingStatusCard UI 재활용. UI 4상태 의존성 유지 — D-20 참조. Q5 확인됨."
  - issue: "워크스페이스 파일 경로 (~/.openclaw/ 유지 vs ~/.nanobot/ rename)"
    decision: "~/.nanobot/로 rename + 1회용 마이그레이션 스크립트 — D-21 참조. Q6 확인됨."
  - issue: "IDENTITY.md/SOUL.md 동기화 정책 (drop vs write-only vs bidirectional)"
    decision: "Write-only mirror (DB가 source of truth, nanobot은 .md read 안 함) — D-22 참조. Q7 확인됨. agent loop·prompt bloat 위험 없음."
  - issue: "legacy npcs.openclawConfig.persona (string) fallback 코드 처리"
    decision: "제거 — D-23 참조. Q8 확인됨 (fork 직후, 마이그레이션 데이터 없음)."
  - issue: "openclaw parity AC를 하나로 묶을까 / 카테고리별로 쪼갤까 / critical path만"
    decision: "9 카테고리별로 9 AC (AC-013..021). Q9 확인됨."
  - issue: "DB 컬럼명 npcs.openclawConfig — rename vs 유지"
    decision: "유지 (영향도 우선). 의미는 'gateway agent config'로 reinterpret, synonyms 섹션 매핑 — D-24 참조. Q3 확인됨."
  - issue: "M3/M4 owner의 담당 AC 범위 확정"
    decision: "AC-002/003/004/005/006/008/011/012 + AC-013..021 = 17 AC (owner 블록 참조). owner scope 확장 가능성은 v10 후보."
  - issue: "AC-004(필터 UI)가 타 팀원 데이터 모델에 의존 — 명시 여부"
    decision: "dependencies 블록 신설하여 AC-004→AC-001/007, AC-003→AC-001, AC-002→AC-001 명시."
  - issue: "스토리보드 추가 시나리오 추출 시점"
    decision: "v9는 현재 AC-005/011만 freeze. 추가 단계는 v10 이상에서 /interview → /seed 사이클로 evolve. living-spec methodology 활용."

# ─────────────────────────────────────────────────────────────────────
# Process Governance — v4 신규 (scope 변경·리뷰 cadence)
# ─────────────────────────────────────────────────────────────────────
process_governance:
  retrospective:
    cadence: "매주 금요일 30분"
    participants: "팀 4인 (팀장(PM)·팀원1·팀원2·팀원3)"
    agenda:
      - "지난 주 발견된 scope 변경 안건 1줄씩"
      - "이번 주 진척 vs 계획"
      - "다음 주 cut/keep 결정"
    output: "결정 사항을 git commit (또는 issue) + 필요 시 seed-vN 새 버전 발행"

  scope_change_triage:
    small:
      definition: "단일 모듈·데이터값 변경 (예: FSS 게시판 우선순위 조정, parser_config 튜닝)"
      decision_authority: "작업자 1인"
      process: "git commit 메시지에 사유 1줄 포함"
      seed_impact: "없음"
      example: "FSS '해설' 게시판 폴링 빈도 30분 → 60분으로 조정"
    medium:
      definition: "여러 모듈 영향 또는 신규 기능 (예: 새 게시판·필터 추가)"
      decision_authority: "팀 합의 (주간 retro)"
      process: "retro에서 결정 → 다음 주에 진행"
      seed_impact: "없음 (constraints.should 또는 scope.mvp 보조 메모만)"
      example: "FSS에 '공고' 게시판 추가 (Flexible Parser 활용)"
    large:
      definition: "MVP 대상·아키텍처 결정 변경 (예: FSS → BOK 전환, 데이터 레이어 교체)"
      decision_authority: "어드바이저 + 팀 합의"
      process: "retro에서 안건 → 어드바이저 회의 → seed-vN 새 버전 발행 → PRD·TRD 갱신"
      seed_impact: "seed 새 버전 (immutable 원칙)"
      example: "MVP 소스를 FSS에서 BOK으로 변경, ImpactAnalyzer를 LangGraph로 교체"

  enforcement:
    - "small 변경이 잦으면 medium으로 묶어 retro에서 재분류"
    - "large 변경은 마일스톤 게이트(M2/M3/M4) 직전·직후에만 허용 (구현 도중 차단)"
    - "어드바이저 부재 시 large는 다음 retro로 연기"

# ─────────────────────────────────────────────────────────────────────
# Owner — v9 신규 (M3/M4 담당자 AC 매핑)
# ─────────────────────────────────────────────────────────────────────
owner:
  m3_m4_gateway:
    role: "nanobot↔deskrpg 게이트웨이 + Obsidian 프론트엔드 통합 + 스토리보드 시연 구현"
    person: "본 인터뷰이 (2026-05-19 인터뷰 기준)"
    acs:
      # v1~v2에서 본인 도메인 (8개)
      - AC-002  # NPCReport(NEW_REGULATION) 대시보드 표시
      - AC-003  # 분석 NPC Citation 응답 (in-world 말풍선)
      - AC-004  # 대시보드 필터 4종
      - AC-005  # 메인 시연 시나리오 4단계
      - AC-006  # Obsidian Local REST + Vault + 웹 UI 표시
      - AC-008  # LLM 사용량 위젯 + 임계치 enforcement (PR2a/2b 부분 완료)
      - AC-011  # 주간 회의 NPC 모임 (AI 미팅룸 repurpose)
      - AC-012  # LPC 캐릭터 커스터마이징
      # v9 신규 (openclaw → nanobot parity 9개)
      - AC-013  # NPC/Agent lifecycle parity
      - AC-014  # Chat streaming parity
      - AC-015  # Workspace file management parity (.md write-only mirror)
      - AC-016  # Device pairing parity (Ed25519)
      - AC-017  # Error mapping parity
      - AC-018  # Configuration storage parity
      - AC-019  # Authentication tokens parity
      - AC-020  # Telemetry parity (AC-008과 통합)
      - AC-021  # Provider abstraction hardening (dead code 제거)
    ac_count: 17
    scope_expansion_candidates_v10:
      - "AC-001/007/009 일부 (크롤러 산출물 의존 시 본인이 데이터 모델 결정 가능성)"
      - "신규 스토리보드 시나리오 단계 (v10 evolve 후)"
      - "팀원 역할 4인 확정 시 재배분 가능성"

  other_team:
    role: "규제 도메인 (크롤러·데이터·버전 이력)"
    person: "팀 4인 중 미배정 (역할 확정 v10+ 안건)"
    acs:
      - AC-001  # FSS 보도·규정·해설 크롤러 + Regulation 저장
      - AC-007  # 4개 소스 RegulationSource 시딩 + mock 1건씩
      - AC-009  # RegulationVersion 이력 (2회 이상 + diff_summary)

  shared:
    role: "harness 게이트 + CI"
    acs:
      - AC-010  # .harness/gates default 통과 — 모든 PR에서 자동 검증

# ─────────────────────────────────────────────────────────────────────
# Dependencies — v9 신규 (AC 간 데이터/실행 의존성)
# ─────────────────────────────────────────────────────────────────────
dependencies:
  policy: |
    AC 간 의존성을 명시하여 owner block의 작업 순서를 가시화한다.
    'depends_on'은 strong dependency (선행 미완 시 후행 불가).
    'soft_depends_on'은 weak dependency (선행 없이도 mock으로 진행 가능, 통합 시점에 필요).

  edges:
    # owner=m3_m4_gateway가 owner=other_team에 의존하는 cross-team 경계
    - ac: AC-002
      depends_on: [AC-001]
      reason: "Regulation 엔티티 생성 후 NPCReport(NEW_REGULATION)가 의미 있음. mock Regulation으로 우선 구현 가능 (soft)."
      severity: "soft"
      mitigation: "AC-001 완료 전에는 fixture Regulation 1건으로 통합 테스트, 통합 시점에 실 데이터로 교체"

    - ac: AC-003
      depends_on: [AC-001]
      soft_depends_on: [AC-006]
      reason: "분석 NPC가 Regulation·Citation을 들고 응답. Obsidian Vault(AC-006)에서 RAG 데이터를 조회."
      severity: "strong (AC-001) / soft (AC-006)"
      mitigation: "AC-001 mock으로 시작, AC-006는 fake Vault로 우선 진행"

    - ac: AC-004
      depends_on: [AC-001, AC-007]
      reason: "필터 4종(source_codes/change_types/target_departments/date_range)이 Regulation·RegulationSource 모델에 직접 쿼리"
      severity: "strong"
      mitigation: "fixture seed 데이터로 UI·쿼리 골격은 선행 가능, 실 데이터는 AC-001/007 완료 후"

    - ac: AC-005
      depends_on: [AC-001, AC-002, AC-003]
      reason: "메인 시연 4단계는 (2) 신규 Regulation 보고 + (3) 분석 NPC 질문 + (4) Citation 응답을 모두 통합"
      severity: "strong"
      mitigation: "각 단계별로 따로 통과시킨 후 마지막에 end-to-end 통합 — Pair Mode 강제"

    - ac: AC-009
      depends_on: [AC-001]
      reason: "RegulationVersion 이력은 Regulation 본 모델 위에 쌓임 (cross-team 작업)"
      severity: "strong"

    - ac: AC-011
      depends_on: [AC-001, AC-003]
      soft_depends_on: [AC-009]
      reason: "MeetingReport (a) 신규 건수 + (b) HIGH 영향 + (c) top Citation + (d) 다음 주 권고는 Regulation·ImpactAnalysis 집합 필요"
      severity: "strong (AC-001/003) / soft (AC-009)"

    # m3_m4_gateway 내부 의존성
    - ac: AC-008
      depends_on: [AC-020]
      reason: "LLM 위젯 데이터 소스가 LLMUsageRecord — nanobot 모드 telemetry parity(AC-020)가 위젯에 데이터 공급"
      severity: "strong"
      mitigation: "AC-008 위젯 UI는 fake 데이터로 선행 (이미 PR2a/2b), AC-020 통합 시 실데이터로 교체"

    - ac: AC-013
      depends_on: [AC-018, AC-019]
      reason: "NPC lifecycle은 configuration storage(personaConfig)와 authentication token이 선행 필요"
      severity: "strong"

    - ac: AC-014
      depends_on: [AC-013, AC-017, AC-019]
      reason: "chat streaming은 lifecycle(agent 생성)·error mapping(연결 실패 처리)·auth(token)이 선행 필요"
      severity: "strong"

    - ac: AC-015
      depends_on: [AC-013]
      reason: "워크스페이스 .md mirror는 agent lifecycle 일부"
      severity: "strong"

    - ac: AC-016
      depends_on: [AC-019]
      reason: "Ed25519 pairing은 토큰 암호화 저장 매커니즘과 통합"
      severity: "strong"

    - ac: AC-020
      depends_on: [AC-014]
      reason: "telemetry는 chat streaming 호출 시점에 LLMUsageRecord 적재 — streaming(AC-014) 위에서 동작"
      severity: "strong"

    - ac: AC-021
      depends_on: [AC-013, AC-014, AC-015, AC-016, AC-017, AC-018, AC-019, AC-020]
      reason: "Provider abstraction hardening은 다른 8개 parity AC가 모두 nanobot 단일 경로로 동작 가능한 후에 openclaw dead code 제거"
      severity: "strong"
      mitigation: "마지막에 수행 — contract phase로서 자연스러운 순서"

  recommended_execution_order:
    description: "owner=m3_m4_gateway의 17 AC를 의존성 위배 없이 진행할 권고 순서. /decompose 시 참고용."
    phases:
      - phase: 1
        name: "Foundation (다른 팀 의존 최소, 본인 단독 가능)"
        acs: [AC-012, AC-018, AC-019]
        rationale: "LPC 커스터마이징은 독립. Configuration·Auth는 다른 모든 parity AC의 기반."
      - phase: 2
        name: "Gateway core (parity 핵심)"
        acs: [AC-013, AC-016, AC-017]
        rationale: "NPC lifecycle + pairing + error mapping은 서로 약하게 결합, 병렬 가능."
      - phase: 3
        name: "Streaming + telemetry"
        acs: [AC-014, AC-015, AC-020]
        rationale: "chat streaming 위에서 telemetry + .md mirror"
      - phase: 4
        name: "AC-008 enforcement 완결 + 위젯 데이터 교체"
        acs: [AC-008]
        rationale: "AC-020 완료 후 위젯 데이터 소스 교체 + $60/$90 enforcement 추가"
      - phase: 5
        name: "Obsidian frontend + 단일 필터·메인 UI"
        acs: [AC-006, AC-004, AC-012]
        rationale: "다른 팀 산출물(AC-001/007) 완료 시점과 맞물려 진행"
      - phase: 6
        name: "Integration (다른 팀 산출물 통합)"
        acs: [AC-002, AC-003, AC-011, AC-005]
        rationale: "Regulation·Citation 실데이터 의존 — 다른 팀 완료 후 마지막 통합"
      - phase: 7
        name: "Contract phase (dead code 제거)"
        acs: [AC-021]
        rationale: "다른 모든 nanobot AC 완료 후 openclaw 경로 일괄 제거. parallel-change contract."

# ─────────────────────────────────────────────────────────────────────
# Risk Register — v8 carry-over + v9 신규 (R-19/R-20)
# ─────────────────────────────────────────────────────────────────────
risk_register:
  # v8 carry-over
  - id: R-18
    title: "deskrpg/LPC 라이센스 위반 (Sustainable Use License 1.0 + CC-BY-SA)"
    severity: "Low-Medium"
    likelihood: "Low (학술 시연 범위 내)"
    mitigation: "non_goal 명시 + must_not 명시 + LICENSE/LICENSE-assets.md 헤더 유지"

  # v9 신규
  - id: R-19
    title: "openclaw → nanobot 대체 중 회귀 위험 (128+ 터치포인트, 18+ 파일)"
    severity: "High"
    likelihood: "Medium"
    mitigation: |
      (1) 9 functional category 각각 testable AC로 분리 (AC-013..021),
      (2) PR을 category 단위로 분할 (한 PR에 9개 다 안 묶음),
      (3) AC-021(contract phase, dead code 제거)을 마지막에 수행,
      (4) Pair Mode + Test Designer 강제 (high complexity AC-013/014/016)
    owner: m3_m4_gateway

  - id: R-20
    title: "Ed25519 페어링 구현 누락 시 시연 봉인 (UI 4상태 의존)"
    severity: "High"
    likelihood: "Low-Medium"
    mitigation: |
      (1) AC-016을 phase 2에 배치 (조기 발견),
      (2) 시연 직전 페어링 dry-run 1회 강제 (process_governance.retrospective 안건),
      (3) PairingStatusCard UI는 4상태 모두 시각적 테스트 (storybook 또는 수동)
    owner: m3_m4_gateway

  - id: R-21
    title: "PostgreSQL docker-compose ready 전에 deskrpg/nanobot 컨테이너 기동 → connection refused"
    severity: "Medium"
    likelihood: "Medium"
    mitigation: "docker-compose healthcheck + depends_on condition (constraints.should 참조)"
    owner: m3_m4_gateway

  - id: R-22
    title: "SQLite 제거 과정에서 drizzle 마이그레이션 누락 → 부팅 시 schema 부재"
    severity: "Medium"
    likelihood: "Low"
    mitigation: "PR 머지 전 fresh docker volume에서 migrate.js + seed 스크립트 통과 검증 (CI 추가)"
    owner: m3_m4_gateway
