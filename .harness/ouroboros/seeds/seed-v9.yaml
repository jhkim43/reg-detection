    - "Vault 접근은 Obsidian Local REST API plugin (port 27123)을 거침 — 백엔드 파일시스템 직접 접근 X"
    - "nanobot Captain skill 'obsidian-commander' (skills/obsidian/SKILL.md) 활용 — Bearer Token 인증"
    - "SSRF whitelist에 Obsidian 호스트 IP 등록 강제 (~/.nanobot/config.json ssrfWhitelist)"
    - "VaultDocument frontmatter는 '#topic' 태그 필수 + '## Connected Knowledge' 섹션 + [[wikilink]] 강제"
    # ── v8 신규 (deskrpg 라이센스 명시) ──
    - "deskrpg fork(github.com/dandacompany/deskrpg)는 Sustainable Use License 1.0 하에서 학술용·시연용으로만 사용 — 상업 배포 금지"
    - "deskrpg fork 시점은 M4 시작(W7) — 그 전까지는 reference 용도(코드 분석)만 허용"
    - "LPC asset 별도 라이센스 헤더(LICENSE-assets.md, 통상 CC-BY-SA 3.0)는 그대로 유지"
    # ── v9 신규 (Postgres + openclaw → nanobot parity) ──
    - "환경 변수 AI_PROVIDER=nanobot 단일 경로 (openclaw 경로는 v9에서 제거)"
    - "nanobot 게이트웨이는 openclaw 9 functional categories(NPC lifecycle / Chat streaming / File-workspace / Pairing / Error mapping / Config storage / Auth tokens / Telemetry / Provider abstraction)에 대해 functional parity 제공"
    - "Ed25519 device identity + challenge-response 페어링을 nanobot도 구현 (~/.nanobot-devices/${hash}.json). OpenClawPairingStatusCard UI 4상태(idle/connected/pairingRequired/error) 그대로 재활용"
    - "워크스페이스 경로 prefix ~/.nanobot/workspace-${agentId} (기존 ~/.openclaw/workspace-*는 1회용 마이그레이션 스크립트로 이동)"
    - "NPC persona의 source of truth는 DB npcs.openclawConfig.personaConfig (필드명 유지). nanobot은 매 호출마다 system prompt를 DB에서 재구성"
    - "IDENTITY.md/SOUL.md는 워크스페이스에 write-only mirror로 같이 쓰기 (인간 디버깅·tail 용도). nanobot agent loop은 이 파일을 read 하지 않는다"
    - "Error 응답은 openclaw 호환 shape 유지: {ok, errorCode, error, requestId, details, pairingRequired}. HTTP 409는 pairing required 케이스"
    - "Chat streaming은 openclaw와 동일 onDelta 콜백 패턴 + 180s timeout + chatAbort RPC 지원 (functional parity)"
    - "AI_PROVIDER=nanobot 모드에서 agents.create/agents.files.set RPC는 no-op (DB의 personaConfig가 source of truth)"
    - "AC-008 LLM 위젯의 $60 도달 시 NPCReport(ERROR) push, $90 도달 시 NPCReport(ERROR) + BUDGET_EXCEEDED로 LLM 호출 차단 — v9에서 명시 enforcement 추가"
    - "DB 컬럼명 npcs.openclawConfig 유지 (rename 영향도 vs 명확성 tradeoff에서 영향도 우선). 의미는 'agent gateway config'로 reinterpret"

  must_not:
    - "pgvector를 MVP 의존성에 포함 (stretch goal로만 — v9에서 PostgreSQL은 must 승격, pgvector만 stretch 유지)"
    - "Obsidian vault를 public repo에 올리기 (민감 규제 본문 노출 방지)"
    - "LLM 응답을 Citation 없이 사용자에게 노출"
    - "ARCHITECTURE_INVARIANTS.md Part 1의 4대 절대 규칙 위반"
    - "차터에 명시된 5개 소스 외 추가 소스 추가 (scope creep 방지)"
    - "deskrpg 원본 맵 에디터·멀티플레이어 코드를 유지 (불필요 기능 제거)"
    - "비용 모니터링 없이 LLM 호출 (월 예산 $40 초과 위험)"
    - "Crawler 실패 시 silent fail (Flexible Parser는 반드시 알림)"
    - "주간 회의 디지스트가 Citation 없는 LLM 요약에 의존 (반드시 Regulation·ImpactAnalysis 참조)"
    - "Backend가 vault/ 디렉토리를 파일시스템으로 직접 read/write (v5 — Obsidian REST API 강제)"
    - "Obsidian REST API 호출에 SSRF whitelist 등록 누락 (보안 강화)"
    - "누적 cost_usd >= $90 RED 임계 도달 후 LLM 호출 계속 (v6 — BUDGET_EXCEEDED 차단)"
    # ── v8 신규 (deskrpg 라이센스 명시) ──
    - "deskrpg fork를 상업 배포 (Sustainable Use License 1.0 위반)"
    - "LPC asset의 별도 라이센스(LICENSE-assets.md) 헤더 제거 또는 누락"
    - "deskrpg 라이센스 고지 누락한 채 외부 데모/배포 공개 (학술 시연 OK, 외부 배포 X)"
    # ── v9 신규 (Postgres + openclaw 제거) ──
    - "AI_PROVIDER=openclaw 신규 코드 추가 (openclaw 경로는 v9 contract phase에서 제거 대상)"
    - "openclaw 모드와 nanobot 모드를 동시 운영하는 dual-mode 코드 신규 작성"
    - "nanobot agent loop이 .md persona 파일(IDENTITY.md/SOUL.md)을 read (drift/loop/bloat 위험 — DB가 source of truth)"
    - "legacy npcs.openclawConfig.persona 문자열 필드 신규 참조 (deprecated, .personaConfig 사용)"
    - "SQLite 코드 신규 작성 또는 better-sqlite3 의존성 재추가"
    - "워크스페이스 ~/.openclaw/ 경로 신규 참조 (v9에서 ~/.nanobot/로 마이그레이션 후 제거)"
    - "Ed25519 device key 알고리즘 변경 (호환성 깨짐 + UI 페어링 흐름 봉인)"

  should:
    - "RAG는 BM25부터 — 정확도 부족 시 pgvector stretch"
    - "RegulationVersion diff는 LLM 1줄 요약으로 시작 (텍스트 diff는 stretch)"
    - "GitHub Actions CI로 게이트(.harness/gates) 자동 실행"
    - "Notification(앱 토스트)은 사용자가 RPG 맵 밖에 있을 때만 fallback (MVP는 NPCReport만)"
    - "부서(target_department)는 자유 텍스트로 시작 (시연: '리테일'), enum 변환은 v2"
    - "4개 소스(BOK/FSC/국회·관보/BCBS) 인터페이스 증명은 코드 stub + mock 데이터 1건"
    - "Agent 타입은 MVP에서 Crawler + ImpactAnalyzer 2개만 (요약/디스패처 NPC는 stretch)"
    - "LLM 캐싱(prompt cache, embedding cache) 적극 활용 — $100/2.5개월 예산 보호. v6: OpenRouter prompt cache 지원 Qwen 변종 우선 (변종별 지원 여부 확인 필요)"
    - "주간 회의 디지스트는 메인 시연 4단계와 분리된 별도 30초 페이즈 — 발표 5분 한도 보호"
    - "주간 회의는 시연일 직전 1회만 자동 발화 시연 (실제 cron schedule은 stretch)"
    - "Scope change: 주 1회 금요일 30분 retrospective에서 소/중/대형 triage matrix로 분류 (v4)"
    - "Vault push는 시연 데모 직전·주 1회 retro 후 사람이 수동 실행 (v4)"
    # ── v9 신규 ──
    - "openclaw 경로 dead code 제거는 parallel-change methodology의 contract phase로 일괄 수행 (Expand→Migrate는 v9 진입 = 완료)"
    - "SQLite 코드 제거도 같은 contract phase에 묶기 (schema-sqlite.ts, better-sqlite3, DB_TYPE 분기, sqlite-base-schema.js)"
    - "openclaw 카테고리별 9개 AC는 functional category 단위로 PR 분할 (한 PR에 9개 다 담지 않기 — 회귀 위험 분산)"
    - "Ed25519 페어링은 nanobot의 첫 부팅 시 자동 셋업 시도 + 실패 시 PairingStatusCard UI로 안내 (시연 시 페어링 실패 위험 최소화)"
    - "PostgreSQL은 docker-compose의 healthcheck로 ready 보장 후 deskrpg/nanobot 컨테이너 기동"

# ─────────────────────────────────────────────────────────────────────
# Acceptance Criteria — testable 만 작성. complexity가 Pair Mode를 결정
# ─────────────────────────────────────────────────────────────────────
acceptance_criteria:
  - id: "AC-001"
    description: |
      FSS 보도·규정·해설 3개 게시판을 크롤링해 신규/개정 Regulation을
      SQLite + Obsidian vault에 저장한다 (1게시판 1건 이상 검증 가능).
    verification: "automated"
    priority: "must"
    complexity: "high"
    rationale: "3-tier 전체 + 외부 사이트 + Flexible Parser → Pair Mode + Test Designer 강제"

  - id: "AC-002"
    description: |
      신규 Regulation 발견 후 1시간 이내(시연일 기준)에 NPCReport(NEW_REGULATION)이
      대시보드 화면에 시각·청각 효과로 표시된다.
    verification: "manual"
    priority: "must"
    complexity: "medium"
    rationale: "스케줄러 + 이벤트 전파 → Pair Mode 선택적"

  - id: "AC-003"
    description: |
      사용자 캐릭터가 분석 NPC에게 자연어로 '리테일 영향'을 질문하면
      ImpactAnalysis 응답이 in-world 말풍선으로 표시되며, 응답에 1개 이상의
      Citation(원문 인용 + char_offset)이 포함된다.
    verification: "both"
    priority: "must"
    complexity: "high"
    rationale: "LLM API + RAG + Presentation → Pair Mode + Test Designer 강제"

  - id: "AC-004"
    description: |
      대시보드 필터가 4종 이상 동작한다: 소스(source_codes), 분류(change_types),
      부서 영향(target_departments), 날짜 범위(date_from/to).
    verification: "automated"
    priority: "must"
    complexity: "low"
    rationale: "단순 쿼리 + UI → Direct 구현"

  - id: "AC-005"
    description: |
      메인 시연 시나리오 4단계가 끊김 없이 동작한다:
      (1) 사용자 캐릭터 입장
      (2) 크롤러 NPC가 신규 Regulation 보고 (NPCReport)
      (3) 사용자가 분석 NPC에게 '리테일 영향' 질문 (askAnalystNPC)
      (4) 분석 NPC가 Citation 포함 응답 (말풍선)
    verification: "manual"
    priority: "must"
    complexity: "high"
    rationale: "전체 통합 시나리오 — 발표 acceptance"

  - id: "AC-006"
    description: |
      Backend가 Obsidian Local REST API plugin(port 27123)을 통해 VaultDocument를
      markdown으로 PUT/POST한다. frontmatter에 #topic 태그가 포함되고 본문에
      '## Connected Knowledge' 섹션과 1개 이상 [[wikilink]]가 포함된다.
      vault 자체는 Obsidian이 관리하며, Obsidian Git plugin이 private remote에
      sync되도록 설정되어 있다 (push는 사용자 수동).
    verification: "both"
    priority: "must"
    complexity: "medium"
    rationale: "v5: REST API 호출 + Bearer Token + SSRF whitelist + frontmatter 규칙 → 단순 파일 write보다 의존성 다층. Pair Mode 선택적."

  - id: "AC-007"
    description: |
      4개 소스(BOK/FSC/국회·관보/BCBS)의 RegulationSource 엔트리가 SQLite에
      등록되고, 각 소스마다 mock 데이터 1건이 Vault + Regulation 테이블에
      존재한다 (확장성 증명).
    verification: "automated"
    priority: "must"
    complexity: "low"
    rationale: "데이터 seeding → Direct 구현"

  - id: "AC-008"
    description: |
      모든 LLM API 호출(OpenRouter+Qwen, v6)이 LLMUsageRecord에 기록되며,
      누적 cost_usd 임계치 도달 시 위젯 색상이 단계별로 변경되고 NPC 알림이
      발생한다 (v6 단계별, v9 enforcement 명시):
        • $30 도달: 위젯 YELLOW + stderr 경고 (PR2a/2b로 구현 완료)
        • $60 도달: 위젯 ORANGE + NPCReport(ERROR) push (v9 신규 enforcement)
        • $90 도달: 위젯 RED + NPCReport(ERROR) + 호출 차단 BUDGET_EXCEEDED (v9 신규 enforcement)
      메인 시연 시나리오 4단계 진행 중 사용자 화면에 'LLM 사용량 위젯'이
      상시 표시되어 (a) 누적 비용 USD, (b) 누적 호출 횟수, (c) 캐시 적중률(%),
      (d) 직전 호출 모델명, (e) threshold_level을 실시간(WebSocket push)으로
      갱신한다.
      v9 추가 검증: $90 RED 도달 후 LLM 호출 시도가 BUDGET_EXCEEDED 에러로
      차단되며 NPCReport(ERROR)이 dispatched 되는 통합 테스트 1건 이상.
    verification: "both"
    priority: "must"
    complexity: "high"
    rationale: "v3+v6: nanobot fork 커스텀 + WebSocket 실시간 push + UI 위젯 + 단계별 색상 + 시연 시나리오 핵심 wow → 3-tier 전체 통합. v9: $60/$90 enforcement 추가로 미구현 부분 완결. Pair Mode + Test Designer 강제."

  - id: "AC-009"
    description: |
      RegulationVersion 이력이 동일 external_id에 대해 최소 2회 이상 캡처된다
      (개정 케이스 시뮬레이션). diff_summary는 LLM 1줄 요약으로 채워진다.
    verification: "automated"
    priority: "should"
    complexity: "medium"
    rationale: "변경 이력 페인 포인트 해소 — Pair Mode 선택적"

  - id: "AC-010"
    description: |
      .harness/gates의 default 게이트(check-secrets/boundaries/structure/spec/
      layers/security/deps)가 모두 PASS 한다.
    verification: "automated"
    priority: "must"
    complexity: "low"
    rationale: "harness 게이트 자동 실행 — Direct 구현"

  - id: "AC-011"
    description: |
      '주간 컴플라이언스 회의실' 씬에서 크롤러 NPC + 분석 NPC가 한 방에 모여
      MeetingReport를 생성·낭독한다. 디지스트는 다음 4개 항목을 포함:
      (a) 이번 주 신규 Regulation 건수
      (b) 영향도 HIGH 건수
      (c) 가장 중요한 1건의 제목 + Citation 1개
      (d) 다음 주 모니터링 권고 1줄
    verification: "both"
    priority: "must"
    complexity: "high"
    rationale: "AI 미팅룸 repurpose — 다중 NPC 조율 + 디지스트 LLM + 별도 씬 통합"

  - id: "AC-012"
    description: |
      LPC 캐릭터 커스터마이징이 동작한다. 사용자가 의상·머리 부품을 1개 이상
      변경하면 UserCharacter.sprite_asset_id (실 코드: characters.appearance JSON
      필드)에 반영되어 재로드 시에도 유지된다.
      v9 노트: ontology 이름 'sprite_asset_id'와 실 코드 컬럼 'characters.appearance'
      의 드리프트는 v10 정렬 후보로 보류 (이번 단일 변경에서는 데이터 형식만 유지).
    verification: "automated"
    priority: "must"
    complexity: "low"
    rationale: "deskrpg 원본 기능 KEEP — 단순 상태 영속화 → Direct 구현"

  # ─── v9 신규 (openclaw → nanobot functional parity) ───
  - id: "AC-013"
    description: |
      NPC/Agent lifecycle parity. AI_PROVIDER=nanobot 모드에서 다음 RPC가
      openclaw와 functionally 동등하게 동작한다:
        • agents.create (npcs.openclawConfig.agentId 발급 + personaConfig 저장)
        • agents.delete (npcs row 삭제 + 워크스페이스 cleanup)
        • agents.files.set (IDENTITY.md/SOUL.md 워크스페이스 write — write-only mirror)
        • agents.list (channel 단위 agent 목록 반환)
      검증: 통합 테스트 1건 — POST /api/npcs → POST /api/npcs/:id (persona 변경)
      → DELETE /api/npcs/:id 의 happy path가 nanobot 모드에서 통과.
    verification: "both"
    priority: "must"
    complexity: "high"
    rationale: "9 functional category 중 가장 surface 큼. nanobot stateless 특성과 openclaw stateful 모델 차이를 매핑. Pair Mode + Test Designer 강제."

  - id: "AC-014"
    description: |
      Chat streaming parity. nanobot 게이트웨이가 chatSend(agentId, sessionKey,
      message, onDelta) 인터페이스를 구현하며 다음을 만족:
        • SSE-style onDelta 콜백 (chunk마다 invoke)
        • 180s timeout 후 자동 중단
        • chatAbort(agentId, sessionKey)로 in-flight 스트림 취소 가능
      검증: deskrpg socket-handlers의 chat:send 이벤트로 nanobot 응답이
      streaming chunk로 전달되어 in-world 말풍선이 점진적으로 채워진다.
    verification: "both"
    priority: "must"
    complexity: "high"
    rationale: "사용자 체감 critical path. AC-003/AC-005 시연 시나리오의 backbone."

  - id: "AC-015"
    description: |
      Workspace file management parity. nanobot 워크스페이스 ~/.nanobot/workspace-${agentId}
      에 IDENTITY.md/SOUL.md가 write-only mirror로 저장된다. nanobot agent loop은
      이 파일들을 read 하지 않으며 (DB의 personaConfig가 source of truth), 디렉토리
      마이그레이션(기존 ~/.openclaw/* → ~/.nanobot/*)은 첫 부팅 시 자동 수행.
    verification: "automated"
    priority: "must"
    complexity: "medium"
    rationale: "마이그레이션 + write-only 보장 — 단순 파일 IO지만 누락 시 디버깅 봉인"

  - id: "AC-016"
    description: |
      Device pairing parity. nanobot 게이트웨이가 다음을 구현:
        • Ed25519 keypair 생성 + ~/.nanobot-devices/${hash}.json 저장
        • Pairing challenge-response (modern device auth protocol)
        • Pairing state machine 4상태 (idle/connected/pairingRequired/error)
        • OpenClawPairingStatusCard UI 컴포넌트 재활용 (브랜드만 'Nanobot Pairing'으로)
      검증: 페어링 미완 상태에서 RPC 호출 시 HTTP 409 + errorCode=PAIRING_REQUIRED
      반환, UI 카드는 pairingRequired 상태로 전환.
    verification: "both"
    priority: "must"
    complexity: "high"
    rationale: "암호학 + 상태머신 + UI 4상태 통합. 시연 시 페어링 실패 시 봉인 위험 → Pair Mode + Test Designer 강제."

  - id: "AC-017"
    description: |
      Error mapping parity. nanobot 에러는 openclaw 호환 shape으로 변환:
        { ok: false, errorCode: string, error: string, requestId: string,
          details: object, pairingRequired: boolean }
      HTTP 상태 매핑: PAIRING_REQUIRED → 409, NOT_PAIRED → 409, 기타 → fallback.
      검증: 강제 실패 케이스 3종(페어링 미완 / 인증 실패 / 일반 에러)에 대해
      buildGatewayErrorPayload + getGatewayErrorStatus 결과가 openclaw 모드와 동일.
    verification: "automated"
    priority: "must"
    complexity: "medium"
    rationale: "deskrpg API route catch 블록이 이 shape에 의존 — 다르면 UI 침묵 실패. 자동 테스트 가능."

  - id: "AC-018"
    description: |
      Configuration storage parity. npcs.openclawConfig JSONB 필드 shape 유지:
        { agentId: string, sessionKeyPrefix: string,
          personaConfig: { identity: string, soul: string } }
      v9: legacy npcs.openclawConfig.persona (string) 필드는 제거 (deprecated).
      검증: schema migration이 personaConfig만 정식으로 두고, parseDbObject /
      loadPersonaFromNpc 함수가 legacy 경로 없이 동작.
    verification: "automated"
    priority: "must"
    complexity: "low"
    rationale: "DB 필드 + 헬퍼 함수 정리 — 명확한 입출력 → Direct 구현"

  - id: "AC-019"
    description: |
      Authentication tokens parity. nanobot 게이트웨이가:
        • Bearer Token 인증 (Authorization 헤더 + INTERNAL_RPC_SECRET 검증)
        • 채널 단위 토큰 암호화 저장: AES-256-GCM, channels.gatewayConfig.encryptedToken
        • encryptGatewayToken/decryptGatewayToken 함수 호환 (v1 format: iv:tag:encrypted base64url)
      검증: 채널 페어링 후 encryptedToken이 DB에 base64url 형식으로 저장되고
      restart 후 decryptGatewayToken으로 복호화 + RPC 호출 성공.
    verification: "automated"
    priority: "must"
    complexity: "medium"
    rationale: "암호화 + DB + 재시작 영속성 — 보안 critical, 자동 테스트 가능."

  - id: "AC-020"
    description: |
      Telemetry parity. nanobot 모드의 모든 LLM 호출이 LLMUsageRecord에 기록되어
      AC-008 위젯에 실시간 반영된다 (provider='nanobot' 또는 'openrouter' 라벨링).
      검증: nanobot agent 1회 chat 호출 → llmUsageRecords에 row 1건 추가 + WebSocket
      llm-usage:update 이벤트 dispatch + 위젯의 누적 cost·call count 증가.
    verification: "both"
    priority: "must"
    complexity: "medium"
    rationale: "AC-008과 의존 — AC-008의 데이터 소스가 nanobot으로 전환됨을 보장"

  - id: "AC-021"
    description: |
      Provider abstraction hardening. AI_PROVIDER 환경변수의 default가 'nanobot'으로
      변경되고, AI_PROVIDER=openclaw 경로의 모든 코드(socket-handlers의 OpenClawGateway
      분기, nanobot-client.js의 dual-mode 코드 등)가 제거된다.
      검증: grep "AI_PROVIDER === 'openclaw'" → 0 hits. grep "openclawGateway" (instance
      use) → 0 hits. /api/* 라우트들이 nanobotAdapter 단일 경로로 통합.
    verification: "automated"
    priority: "must"
    complexity: "medium"
    rationale: "contract phase 완결 — dead code 제거가 본 AC의 acceptance. Direct + 게이트로 검증 가능."

# ─────────────────────────────────────────────────────────────────────
# Ontology — v1의 15 entities + v2 추가 3 = 18 entities
# ─────────────────────────────────────────────────────────────────────
ontology:
  entities:
    # ─── v1 unchanged (15 entities) ───
    - name: Regulation
      korean_name: 규제
      description: "한 건의 규제 변동(보도·규정·해설 통합) 최상위 엔티티"
      fields:
        - { name: id, type: UUID, required: true }
        - { name: source_id, type: reference, required: true, ref: RegulationSource }
        - { name: external_id, type: string, required: true }
        - { name: title, type: string, required: true }
        - { name: board_type, type: enum, required: true, values: [보도, 규정, 해설] }
        - { name: change_type, type: enum, required: true, values: [NEW, AMENDED] }
        - { name: published_at, type: date, required: true }
        - { name: detected_at, type: date, required: true }
        - { name: source_url, type: string, required: true }
        - { name: vault_path, type: string, required: true }
        - { name: raw_text, type: string, required: true }
      relationships:
        - { target: RegulationSource, type: belongs_to }
        - { target: ImpactAnalysis, type: has_many }
        - { target: RegulationVersion, type: has_many }
        - { target: Notification, type: has_many }
        - { target: VaultDocument, type: has_one }

    - name: RegulationSource
      korean_name: 규제 소스
      description: "규제 발행 출처 기관/사이트. MVP는 FSS만 FULL"
      fields:
        - { name: id, type: UUID, required: true }
        - { name: code, type: enum, required: true, values: [FSS, BOK, FSC, NA_GAZETTE, BCBS] }
        - { name: name_ko, type: string, required: true }
        - { name: base_url, type: string, required: true }
        - { name: language, type: enum, required: true, values: [KO, EN] }
        - { name: mvp_status, type: enum, required: true, values: [FULL, INTERFACE_ONLY] }
        - { name: parser_config, type: string, required: true, note: "Flexible Parser JSON 직렬화" }
      relationships:
        - { target: Regulation, type: has_many }
        - { target: CrawlJob, type: has_many }

    - name: RegulationVersion
      korean_name: 규제 버전 이력
      description: "동일 external_id의 개정 이력 시계열"
      fields:
        - { name: id, type: UUID, required: true }
        - { name: regulation_id, type: reference, required: true, ref: Regulation }
        - { name: version_no, type: number, required: true }
        - { name: diff_summary, type: string, required: false, note: "LLM 1줄 요약" }
        - { name: snapshot_text, type: string, required: true }
        - { name: captured_at, type: date, required: true }
      relationships:
        - { target: Regulation, type: belongs_to }

    - name: ImpactAnalysis
      korean_name: 영향도 분석
      description: "LLM이 부서별 영향을 표준화 형식으로 산출 (시연 오프닝)"
      fields:
        - { name: id, type: UUID, required: true }
        - { name: regulation_id, type: reference, required: true, ref: Regulation }
        - { name: requested_by, type: reference, required: false, ref: UserCharacter }
        - { name: target_department, type: string, required: true, note: "MVP는 자유 텍스트, 시연: '리테일'" }
        - { name: severity, type: enum, required: true, values: [LOW, MEDIUM, HIGH] }
        - { name: summary, type: string, required: true }
        - { name: llm_model, type: string, required: true }
        - { name: token_usage, type: number, required: true }
        - { name: created_at, type: date, required: true }
      relationships:
        - { target: Regulation, type: belongs_to }
        - { target: Citation, type: has_many }
        - { target: UserCharacter, type: belongs_to }

    - name: Citation
      korean_name: 근거 인용
      description: "ImpactAnalysis 결론의 원문 근거 구절. hallucination 방지"
      fields:
        - { name: id, type: UUID, required: true }
        - { name: impact_analysis_id, type: reference, required: true, ref: ImpactAnalysis }
        - { name: regulation_id, type: reference, required: true, ref: Regulation }
        - { name: quoted_text, type: string, required: true }
        - { name: char_offset_start, type: number, required: true }
        - { name: char_offset_end, type: number, required: true }
        - { name: relevance_score, type: number, required: false, note: "BM25 점수" }
      relationships:
        - { target: ImpactAnalysis, type: belongs_to }
        - { target: Regulation, type: belongs_to }

    - name: Agent
      korean_name: 에이전트
      description: "nanobot 워크플로우 단위이자 deskrpg NPC. 추상 베이스"
      fields:
        - { name: id, type: UUID, required: true }
        - { name: agent_type, type: enum, required: true, values: [CRAWLER, IMPACT_ANALYZER] }
        - { name: display_name, type: string, required: true }
        - { name: sprite_asset_id, type: string, required: true, note: "deskrpg 픽셀 자산 키" }
        - { name: status, type: enum, required: true, values: [IDLE, WORKING, REPORTING, ERROR, IN_MEETING] }
        - { name: current_task_id, type: reference, required: false }
      relationships:
        - { target: CrawlJob, type: has_many }
        - { target: ImpactAnalysis, type: has_many }
        - { target: NPCReport, type: has_many }
        - { target: LLMUsageRecord, type: has_many }
        - { target: MeetingParticipant, type: has_many }

    - name: CrawlerAgent
      korean_name: 크롤러 NPC
      description: "Agent의 구체 타입 — 별도 Python 서비스(scrapy/playwright)"
      fields:
        - { name: assigned_source_id, type: reference, required: true, ref: RegulationSource }
        - { name: poll_interval_minutes, type: number, required: true }
      relationships:
        - { target: Agent, type: has_one, note: "is_a (specialization)" }
        - { target: RegulationSource, type: belongs_to }

    - name: ImpactAnalyzerAgent
      korean_name: 분석 NPC
      description: "Agent의 구체 타입 — RAG(BM25) + LLM API (v6: OpenRouter+Qwen 기본)"
      fields:
        - { name: rag_strategy, type: enum, required: true, values: [BM25, HYBRID] }
        - { name: llm_provider, type: enum, required: true, values: [OPENROUTER, OPENAI, CLAUDE], note: "v6: OPENROUTER 추가 (default)" }
      relationships:
        - { target: Agent, type: has_one, note: "is_a (specialization)" }
        - { target: ImpactAnalysis, type: has_many }

    - name: UserCharacter
      korean_name: 사용자 캐릭터
      description: "deskrpg 입장 플레이어. 시연 시나리오 1인칭. v2부터 LPC 부품 목록 보유"
      fields:
        - { name: id, type: UUID, required: true }
        - { name: display_name, type: string, required: true }
        - { name: department, type: string, required: false }
        - { name: sprite_asset_id, type: string, required: true }
        - { name: lpc_parts, type: string, required: true, note: "JSON {head, body, hair, outfit, ...} — LPC 커스터마이징 영속 (v2)" }
      relationships:
        - { target: ImpactAnalysis, type: has_many }
        - { target: NPCReport, type: has_many }
        - { target: DashboardFilter, type: has_many }
        - { target: MeetingParticipant, type: has_many, note: "v2 — 사용자가 회의 참관" }

    - name: CrawlJob
      korean_name: 수집 작업
      description: "한 번의 폴링 사이클 실행 기록"
      fields:
        - { name: id, type: UUID, required: true }
        - { name: crawler_agent_id, type: reference, required: true, ref: CrawlerAgent }
        - { name: source_id, type: reference, required: true, ref: RegulationSource }
        - { name: started_at, type: date, required: true }
        - { name: finished_at, type: date, required: false }
        - { name: status, type: enum, required: true, values: [RUNNING, SUCCESS, FAILED] }
        - { name: items_found, type: number, required: false }
        - { name: parser_error, type: string, required: false }
      relationships:
        - { target: CrawlerAgent, type: belongs_to }
        - { target: RegulationSource, type: belongs_to }

    - name: NPCReport
      korean_name: NPC 보고
      description: "NPC가 사용자에게 in-world 전달하는 보고 (시각·청각)"
      fields:
        - { name: id, type: UUID, required: true }
        - { name: agent_id, type: reference, required: true, ref: Agent }
        - { name: user_character_id, type: reference, required: true, ref: UserCharacter }
        - { name: report_type, type: enum, required: true, values: [NEW_REGULATION, ANALYSIS_READY, ERROR, MEETING_DIGEST] }
        - { name: payload_ref, type: string, required: true, note: "Regulation.id 또는 ImpactAnalysis.id 또는 MeetingReport.id" }
        - { name: visual_effect, type: string, required: true }
        - { name: audio_effect, type: string, required: true }
        - { name: created_at, type: date, required: true }
        - { name: acknowledged_at, type: date, required: false }
      relationships:
        - { target: Agent, type: belongs_to }
        - { target: UserCharacter, type: belongs_to }

    - name: Notification
      korean_name: 알림
      description: "RPG 맵 밖 fallback 알림 (앱 토스트/배지). MVP에서는 stretch"
      fields:
        - { name: id, type: UUID, required: true }
        - { name: regulation_id, type: reference, required: true, ref: Regulation }
        - { name: channel, type: enum, required: true, values: [IN_APP, TOAST, BADGE] }
        - { name: created_at, type: date, required: true }
        - { name: read_at, type: date, required: false }
      relationships:
        - { target: Regulation, type: belongs_to }

    - name: DashboardFilter
      korean_name: 대시보드 필터
      description: "AC-004의 4종 필터 상태"
      fields:
        - { name: id, type: UUID, required: true }
        - { name: user_character_id, type: reference, required: true, ref: UserCharacter }
        - { name: source_codes, type: string, required: false, note: "JSON array<string>" }
        - { name: change_types, type: string, required: false, note: "JSON array<enum>" }
        - { name: target_departments, type: string, required: false, note: "JSON array<string>" }
        - { name: date_from, type: date, required: false }
        - { name: date_to, type: date, required: false }
      relationships:
        - { target: UserCharacter, type: belongs_to }

    - name: VaultDocument
      korean_name: Vault 문서
      description: "Obsidian markdown vault 한 파일 — Obsidian Local REST API로 CRUD (v5)"
      fields:
        - { name: vault_path, type: string, required: true, note: "PK. Obsidian vault 내 상대 경로 (예: FSS/보도/2026/05/16-xxx.md)" }
        - { name: regulation_id, type: reference, required: true, ref: Regulation }
        - { name: frontmatter, type: string, required: true, note: "YAML 직렬화" }
        - { name: body_markdown, type: string, required: true, note: "본문 + Connected Knowledge 섹션 필수 (v5)" }
        - { name: topic_tag, type: string, required: true, note: "v5: '#topic' 태그 (예: '#regulation/FSS/보도'). graph view용" }
        - { name: connected_knowledge_links, type: string, required: true, note: "v5: JSON array<string> — [[wikilink]] 목록. 최소 1개" }
        - { name: obsidian_synced_at, type: date, required: true, note: "v5: REST API write 시각 (Obsidian → vault 반영 완료)" }
      relationships:
        - { target: Regulation, type: belongs_to }

    - name: LLMUsageRecord
      korean_name: LLM 사용량 기록
      description: "$100/2.5개월 예산 추적 (nanobot fork 커스텀, v6: OpenRouter+Qwen)"
      fields:
        - { name: id, type: UUID, required: true }
        - { name: agent_id, type: reference, required: true, ref: Agent }
        - { name: provider, type: enum, required: true, values: [OPENROUTER, OPENAI, CLAUDE], note: "v6: OPENROUTER 추가" }
        - { name: model, type: string, required: true }
        - { name: input_tokens, type: number, required: true }
        - { name: output_tokens, type: number, required: true }
        - { name: cost_usd, type: number, required: true }
        - { name: cached, type: boolean, required: true }
        - { name: created_at, type: date, required: true }
      relationships:
        - { target: Agent, type: belongs_to }

    # ─── v2 NEW (3 entities) ───
    - name: MeetingSession
      korean_name: 회의 세션
      description: |
        '주간 컴플라이언스 회의실' 씬에서 NPC들이 모여 디지스트를 생성·낭독하는
        1회성 회의 세션. AI 미팅룸 원본 코드를 RegTrack 도메인으로 repurpose한 결과.
      fields:
        - { name: id, type: UUID, required: true }
        - { name: scheduled_for, type: date, required: true, note: "주간 회의 예정 시각 (보통 매주 금요일 17:00)" }
        - { name: started_at, type: date, required: false }
        - { name: ended_at, type: date, required: false }
        - { name: status, type: enum, required: true, values: [SCHEDULED, IN_PROGRESS, COMPLETED, FAILED] }
        - { name: room_scene_id, type: string, required: true, note: "deskrpg 미팅룸 씬 식별자" }
        - { name: digest_window_start, type: date, required: true, note: "디지스트 대상 기간 시작" }
        - { name: digest_window_end, type: date, required: true, note: "디지스트 대상 기간 끝" }
      relationships:
        - { target: MeetingParticipant, type: has_many }
        - { target: MeetingReport, type: has_one }

    - name: MeetingParticipant
      korean_name: 회의 참가자
      description: |
        MeetingSession에 참여한 Agent(NPC) 또는 UserCharacter. 좌석 위치·발언 순서 보유.
      fields:
        - { name: id, type: UUID, required: true }
        - { name: meeting_session_id, type: reference, required: true, ref: MeetingSession }
        - { name: participant_type, type: enum, required: true, values: [AGENT, USER] }
        - { name: agent_id, type: reference, required: false, ref: Agent }
        - { name: user_character_id, type: reference, required: false, ref: UserCharacter }
        - { name: seat_position, type: string, required: true, note: "씬 좌표 (x,y) 직렬화" }
        - { name: speaking_order, type: number, required: false }
      relationships:
        - { target: MeetingSession, type: belongs_to }
        - { target: Agent, type: belongs_to, optional: true }
        - { target: UserCharacter, type: belongs_to, optional: true }

    - name: MeetingReport
      korean_name: 회의 디지스트 보고서
      description: |
        MeetingSession이 산출한 주간 컴플라이언스 디지스트. AC-011의 4개 항목 (a~d)
        포함. NPC가 in-world 낭독.
      fields:
        - { name: id, type: UUID, required: true }
        - { name: meeting_session_id, type: reference, required: true, ref: MeetingSession }
        - { name: new_regulation_count, type: number, required: true, note: "(a) 신규 건수" }
        - { name: high_severity_count, type: number, required: true, note: "(b) HIGH 영향 건수" }
        - { name: top_regulation_id, type: reference, required: true, ref: Regulation, note: "(c) 가장 중요한 1건" }
        - { name: top_citation_id, type: reference, required: true, ref: Citation, note: "(c) 1건의 Citation" }
        - { name: next_week_recommendation, type: string, required: true, note: "(d) 다음 주 권고 1줄" }
        - { name: digest_text, type: string, required: true, note: "낭독용 전문 (LLM 생성)" }
        - { name: llm_model, type: string, required: true }
        - { name: token_usage, type: number, required: true }
        - { name: created_at, type: date, required: true }
      relationships:
        - { target: MeetingSession, type: belongs_to }
        - { target: Regulation, type: belongs_to, note: "top_regulation_id" }
        - { target: Citation, type: belongs_to, note: "top_citation_id" }

    # ─── v9 신규 (nanobot gateway 영역 — 3 entities) ───
    - name: NanobotAgentSession
      korean_name: 나노봇 에이전트 세션
      description: "nanobot 게이트웨이의 chat 세션 추적 (chatSend/chatAbort 단위)"
      fields:
        - { name: id, type: UUID, required: true }
        - { name: npc_id, type: reference, required: true, ref: NPC }
        - { name: agent_id, type: string, required: true, note: "npcs.openclawConfig.agentId — 필드명 유지" }
        - { name: session_key, type: string, required: true, note: "agent:{agentId}:{sessionName}" }
        - { name: started_at, type: date, required: true }
        - { name: last_chunk_at, type: date, required: false, note: "streaming 진행 추적" }
        - { name: aborted_at, type: date, required: false }
        - { name: timeout_ms, type: number, required: true, note: "default 180000 (180s, openclaw parity)" }
        - { name: total_tokens, type: number, required: false, note: "LLMUsageRecord와 join 후 채워짐" }
      relationships:
        - { target: NPC, type: belongs_to }
        - { target: LLMUsageRecord, type: has_many, note: "세션 중 발생한 LLM 호출 집계" }

    - name: GatewayDeviceIdentity
      korean_name: 게이트웨이 디바이스 신원
      description: "Ed25519 device keypair + 페어링 상태 (openclaw parity)"
      fields:
        - { name: device_hash, type: string, required: true, note: "Ed25519 public key의 hash — 파일명 prefix" }
        - { name: public_key, type: string, required: true, note: "base64url Ed25519 public" }
        - { name: private_key_path, type: string, required: true, note: "~/.nanobot-devices/${hash}.json" }
        - { name: pairing_state, type: enum, required: true, values: [idle, connecting, connected, reconnecting, pairing_required, error] }
        - { name: paired_with_channel_id, type: reference, required: false, ref: Channel }
        - { name: last_pairing_request_id, type: string, required: false, note: "errorCode=PAIRING_REQUIRED 시 details.code" }
        - { name: created_at, type: date, required: true }
        - { name: connected_at, type: date, required: false }
      relationships:
        - { target: Channel, type: belongs_to, note: "paired_with_channel_id, optional" }

    - name: GatewayChannelBinding
      korean_name: 게이트웨이 채널 바인딩
      description: "채널별 nanobot 게이트웨이 토큰·암호화 저장 (encryptGatewayToken/decryptGatewayToken)"
      fields:
        - { name: channel_id, type: reference, required: true, ref: Channel }
        - { name: encrypted_token, type: string, required: true, note: "v1 format: iv:tag:encrypted base64url, AES-256-GCM" }
        - { name: cipher_key_source, type: string, required: true, note: "INTERNAL_RPC_SECRET 또는 JWT_SECRET" }
        - { name: gateway_url, type: string, required: true, note: "nanobot 게이트웨이 base URL" }
        - { name: created_at, type: date, required: true }
        - { name: rotated_at, type: date, required: false }
      relationships:
        - { target: Channel, type: belongs_to }
        - { target: GatewayDeviceIdentity, type: has_one, note: "채널이 페어링한 디바이스" }

  actions:
    # ─── v1 unchanged (10 actions) ───
    - name: crawlRegulationSource
      korean_name: 규제 소스 크롤링
      actor: CrawlerAgent
      input: "RegulationSource + poll_interval_minutes"
      output: "신규/개정 Regulation 목록 + CrawlJob 기록"
      side_effects:
        - "VaultDocument 신규 생성"
        - "SQLite Regulation/RegulationVersion insert"
        - "신규 발견 시 NPCReport(NEW_REGULATION) 생성"
        - "parser_error 시 알림 트리거 (Flexible Parser)"

    - name: classifyChangeType
      korean_name: 신규/개정 분류
      actor: System(Logic)
      input: "신규 발견 Regulation 후보 + 기존 RegulationVersion 이력"
      output: "change_type ∈ {NEW, AMENDED}"
      side_effects:
        - "AMENDED 시 RegulationVersion 추가 + diff_summary(LLM 1줄) 산출"

    - name: analyzeImpact
      korean_name: 영향도 분석
      actor: ImpactAnalyzerAgent
      input: "Regulation + target_department"
      output: "ImpactAnalysis + Citation 목록"
      side_effects:
        - "LLM API 호출 (OpenAI/Claude)"
        - "LLMUsageRecord 적재"
        - "NPCReport(ANALYSIS_READY) 생성"
        - "BM25 인덱스 조회"

    - name: askAnalystNPC
      korean_name: 분석 NPC에게 질문
      actor: UserCharacter
      input: "자연어 질문 (예: '리테일 영향')"
      output: "ImpactAnalysis 응답 (in-world 말풍선)"
      side_effects:
        - "analyzeImpact 트리거"
        - "NPCReport 생성"

    - name: enterDashboard
      korean_name: 대시보드 입장
      actor: UserCharacter
      input: "사용자 세션"
      output: "RPG 맵 렌더 + 활성 NPC + Pending NPCReport"
      side_effects:
        - "deskrpg 씬 초기화"

    - name: applyFilter
      korean_name: 필터 적용
      actor: UserCharacter
      input: "DashboardFilter (≥4종)"
      output: "필터링된 Regulation 목록 (카드/타임라인)"
      side_effects: []

    - name: syncVaultToGit
      korean_name: Vault git 동기화
      actor: UserCharacter (Obsidian Git plugin)
      input: "Obsidian이 관리하는 vault의 변경 markdown 파일들 (자동 staged by plugin)"
      output: "git commit + push (private repo) — Obsidian 단축키로 수동 실행"
      side_effects:
        - "팀원 vault에 변경 전파"
        - "v4 정책: 시연 데모 직전·주 1회 retro 후 수동 push 권장"

    # ─── v5 신규 (Obsidian Local REST API 통합) ───
    - name: pushToObsidianVault
      korean_name: Obsidian vault에 push
      actor: Backend (services.data.vault.obsidian_client)
      input: |
        VaultDocument (vault_path + frontmatter + body + topic_tag +
        connected_knowledge_links)
      output: |
        HTTP 201/204 응답 + obsidian_synced_at 갱신
      side_effects:
        - "Obsidian Local REST API에 PUT /vault/{path} 또는 POST 호출"
        - "Obsidian이 vault 디렉토리에 markdown 파일 작성"
        - "Obsidian graph view·tags index 자동 갱신"
        - "Bearer Token 인증 + SSRF whitelist 통과 (192.168.56.1/32)"
        - "실패 시 retry 3회 + parser_error에 기록"

    - name: searchObsidianVault
      korean_name: Obsidian vault 검색
      actor: Backend (services.rag 또는 services.impact)
      input: "query 자연어 또는 keyword"
      output: "matched VaultDocument 목록 + 발췌 (contextLength=100)"
      side_effects:
        - "Obsidian REST API POST /search/simple/ 호출"
        - "한국어 query는 URL 인코딩 (UTF-8)"
        - "BM25 인덱스 보조 검색으로 활용 가능 (stretch)"

    - name: parseFlexible
      korean_name: 유연 파싱
      actor: CrawlerAgent
      input: "원본 HTML + parser_config"
      output: "구조화 Regulation 후보"
      side_effects:
        - "파싱 실패 시 parser_error 기록 + 알림"

    - name: acknowledgeReport
      korean_name: NPC 보고 확인
      actor: UserCharacter
      input: "NPCReport id"
      output: "acknowledged 상태 전이"
      side_effects:
        - "시각·청각 효과 종료"

    - name: trackLLMUsage
      korean_name: LLM 사용량 추적
      actor: System(nanobot fork)
      input: "LLM API 호출 응답 (토큰·모델)"
      output: "LLMUsageRecord + 누적 cost_usd"
      side_effects:
        - "예산 임계치($40 누적) 초과 시 경고"

    # ─── v2 NEW (4 actions) ───
    - name: scheduleWeeklyMeeting
      korean_name: 주간 회의 예약
      actor: System(Logic)
      input: "다음 주 금요일 17:00 + digest_window (지난 7일)"
      output: "MeetingSession (status=SCHEDULED) + 참가자 목록"
      side_effects:
        - "MeetingParticipant 생성 (모든 활성 Agent + 활성 UserCharacter)"

    - name: conductMeeting
      korean_name: 회의 진행
      actor: System(Logic)
      input: "MeetingSession (status=SCHEDULED)"
      output: "MeetingReport + status=COMPLETED"
      side_effects:
        - "deskrpg 미팅룸 씬 활성화"
        - "각 Agent NPC가 좌석으로 이동"
        - "MeetingReport.digest_text를 NPC별 발화로 분배"
        - "NPCReport(MEETING_DIGEST) 생성"

    - name: generateMeetingDigest
      korean_name: 회의 디지스트 생성
      actor: ImpactAnalyzerAgent
      input: "digest_window 내 Regulation·ImpactAnalysis 집합"
      output: "MeetingReport (a/b/c/d 항목 모두 채움)"
      side_effects:
        - "LLM API 호출 (요약 + 다음 주 권고)"
        - "LLMUsageRecord 적재"
        - "top_regulation·top_citation 선정 (severity HIGH 우선)"

    - name: customizeAvatar
      korean_name: 아바타 커스터마이징
      actor: UserCharacter
      input: "LPC 부품 선택 (head/body/hair/outfit/...)"
      output: "UserCharacter.lpc_parts 업데이트 + sprite_asset_id 갱신"
      side_effects:
        - "deskrpg 캐릭터 스프라이트 재합성"
        - "재로드 시 영속 유지 (AC-012)"

    # ─── v9 신규 (nanobot 게이트웨이 actions — 6개) ───
    - name: pairDeviceWithChannel
      korean_name: 디바이스-채널 페어링
      actor: NanobotGateway
      input: "Channel + GatewayDeviceIdentity (Ed25519 keypair)"
      output: "GatewayChannelBinding + connected pairing_state"
      side_effects:
        - "GatewayDeviceIdentity.pairing_state: idle → connecting → connected"
        - "channels.gatewayConfig.encryptedToken 저장 (AES-256-GCM)"
        - "PairingStatusCard UI 상태 갱신"

    - name: chatSendStream
      korean_name: NPC 채팅 스트리밍 전송
      actor: NanobotGateway
      input: "agentId + sessionKey + message + onDelta 콜백"
      output: "스트리밍 chunk + 최종 응답 텍스트"
      side_effects:
        - "NanobotAgentSession row 신규/갱신"
        - "180s timeout 워치"
        - "LLMUsageRecord 적재 (AC-008/AC-020)"
        - "in-world 말풍선 점진 갱신 (socket-handlers)"

    - name: chatAbortStream
      korean_name: NPC 채팅 스트림 중단
      actor: NanobotGateway
      input: "agentId + sessionKey"
      output: "abort 확인"
      side_effects:
        - "NanobotAgentSession.aborted_at 기록"
        - "in-flight LLM 호출 cancel 신호"

    - name: createNpcAgent
      korean_name: NPC 에이전트 생성 (nanobot 모드)
      actor: NanobotGateway
      input: "personaConfig (identity + soul) + channelId"
      output: "agentId + workspace path (~/.nanobot/workspace-${agentId})"
      side_effects:
        - "npcs.openclawConfig.{agentId, sessionKeyPrefix, personaConfig} 저장 (필드명 유지)"
        - "워크스페이스에 IDENTITY.md/SOUL.md write-only mirror 작성"
        - "nanobot에서는 stateless이므로 agents.create RPC는 no-op (DB만 갱신)"

    - name: updateNpcPersona
      korean_name: NPC persona 업데이트
      actor: NanobotGateway
      input: "npcId + personaConfig (identity 또는 soul 갱신)"
      output: "갱신된 NPC + 워크스페이스 .md 파일"
      side_effects:
        - "npcs.openclawConfig.personaConfig 갱신"
        - "IDENTITY.md/SOUL.md 워크스페이스 mirror 재작성"
        - "다음 호출부터 nanobot이 새 persona를 system prompt로 사용 (DB 재구성)"

    - name: migrateLegacyOpenClawPaths
      korean_name: openclaw 레거시 경로 마이그레이션
      actor: NanobotGateway
      input: "첫 부팅 시 ~/.openclaw/ 및 ~/.openclaw-devices/ 존재 여부"
      output: "이동 결과 (이동 건수 + 실패 건수)"
      side_effects:
        - "~/.openclaw/workspace-* → ~/.nanobot/workspace-* 이동"
        - "~/.openclaw-devices/* → ~/.nanobot-devices/* 이동"
        - "로그에 마이그레이션 결과 기록 (1회용 스크립트)"

  synonyms:
    - { canonical: Regulation, aliases: [규제, 규정, 공시, 규제 변동, 규제 항목] }
    - { canonical: RegulationSource, aliases: [규제 소스, 소스, 게시판 출처] }
    - { canonical: ImpactAnalysis, aliases: [영향도 분석, 영향도, 영향 분석 결과] }
    - { canonical: ImpactAnalyzerAgent, aliases: [분석 NPC, 영향도 분석기, RAG agent, analyzer] }
    - { canonical: CrawlerAgent, aliases: [크롤러 NPC, 수집 NPC, 크롤러, 크롤링 엔진, scraper] }
    - { canonical: Agent, aliases: [에이전트, NPC, nanobot agent] }
    - { canonical: UserCharacter, aliases: [사용자, 플레이어, 사용자 캐릭] }
    - { canonical: Citation, aliases: [근거 인용, 근거 구절, 근거 문구] }
    - { canonical: NPCReport, aliases: [NPC 보고, in-world 보고, 말풍선 보고] }
    - { canonical: VaultDocument, aliases: [Obsidian 문서, vault 파일, markdown 원문] }
    - { canonical: DashboardFilter, aliases: [필터, 필터링 조건] }
    - { canonical: RegulationVersion, aliases: [개정 이력, 버전, 변경 이력] }
    - { canonical: change_type=NEW, aliases: [신규, new] }
    - { canonical: change_type=AMENDED, aliases: [개정, amended, 변경] }
    - { canonical: LLMUsageRecord, aliases: [LLM 사용량, 토큰 사용량, 비용 기록] }
    # v2 추가
    - { canonical: MeetingSession, aliases: [회의, 주간 회의, 컴플 회의, weekly meeting, 미팅] }
    - { canonical: MeetingReport, aliases: [회의 디지스트, 주간 보고, weekly digest, 회의 요약] }
    - { canonical: MeetingParticipant, aliases: [회의 참가자, 참석 NPC, attendee] }
    - { canonical: customizeAvatar, aliases: [LPC 커스터마이징, 캐릭터 꾸미기, 아바타 변경] }
    # v9 추가 (nanobot 게이트웨이 영역)
    - { canonical: "NanobotAgentSession", aliases: ["agent session", "chat session", "nanobot 세션", "agent:<id>:<name>"] }
    - { canonical: "GatewayDeviceIdentity", aliases: ["device identity", "Ed25519 keypair", "디바이스 신원", "pairing identity"] }
    - { canonical: "GatewayChannelBinding", aliases: ["채널 바인딩", "encrypted token", "gateway binding"], note: "amendment 2026-05-19: 신규 테이블 X — 기존 channelGatewayBindings(junction) + gatewayResources(token_encrypted, paired_device_id) 조합의 의미 alias. T-004 드롭." }
    - { canonical: "GatewayDeviceIdentity-keypair", aliases: ["~/.nanobot-devices/${hash}.json", "Ed25519 keypair 파일"], note: "amendment: DB가 아닌 파일시스템에 저장. gatewayResources.paired_device_id가 'WHICH device', 파일이 'OUR keypair'를 담당." }
    - { canonical: "AI_PROVIDER=nanobot", aliases: ["nanobot 모드", "nanobot adapter", "nanobot 단일 경로"] }
    - { canonical: "openclawConfig", aliases: ["gateway config (필드명 유지, 의미 reinterpret)", "agent config"], note: "필드명은 openclawConfig 유지하되 의미상 'gateway agent config'로 재해석" }

# ─────────────────────────────────────────────────────────────────────
# Architecture — 3-tier 매핑 (v1 베이스 + 미팅룸 씬 추가)
# ─────────────────────────────────────────────────────────────────────
architecture:
  pattern: "3-tier-layered"

  layers:
    presentation:
      description: "Next.js + TypeScript (deskrpg fork) — RPG UI · 대시보드 · NPC 조종 · 미팅룸 씬"
      directories:
        - "frontend/app"
        - "frontend/components"
        - "frontend/scenes/dashboard"   # 메인 사무실 맵
        - "frontend/scenes/meeting"     # v2 — 주간 컴플 회의실
        - "frontend/scenes/avatar"      # v2 — LPC 커스터마이징 모달
        - "frontend/lib/api"
      responsibilities:
        - "RPG 맵 렌더 (deskrpg 픽셀 자산)"
        - "사용자 입력 처리 (캐릭터 이동·NPC 클릭·말풍선)"
        - "대시보드 카드·필터·타임라인 UI"
        - "NPCReport 시각·청각 효과 재생"
        - "Obsidian vault 원문 임베드 또는 외부 링크"
        - "v2: 주간 회의실 씬 — NPC 좌석 배치·디지스트 낭독 자막·턴 애니"
        - "v2: LPC 커스터마이징 모달 — 부품 조합 미리보기·저장"
      cannot_access:
        - "database"
        - "external_services (LLM API, 크롤링 대상)"
        - "Obsidian vault 파일시스템 직접 접근"

    logic:
      description: "Python (nanobot fork + 별도 Crawler 서비스) — Agent 워크플로우 · 영향도 · RAG · 회의 오케스트레이션"
      directories:
        - "backend/nanobot"
        - "backend/agents"
        - "backend/services/impact"
        - "backend/services/rag"
        - "backend/services/llm"
        - "backend/services/meeting"   # v2 — 주간 회의 오케스트레이션
        - "crawler"
      responsibilities:
        - "Agent 워크플로우 오케스트레이션"
        - "신규/개정 분류 (classifyChangeType)"
        - "영향도 분석 + Citation 생성"
        - "RAG (BM25 우선, pgvector stretch)"
        - "Flexible Parser + 파싱 실패 알림"
        - "LLM 사용량 추적 (예산 가드)"
        - "v2: 주간 회의 스케줄·진행·디지스트 LLM 생성"
      cannot_access:
        - "Next.js Presentation 코드 import 금지"

    data:
      description: "SQLite + Obsidian Local REST API (Obsidian이 vault 관리, v5) — v2부터 MeetingSession/Report 테이블 추가"
      directories:
        - "backend/data/sqlite"
        - "backend/data/repositories"
        - "backend/data/vault/"        # v5: ObsidianApiClient 위치 (파일시스템 X)
        # vault/ 자체는 Obsidian 호스트(또는 VM)가 관리 — 백엔드 외부
      responsibilities:
        - "SQLite CRUD (Regulation·Version·ImpactAnalysis·Citation 등)"
        - "v5: VaultDocument를 Obsidian Local REST API로 PUT/POST/GET (port 27123)"
        - "v5: Obsidian search API 보조 호출 (BM25와 보완)"
        - "BM25 인덱스 영속화 (Backend 자체 인덱스 — 한국어 형태소)"
        - "LLMUsageRecord 적재"
        - "v2: MeetingSession·MeetingReport·MeetingParticipant CRUD"
        - "v2: UserCharacter.lpc_parts JSON 영속"
        - "v5: Obsidian Git plugin push는 Obsidian이 담당 (백엔드 책임 X)"
      cannot_access:
        - "presentation"
        - "v5: vault/ 디렉토리 파일시스템 직접 접근 (REST API 강제)"

  layer_communication:
    presentation_to_logic: "REST/HTTP + WebSocket (deskrpg ↔ nanobot)"
    logic_to_data: "Repository 패턴 (Python) — DTO/Domain Model 분리"
    data_format: "DTO (Python dataclass / TypeScript interface)"
    notes:
      - "Crawler 서비스는 nanobot과 message queue 또는 직접 HTTP로 통신"
      - "WebSocket은 NPCReport 푸시 (in-world 실시간 보고)"
      - "v2: 회의 진행은 별도 WebSocket 채널 (NPC 좌석 이동·발화 턴 동기화)"

# ─────────────────────────────────────────────────────────────────────
# Scope — MVP / Future
# ─────────────────────────────────────────────────────────────────────
scope:
  mvp:
    - "FSS 보도·규정·해설 게시판 크롤러 (1개 소스 end-to-end)"
    - "신규/개정 자동 분류"
    - "LLM 영향도 분석 (Citation 포함)"
    - "deskrpg fork RPG 대시보드 (캐릭터·NPC 2종·필터 4종·타임라인)"
    - "Obsidian Local REST API를 통한 vault 저장 (v5) + Obsidian Git plugin private repo sync (수동, v4)"
    - "메인 시연 시나리오 4단계 (AC-005)"
    - "4개 소스(BOK/FSC/국회·관보/BCBS) 인터페이스 stub + mock 1건"
    - "LLM 사용량 추적 + $40 임계 경고"
    - "GitHub Actions CI + .harness/gates default 통과"
    - "v2: AI 미팅룸 → 주간 컴플라이언스 회의실 repurpose (AC-011)"
    - "v2: LPC 캐릭터 커스터마이징 (AC-012)"
    # ── v9 신규 (M3/M4 본인 담당 작업) ──
    - "PostgreSQL 채택 (로컬 docker-compose) + SQLite 코드 일괄 제거 (parallel-change contract phase)"
