# ─────────────────────────────────────────────────────────────────────
# Goal — 한 문장으로 압축한 목표
# ─────────────────────────────────────────────────────────────────────
goal:
  summary: |
    금융 규제 변동을 자동 수집·분석하여 deskrpg 기반 RPG 대시보드의
    NPC 에이전트(crawler/analyzer)가 사용자 캐릭터에게 in-world로
    보고하고, 주간 컴플라이언스 회의실에서 NPC 모임 디지스트를
    자동 발표하는 RegTrack 시스템 구축 (FSS 1개 소스 end-to-end MVP).

  detail: |
    수동 웹서핑(5개 사이트 매일 확인) + 부서 간 공유 부재 + 영향도 판단 시간 소요
    + 변경 이력 추적 어려움이라는 4대 페인 포인트를 해결한다. 12주 안에
    FSS(금융감독원) 1개 소스를 보도·규정·해설 게시판까지 깊게 자동화하고,
    LLM(OpenAI/Claude API) 기반 영향도 분석에 근거 구절(Citation)을 첨부하며,
    Next.js + deskrpg fork로 픽셀 아트 RPG 대시보드를 구현한다. deskrpg
    원본의 AI 미팅룸을 RegTrack '주간 컴플라이언스 회의실'로 repurpose해
    크롤러/분석 NPC들이 모여 '이번 주 신규 N건 + HIGH 영향 K건'을 자동
    브리핑한다. LPC 캐릭터 커스터마이징은 그대로 KEEP. 나머지 4개
    소스(BOK/FSC/국회·관보/바젤위)는 인터페이스 stub + mock 데이터 1건으로
    확장 가능성만 증명한다.

  non_goals:
    - "프로덕션 운영 (멀티 테넌트, 권한 모델, SSO, audit log)"
    - "모바일 반응형 UI"
    - "장기 데이터 보관 (12주 종료 후 폐기 OK)"
    - "deskrpg 원본의 맵 에디터 (CUT 유지 — RegTrack 무관)"
    - "deskrpg 원본의 멀티플레이어 동시 입장 (CUT 유지 — 시연 1인 모드)"
    - "BCBS(바젤위) 영문 본문 번역 자동화 (v2)"
    - "픽셀 아트 자산 신규 제작 (MVP는 deskrpg 기본 자산 재활용 + 색상·이름 변경)"
    - "Vector DB(pgvector) 기반 의미 검색 (BM25로 시작, stretch)"
    # ── v8 신규 (deskrpg 라이센스 명시) ──
    - "상업 배포 (Production commercial launch) — deskrpg Sustainable Use License 1.0 위반. 상업화는 별도 라이센스 재선택·재구현 필요"
    - "deskrpg upstream의 비RegTrack 신규 기능 직접 통합 (시연 종료 후 M5 retro 안건)"
    # ── v9 신규 (openclaw 대체 + Postgres 채택) ──
    - "OpenClaw 게이트웨이 MVP 포함 (AI_PROVIDER=openclaw 경로) — v9에서 즉시 제거, dual-mode 운영 안 함"
    - "SQLite 운영 (구조화 데이터) — v9에서 Postgres로 전환, SQLite 코드 일괄 제거"
    - "behavioral parity (응답 latency·chunk 형식 등 byte-level 동일) — v9는 functional parity만 보장"
    - "openclaw 페어링 디바이스 키 마이그레이션 (~/.openclaw-devices → 신규 ~/.nanobot-devices 자동 이동만, 키 자체 변환 X)"
    - "nanobot agent loop이 .md persona 파일을 read (drift/loop/bloat 위험 — DB가 source of truth)"

