# ─────────────────────────────────────────────────────────────────────
# Post-creation Amendments (PR 머지 전 정정 사항 — Phase 1 Discovery 결과)
# ─────────────────────────────────────────────────────────────────────
# 본 amendment는 seed-v9 PR이 dev에 머지되기 전(아직 작업 산출물 없음) 시점에
# 발생한 정정. 머지 이후 정정 필요시는 반드시 seed-v10로 bump.
post_creation_amendments:
  - date: "2026-05-19T11:30:00"
    trigger: |
      Phase 1 Discovery에서 schema drift 검출:
        (1) TRD §2.3.a가 제안한 신규 'gateway_channel_bindings' 테이블이
            이미 'gatewayResources'(token_encrypted + paired_device_id) +
            'channelGatewayBindings'(channel↔gateway junction) 조합으로 더 잘 설계됨.
        (2) T-005/T-006의 "정리" 대상 함수들이 이미 production-ready
            (encryptGatewayToken/decryptGatewayToken: AES-256-GCM v1 format;
             internalRpc: EBUSY retry + dev/prod dual-mode + openclaw-호환 에러 shape).
        (3) T-007의 "신규" gateway-channel-binding repository가 이미
            gateway-resources.ts:305-373에 존재.

    affected_sections:
      - "ontology.entities.GatewayChannelBinding — 신규 entity로 새 테이블 함의했으나,
         실제로는 기존 'channelGatewayBindings' (junction) + 'gatewayResources' (token)
         조합의 alias로 의미 reinterpret. 신규 테이블 X."
      - "ontology.entities.GatewayDeviceIdentity — 부분 매핑:
         'gatewayResources.paired_device_id'(WHICH device WE pair with) +
         '~/.nanobot-devices/${hash}.json'(OUR keypair 파일) 조합.
         별도 DB 테이블 신설은 불필요, 파일시스템 + 기존 컬럼으로 충분."
      - "tech_decisions D-19 (functional parity 9 categories) — Authentication tokens(7번),
         Configuration storage(6번), Provider abstraction(9번)은 이미 90%+ 구현됨.
         실제 작업량은 'parity 보장 + dead code 제거'로 명세보다 작음."

    superseded_in_v9: []  # 본문 수정 없음. 본 amendment 블록은 정정 기록만.
    note: |
      ontology entity는 그대로 두되 (재사용 매핑임), 실제 구현 시 TRD가 우선.
      TRD-RegTrack-2026-05-19-v9-m3m4.md + decomposition-2026-05-19-v9-m3m4.yaml
      는 본 amendment에 맞춰 같은 PR에서 수정됨 (TRD/decomposition은 immutable 대상 아님).

  - date: "2026-05-19T17:00:00"
    trigger: |
      Phase 3 완료 후 docker compose 통합 smoke test (2026-05-19) + /evaluate
      (eval-seed-v9-2026-05-19.yaml) 결과 6건의 non-blocking 이슈 발견:
        (1) Task 추출이 LLM 응답 본문의 ```task-action``` 코드블록 정규식 파싱에
            의존 — LLM이 형식을 빠뜨리면 등록 누락 (smoke test 재현: "등록해"
            2회 응답 중 1건만 board 반영). 구조적으로 nanobot tool/state API
            기반으로 재설계 권장 (사용자 제안).
        (2) T-029 migrateLegacyOpenClawPaths 호출이 dev-server.ts에만 wire됨.
            production server.js 부팅 path는 호출 누락 → 실 배포에서 기존
            ~/.openclaw 디렉토리 잔존 시 마이그레이션 skip.
        (3) NANOBOT_HOME named volume + chown 미정리. 통합 docker-compose의
            nextjs(uid 1001 system user) home이 /nonexistent → getNanobotHomeDir
            fallback EACCES. 임시 fix(NANOBOT_HOME=/tmp/nanobot)는 컨테이너
            재시작 시 mirror 손실.
        (4) chatAbort가 HTTP-level abort(TCP close)만 수행 — nanobot의
            process_direct asyncio task는 client disconnect 자동 감지 X.
            결과: UI 정상 정지하나 LLM token 일부 추가 생성됨 (비용 낭비).
        (5) NanobotPairingStatusCard.tsx는 Phase 2(commit 1f5adb15)에서
            구현됐으나 어떤 페이지에도 mount되지 않음. AC-016 verification의
            "UI 카드가 pairingRequired 상태로 전환" 조건이 user-observable
            형태로는 검증 불가 (API + DB 우회 검증만 가능).
        (6) 채팅 첨부파일(20MB 버퍼 + ChatPanel showFileUpload + 클라이언트가
            ArrayBuffer로 socket.emit)이 server.js npc:chat 핸들러에서
            destructure 누락(`const { npcId, message } = data`)으로 nanobot에
            전달되지 않음. 즉 attach UI는 동작하나 backend drop. seed-v9
            AC-014(Chat streaming parity)는 텍스트-only로 명세되어 scope 밖.

    affected_sections:
      - "AC-015 verification — 실 배포 마이그레이션 미작동 (위 (2)). evaluate
         결과 PARTIALLY_MET. 본 amendment는 backlog-2로 추적."
      - "AC-016 verification — 'UI 카드 상태 전환' 조건이 mount 누락(위 (5))으로
         user-observable 불가. evaluate PARTIALLY_MET. 본 amendment는 backlog-5로
         추적."
      - "AC-014 — 텍스트-only chat streaming parity 명세 그대로 유지.
         첨부파일(위 (6))은 seed-v9 scope 밖이며 seed-v10 candidate로 분류."

    superseded_in_v9: []  # 본문 수정 없음. 본 amendment는 follow-up 추적 기록.

    non_blocking_backlog:
      - id: "backlog-1"
        title: "Task 추출을 LLM 본문 parsing 대신 nanobot tool API로 재설계"
        severity: "medium"
        source: "smoke test 2026-05-19 (사용자 제안)"
        target: "seed-v10 candidate / /rfc 권고"
      - id: "backlog-2"
        title: "T-029 migrateLegacyOpenClawPaths가 production server.js에 미와이어링 + nanobotAgentSessions schema가 CJS server-db.js에 미정의"
        severity: "medium"
        source: "smoke test 2026-05-19"
        target: "Phase 4 testcontainers 시점에 통합"
      - id: "backlog-3"
        title: "NANOBOT_HOME named volume + chown — 현재 /tmp/nanobot은 컨테이너 재시작 시 mirror 손실"
        severity: "low"
        source: "smoke test 2026-05-19 (EACCES fix 후속)"
        target: "production deployment 시점"
      - id: "backlog-4"
        title: "nanobot-side cancel endpoint — HTTP-level abort 만으로는 LLM 계산 즉시 중단 X (토큰 낭비)"
        severity: "low"
        source: "smoke test 2026-05-19 (사용자 제안)"
        target: "별 RFC + nanobot fork 변경"
      - id: "backlog-5"
        title: "NanobotPairingStatusCard UI mount 누락 — AC-016 verification 'UI 카드 상태 전환' user-observable 불가"
        severity: "medium"
        source: "smoke test 2026-05-19"
        target: "Phase 6 cross-team integration"
      - id: "backlog-6"
        title: "채팅 첨부파일이 nanobot까지 전달 안 됨 — server.js npc:chat 핸들러가 files 필드 destructure 누락. ChatPanel + 클라이언트는 ArrayBuffer로 전송 중."
        severity: "medium"
        source: "smoke test 2026-05-19 (사용자 질문)"
        target: "seed-v10 candidate (AC-014 multimodal 확장 or 별 AC)"

    note: |
      6개 backlog는 모두 non-blocking이며, /evaluate가 PASS_WITH_NOTED_GAPS로
      Phase 3 implementation을 승인함. 본문 AC 정의는 그대로 유지되고, 본
      amendment는 follow-up scope 추적용. backlog-1/6은 seed-v10에서 정식 AC로
      승격 가능 (LLM-output parsing 의존 제거 + multimodal chat input).


# ─────────────────────────────────────────────────────────────────────
# Changes from v8 — 변경 이력 (immutable spec 진화 추적)
# ─────────────────────────────────────────────────────────────────────
changelog_from_v8:
  trigger: |
    seed-v8 기반 /evaluate 결과 다중 발견:
      (1) must_not 위반: deskrpg fork에 PostgreSQL(pg ^8.20.0)이 runtime
          dependency로 활성. seed-v8은 "SQLite 단일 파일 DB"를 must, "PostgreSQL을 MVP
          의존성에 포함"을 must_not으로 못박았으나 fork 코드와 직접 충돌.
      (2) M3/M4 담당자(인터뷰이) 작업 범위가 v8 미반영: nanobot fork가 deskrpg가
          openclaw 게이트웨이로 제공하던 모든 기능을 functional parity로 대체하는
          것이 본 프로젝트의 핵심 작업이지만, v8에 "openclaw" 단어는 0건.
          코드에는 openclaw 관련 128+ 터치포인트가 9개 functional category에 분산.
      (3) AC-008 위젯이 PR2a/2b로 부분 구현됐으나 v8 명세의 $60 NPCReport push
          + $90 BUDGET_EXCEEDED 호출 차단은 미구현.
      (4) 스토리보드(docs/demo-scenario/STORYBOARD-RegTrack-2026-05-16.md)에서
          AC-005/011 외 시나리오 단계는 AC 추출 안 됨 (인터뷰이는 추후 evolve로 합의).

  decided:
    - "PostgreSQL 채택 (로컬 docker-compose). SQLite must_not 해제 + must 갱신."
    - "pgvector는 v8 should 그대로 stretch 유지 (MVP 포함 X). BM25 + Obsidian wikilink 우선."
    - "SQLite 코드 일괄 제거 — schema-sqlite.ts, better-sqlite3, DB_TYPE 분기, sqlite-base-schema.js."
    - "AI_PROVIDER=nanobot 전용 (dual-mode 없음). openclaw 모드는 v9 즉시 deprecate."
    - "nanobot 게이트웨이가 openclaw 9 functional categories에 대해 functional parity 제공."
    - "Ed25519 device pairing + challenge-response를 nanobot도 구현 (full parity)."
    - "워크스페이스 파일 경로 ~/.openclaw/ → ~/.nanobot/ rename (1회용 migration)."
    - "IDENTITY.md/SOUL.md는 write-only mirror (nanobot read X, DB가 source of truth)."
    - "legacy npcs.openclawConfig.persona fallback 코드 제거."
    - "DB 컬럼명 npcs.openclawConfig 유지 (rename 영향도 vs 명확성 tradeoff에서 영향도 우선)."
    - "M3/M4 owner(인터뷰이) 담당 AC 범위 명시: AC-002/003/004/005/006/008/011/012 + 신규 AC-013..021 = 17 AC."
    - "스토리보드 미커버 시나리오는 v10 이상에서 living-spec 사이클로 evolve."

  added:
    - "constraints.must: 구조화 데이터는 PostgreSQL에 저장 (로컬 docker-compose)"
    - "constraints.must: AI_PROVIDER=nanobot 단일 경로 (openclaw 경로 제거)"
    - "constraints.must: nanobot 게이트웨이는 openclaw 9 functional categories와 functional parity"
    - "constraints.must: Ed25519 device identity + challenge-response 페어링 (~/.nanobot-devices/)"
    - "constraints.must: 워크스페이스 경로 ~/.nanobot/workspace-${agentId} (기존 ~/.openclaw 마이그레이션)"
    - "constraints.must: NPC persona의 source of truth는 DB npcs.openclawConfig.personaConfig"
    - "constraints.must_not: openclaw 모드(AI_PROVIDER=openclaw) 신규 코드 추가"
    - "constraints.must_not: nanobot agent loop이 .md persona 파일을 read (write-only mirror만)"
    - "constraints.must_not: legacy npcs.openclawConfig.persona 문자열 필드 신규 참조"
    - "constraints.should: openclaw 경로 dead code는 contract phase에서 일괄 제거 (parallel-change)"
    - "acceptance_criteria AC-013..021 신설 — 9 functional category별 testable parity"
    - "tech_decisions D-15..D-24 추가 — Postgres·SQLite·nanobot 결정 사항"
    - "owner: 본 인터뷰이(M3/M4 nanobot↔deskrpg gateway + Obsidian 프론트엔드) — 17 AC 매핑"
    - "dependencies: AC-004 → AC-001/007, AC-003 → AC-001, AC-002 → AC-001"
    - "R-19 (Risk Register): openclaw → nanobot 대체 중 회귀 위험 (128+ 터치포인트)"
    - "R-20: Ed25519 페어링 구현 누락 시 시연 봉인 위험 (UI 4상태 의존)"

  modified:
    - "constraints.must: '구조화 데이터는 SQLite에 저장' → 'PostgreSQL에 저장 (로컬 docker-compose)'"
    - "constraints.must_not: 'PostgreSQL/pgvector를 MVP 의존성에 포함' 항목 제거 (Postgres는 must로 승격, pgvector는 should stretch 유지)"
    - "AC-008: $60/$90 enforcement 미구현 명시 (현재 위젯 색상만; v9에서 NPCReport push + BUDGET_EXCEEDED 차단 추가)"
    - "scope.mvp: 'Postgres 채택 + openclaw 제거 + nanobot parity 9 카테고리' 추가"
    - "환경 변수 AI_PROVIDER 기본값 'openclaw' → 'nanobot'"
    - "환경 변수 DATABASE_URL은 PostgreSQL 연결 문자열 필수 (SQLITE_PATH 제거)"

  unchanged:
    - "Qwen 모델 결정 (v7 D-12)"
    - "AC-008 단계별 임계치 ($30/60/90, v6 D-11)"
    - "Obsidian REST API 통합 + Vault 정책 (v5)"
    - "메인 시연 시나리오 4단계 (AC-005)"
    - "Citation 강제 (AC-003)"
    - "$100 / 2.5개월 총 예산"
    - "Scope Change Governance (§17)"
    - "deskrpg Sustainable Use License 1.0 (v8 신규 — 학술 시연 범위)"
    - "12 v8 AC 중 AC-001/002/003/004/005/006/007/009/010/011/012 본문 (AC-008만 enforcement 항목 modified)"

  pending_v10:
    - "스토리보드 추가 시나리오 (인터뷰이가 v9 구현 진행 후 발견 시 trigger)"
    - "Owner scope 확장 (현재 17 AC; M5 retro 안건 후보)"
    - "pgvector enable 결정 (시연 직전 정확도 평가 시점)"
    - "OpenRouter prompt cache 지원 여부 (v7 pending 유지 — W6 구현 시 확인)"
    - "Qwen 정확도 benchmark 결과 (v7 pending 유지 — W6 첫 주)"
    - "팀원 역할 4인 최종 확정 (현재 일반 명칭 팀장/팀원1/팀원2/팀원3 유지)"

