# ─────────────────────────────────────────────────────────────────────
# Goal — north star
# ─────────────────────────────────────────────────────────────────────
goal:
  summary: |
    사용자가 받은 분석 보고서를 채팅창 옆에 항상 펼쳐놓고 일한다 — nanobot이
    push한 자유 마크다운 보고서를 Claude Artifacts 스타일 패널에 sanitize 렌더,
    NPC 단위로 자연 전환, 영속·복원 보장.

  detail: |
    seed-v10에서 sub-agent의 짧은 한 줄 보고는 chat-push로 영속됐지만 (phase 6),
    실제로 nanobot이 분석·요약·리포트 형태로 뽑은 **본문 큰 결과물**을 채팅 메시지
    안에 박으면 UX가 깨진다 — 채팅은 흐름성·짧은 문장 위주라 다단 마크다운·표·
    인용·섹션 헤딩 같은 보고서 톤이 살지 못함.

    v11은 보고서를 **별 도메인**으로 분리한다:
      - **새 테이블 `agent_reports`** — 자유 마크다운 본문 + 작성자 metadata snapshot
      - **새 endpoint `POST /api/internal/reports`** — nanobot push 수신
      - **새 UI 패널 (ReportPanel)** — 채팅창 우측에 슬라이드인, sanitize 렌더
      - **새 socket event `agent-report:ready`** — 현재 NPC면 패널 갱신, 아니면 토스트

    Claude Artifacts metaphor 그대로: "지금 대화 중인 NPC의 최근 작품이 옆에서
    살아있다". 사용자는 채팅을 계속하면서 보고서를 참조·복사·재참조한다.

    seed-v10 인프라(parent_npc_id metadata wiring, INTERNAL_RPC_SECRET 패턴,
    chat-push handler 디자인) 그대로 재사용 — v11은 expand 패턴 (기존 흐름 미변경,
    신규 트랙만 추가).

  non_goals:
    - "보고서 PDF/DOCX 파일 export — 1단계는 웹 렌더만, 필요해지면 ⬇ 버튼만 추가"
    - "보고서 lifecycle update (in-progress → completed PATCH) — 단발성 push로 시작, 추후 nanobot 측 필요 시 진화"
    - "보고서 본문 검색·풀텍스트 인덱싱 — history 모달 목록만"
    - "보고서 공유 URL/외부 링크"
    - "모바일 반응형 패널 — desktop 우선"
    - "본문 크기 limit — YAGNI, 실제 운영 문제 시점에 추가"
    - "Channel 단위 필터링 — channel_id는 metadata snapshot에만 보존 (future filter용 hook)"
    - "nanobot fork 측 보고서 push 호출자 구현 — 다른 팀원 별 PR (contract만 정의)"

# ─────────────────────────────────────────────────────────────────────
# Constraints
# ─────────────────────────────────────────────────────────────────────
constraints:
  must:
    - "보고서는 새 테이블 `agent_reports`에 저장 — chat_messages와 혼합 금지 (책임 분리)"
    - "agent_reports.character_id (소유자) NOT NULL + agent_reports.npc_id (작성자) nullable + ON DELETE SET NULL"
    - "endpoint `POST /api/internal/reports` 는 INTERNAL_RPC_SECRET 헤더(`x-deskrpg-internal-secret`) 인증 + body의 characterId/npcId로 식별 — `x-user-id` 헤더 불요 (v10 D-27 패턴 재사용)"
    - "report.npc_id는 parent npc_id (Supervisor 등). sub-agent가 보냈더라도 nanobot은 session metadata의 parent_npc_id를 그대로 사용 — v10 phase3 metadata wiring (D-28) 재사용"
    - "작성자 sub-agent 식별은 `metadata.creator_sub_agent_label` snapshot 문자열로 보존 — sub-agent NPC 삭제돼도 라벨 유지"
    - "마크다운 렌더는 react-markdown + rehype-sanitize 표준. iframe/script/raw HTML 차단"
    - "Idempotency-Key 헤더로 같은 보고서 중복 push dedup (v10 phase5 chat-push 패턴 재사용, TTL 10분 in-memory)"
    - "socket event `agent-report:ready`는 channelId 기반 broadcast. 클라이언트는 현재 NPC면 패널 슬라이드인, 아니면 채팅 영역 토스트"
    - "보고서는 새로고침 후에도 살아남음 — DB 영속 + 패널 mount 시 fetch"
    - "NPC 삭제돼도 보고서 보존 — npc_id NULL로 SET, metadata.creator_sub_agent_label fallback 표시"

  must_not:
    - "chat_messages 테이블에 보고서 본문 저장 (책임 분리 위반)"
    - "report 본문에서 raw HTML/script 렌더 (XSS + 렌더 안정성 위반)"
    - "report endpoint를 user-auth(x-user-id)로 노출 — internal-secret 전용"
    - "현재 NPC와 무관한 보고서를 패널에 자동 표시 (사용자 컨텍스트 혼선)"
    - "단일 reportId에 PATCH/PUT 허용 (lifecycle update는 future, v11에선 단발성 push만)"
    - "보고서 fetch 시 character_id 누락 (보고서함은 character 소유, 인증된 사용자만)"

  should:
    - "패널 슬라이드인 애니메이션 부드럽게 (Claude Artifacts 톤 — 200~300ms ease-out)"
    - "history 모달에 작성자 NPC 라벨 + 작성 시각 + 본문 첫 줄 미리보기 노출"
    - "보고서 push 실패 시 nanobot 측 at-least-once retry — deskrpg는 Idempotency-Key로 dedup"
    - "다른 NPC 보고서 토스트 클릭 시 그 NPC 대화로 자연 전환 + 패널 갱신"

# ─────────────────────────────────────────────────────────────────────
# Acceptance Criteria
# ─────────────────────────────────────────────────────────────────────
acceptance_criteria:
  - id: "AC-001"
    description: |
      Drizzle migration 신설: `agent_reports` 테이블. 컬럼: id (uuid PK), character_id
      (uuid FK characters.id NOT NULL ON DELETE CASCADE), npc_id (uuid FK npcs.id
      NULL ON DELETE SET NULL), title (text), body_markdown (text NOT NULL),
      metadata (jsonb — creator_sub_agent_label, channel_id_snapshot 등),
      created_at (timestamptz default now). 인덱스: idx_agent_reports_character_created
      (character_id, created_at desc) + idx_agent_reports_npc_created (npc_id, created_at desc).
      schema.ts + schema-sqlite.ts + server-db.js (CJS PostgreSQL + SQLite) + sqlite-base-schema.js parity.
    verification: "automated"
    priority: "must"
    complexity: "low"

  - id: "AC-002"
    description: |
      `POST /api/internal/reports` endpoint 신설. INTERNAL_RPC_SECRET 헤더 인증.
      Idempotency-Key 헤더 지원 (in-memory TTL 10분 dedup, v10 chat-push 패턴 재사용).
      body: {channelId, npcId, characterId, title?, bodyMarkdown, creatorSubAgentLabel?, metadata?}.
      validation: 필수 필드 누락 → 400 missing_required_field. npc_id 존재 확인 → 404 npc_not_found.
      channel 존재 + npc.channel_id 일치 확인 → 404 channel_not_found. 성공 → 201 + {persistedReportId}.
      DB insert + socket emit agent-report:ready (channelId broadcast) 둘 다 트랜잭션 외 best-effort
      (emit 실패 시 row는 영속, retry 가능).
    verification: "automated"
    priority: "must"
    complexity: "medium"

  - id: "AC-003"
    description: |
      ReportPanel 컴포넌트 신설 (`src/components/ReportPanel.tsx`). 채팅창 우측에 위치.
      현재 NPC의 최신 보고서 1건만 표시 (agent_reports.npc_id = currentNpc.id ORDER BY created_at DESC LIMIT 1).
      본문은 react-markdown + rehype-sanitize 렌더 (iframe/script 차단). 헤더에 title +
      작성자 라벨 (npc.name 또는 metadata.creator_sub_agent_label snapshot fallback) +
      작성 시각. NPC 전환 시 패널도 자연 교체. 보고서 없으면 빈 패널 (또는 placeholder).
      슬라이드인 애니메이션 200~300ms ease-out.
    verification: "both"
    priority: "must"
    complexity: "medium"

  - id: "AC-004"
    description: |
      socket event `agent-report:ready` broadcast 추가. payload: {reportId, npcId, channelId,
      title?, creatorSubAgentLabel?, createdAt}. GamePageClient socket listener:
      - currentNpcId === payload.npcId → ReportPanel 데이터 refetch + 슬라이드인
      - currentNpcId !== payload.npcId → 채팅 영역 위 토스트 `{npc.name 또는 label}가
        보고서를 올렸어요` + 클릭 시 그 NPC로 전환 + 패널 갱신
    verification: "both"
    priority: "must"
    complexity: "medium"

  - id: "AC-005"
    description: |
      ReportPanel 옆 작은 "history" 버튼 + 클릭 시 ReportHistoryModal. 모달은 현재 character가
      소유한 보고서 목록 (agent_reports.character_id = me, ORDER BY created_at DESC LIMIT 50).
      각 row: 작성자 NPC 라벨 (npc.name 또는 metadata.creator_sub_agent_label snapshot) +
      작성 시각 + title + 본문 첫 줄 미리보기 (50자). 클릭 시 패널에 해당 보고서 로드.
      검색·필터 X (MVP).
    verification: "both"
    priority: "should"
    complexity: "medium"

  - id: "AC-006"
    description: |
      NPC 삭제 → 보고서 보존 검증: npc 삭제 시 agent_reports.npc_id가 NULL로 SET (ON DELETE SET NULL
      FK). ReportPanel/HistoryModal에서 npc.name lookup 실패 시 metadata.creator_sub_agent_label
      snapshot으로 fallback 표시. snapshot도 없으면 "삭제된 NPC" 라벨.
    verification: "both"
    priority: "must"
    complexity: "low"

  - id: "AC-007"
    description: |
      report push contract 문서화 — docs/api/internal-events-contract.md에 Section 12
      추가. shape: {channelId, npcId, characterId, title?, bodyMarkdown, creatorSubAgentLabel?,
      metadata?}. 401/400/404/409 에러 매핑. Idempotency-Key 헤더 사용법. socket event
      payload shape. nanobot fork 측 (다른 팀원) 참조용.
    verification: "manual"
    priority: "must"
    complexity: "low"

  - id: "AC-008"
    description: |
      GET endpoint `GET /api/reports?characterId=&npcId=&limit=`. 인증: 기존 세션 쿠키
      (user-auth — 내부 endpoint 아님, 사용자가 ReportPanel mount 시 fetch). 응답: 시간순 desc
      max 50 rows. ReportPanel은 currentNpc.id로 fetch, HistoryModal은 character.id로 fetch.
    verification: "automated"
    priority: "must"
    complexity: "low"

# ─────────────────────────────────────────────────────────────────────
# Ontology — 도메인 모델
# ─────────────────────────────────────────────────────────────────────
ontology:
  entities:
    - name: "Report"
      table: "agent_reports"
      fields:
        - { name: "id", type: "uuid", required: true }
        - { name: "characterId", type: "uuid (FK characters.id, ON DELETE CASCADE)", required: true }
        - { name: "npcId", type: "uuid (FK npcs.id, ON DELETE SET NULL)", required: false }
        - { name: "title", type: "text", required: false }
        - { name: "bodyMarkdown", type: "text (자유 마크다운, sanitize는 render 시점)", required: true }
        - { name: "metadata", type: "jsonb (creator_sub_agent_label, channel_id_snapshot 등 snapshot)", required: false }
        - { name: "createdAt", type: "timestamptz", required: true }
      relationships:
        - { target: "Character", type: "belongs_to (cascade — 사용자 삭제 시 보고서도 삭제)" }
        - { target: "NPC", type: "belongs_to (set null — NPC 삭제돼도 보고서 보존, snapshot fallback)" }
      note: "v11에서 row 생성은 100% /api/internal/reports를 통해서만 (nanobot push). 읽기는 /api/reports (user-auth)"

    - name: "ReportPushEvent"
      shape: |
        {
          channel_id: uuid,
          npc_id: uuid (parent npc_id, sub-agent가 아닌 main agent),
          character_id: uuid (보고서 소유자),
          title?: string,
          body_markdown: string (자유 마크다운),
          creator_sub_agent_label?: string (작성자 sub-agent 표시명 snapshot),
          metadata?: {
            channel_id_snapshot?: string,
            ...(free-form)
          }
        }
      transport: "POST /api/internal/reports (HTTP, INTERNAL_RPC_SECRET + Idempotency-Key)"
      role: "nanobot → deskrpg push 이벤트의 stable shape. v10 ToolExecutionEvent와는 별 트랙"

    - name: "ReportReadyEvent (socket broadcast)"
      shape: |
        {
          reportId: uuid,
          npcId: uuid,
          channelId: uuid,
          title?: string,
          creatorSubAgentLabel?: string,
          createdAt: ISO8601
        }
      transport: "socket.io broadcast (room=channelId, event='agent-report:ready')"
      role: "deskrpg server → client. 현재 NPC면 패널 슬라이드인, 아니면 토스트"

  actions:
    - name: "push_report (nanobot → deskrpg)"
      actor: "nanobot agent (sub-agent 또는 main agent emission hook — 다른 팀원 작업)"
      input: "ReportPushEvent + INTERNAL_RPC_SECRET + Idempotency-Key"
      output: "agent_reports row 생성 + persistedReportId 반환"
      side_effects:
        - "socket.io 'agent-report:ready' broadcast → 채널 내 클라이언트 즉시 반응"

    - name: "render_panel (UI)"
      actor: "user (deskrpg ReportPanel 컴포넌트)"
      input: "currentNpcId"
      output: "현재 NPC의 최신 보고서 1건 렌더 (sanitize markdown)"
      side_effects:
        - "NPC 전환 시 자동 refetch"
        - "socket 이벤트 수신 시 자동 갱신"

    - name: "notify_other_npc_report (UI)"
      actor: "deskrpg socket listener"
      input: "ReportReadyEvent (currentNpcId !== payload.npcId 일 때)"
      output: "채팅 영역 위 토스트 알림"
      side_effects:
        - "클릭 시 그 NPC로 전환 + 패널 갱신"

    - name: "fetch_history (UI)"
      actor: "user (HistoryModal 클릭)"
      input: "character.id"
      output: "character 소유 보고서 목록 (max 50, desc)"
      side_effects:
        - "row 클릭 시 패널에 해당 보고서 로드 (currentNpcId 기준 아닌 reportId 기준 임시 렌더)"

