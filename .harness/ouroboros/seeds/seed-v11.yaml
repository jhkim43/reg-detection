# ─────────────────────────────────────────────────────────────────────
# Technical Decisions (D-31 ~ D-37, v10의 D-30까지 이어서)
# ─────────────────────────────────────────────────────────────────────
tech_decisions:
  - decision: "D-31: 보고서 본문 = 자유 마크다운 + 렌더 시점 sanitize"
    reason: |
      Claude Artifacts·Notion·Linear 다 같은 패턴. 고정 섹션 스키마(summary/findings 등)는
      nanobot 측에서 매번 형식 강제 + 파싱 로직 필요해 부담. 자유 마크다운은 LLM이 가장 잘
      뽑는 형식 + react-markdown + rehype-sanitize로 안정 렌더 가능. raw HTML 허용은
      CSS 충돌·React 트리 통제 불가·dark mode 깨짐 위험으로 거절.
    alternatives_considered:
      - "고정 섹션 스키마 (Perplexity 스타일) — 일관성은 좋으나 LLM 출력 강제·파싱 비용"
      - "raw HTML 허용 — XSS + 렌더 안정성 + 운영 안정성 모두 열위"

  - decision: "D-32: 보고서 scope = Character 주 + NPC 참조 nullable"
    reason: |
      NPC 단위는 보고서가 NPC별로 분산되어 "내 보고서함" 통합 뷰 불가. Channel 단위는
      NPC 바뀌면 다른 NPC 보고서까지 보임 — 작품 귀속 혼선. Character 주 (소유자) + NPC
      참조(작성자, nullable)가 가장 균형: 사용자의 개인 보고서함이면서 NPC가 누구인지도
      추적, NPC 삭제돼도 보고서는 결과물로 보존.
    alternatives_considered:
      - "NPC 단위 (npc_id FK only) — 통합 뷰 불가, NPC 삭제 시 보고서 cascade 위험"
      - "Channel 단위 — 작품 귀속 혼선, 다른 NPC 작품 혼입"
      - "완전 Character 단위 (npc_id 미포함) — 작성자 정보 손실, '누가 만들었지?' 추적 불가"

  - decision: "D-33: report.npc_id = parent npc_id (sub-agent가 아닌 main agent)"
    reason: |
      사용자가 직접 대화하는 건 main agent (Supervisor). sub-agent는 hidden background
      actor. 패널 filter가 currentNpcId 기준이라 sub-agent npc_id로 저장하면 패널에 안 보임.
      nanobot이 v10 phase3에서 깔린 session metadata에 parent_npc_id 들고 있으므로
      그대로 사용. 작성자 sub-agent는 metadata.creator_sub_agent_label snapshot으로 라벨링.
    alternatives_considered:
      - "sub-agent 자기 npc_id로 저장 — 패널 쿼리 복잡 (parent_agent_id FK join) + 사용자가 sub-agent와 대화 안 함"

  - decision: "D-34: 패널 슬롯 1개 + history 모달"
    reason: |
      탭 여러 개는 화면 폭 잠식 + 5개 넘으면 정리 필요 (드롭다운/검색) — MVP 과스펙. 슬롯
      1개로 시작하면 사용자 인지 부담 최소, "이전 보고서" 모달로 history 접근. Claude
      Artifacts와 동일 톤.
    alternatives_considered:
      - "탭 누적 (Notion 스타일) — 폭 잠식 + 5+ 정리 인프라 부담"
      - "패널 1개 + 항상 화면에 history 리스트 (Granola 스타일) — 화면 분할 과도, 모바일 future도 어려워짐"

  - decision: "D-35: lifecycle = 단발성 push (PATCH 미지원, future)"
    reason: |
      MVP 단순성. nanobot 측이 in-progress → completed 흐름 필요해지면 그 때 PATCH 추가.
      처음부터 lifecycle 지원하면 클라이언트 상태 관리·낙관적 업데이트·충돌 처리 부담.
    alternatives_considered:
      - "처음부터 in-progress → completed 지원 — 클라이언트 상태 복잡, 사용 미확정 기능 선구현"
      - "버전 누적 (v1, v2, v3) — 사용자가 이전 버전 토글 필요성 불확실"

  - decision: "D-36: 동시 다수 push = 현재 NPC 패널 + 다른 NPC는 채팅 영역 토스트"
    reason: |
      현재 NPC만 패널 자동 갱신해야 사용자 컨텍스트 안 깨짐. 다른 NPC 보고서를 패널이
      덮어쓰면 작업 중인 NPC 컨텍스트 손실. 토스트 + 클릭 전환이 알림성 + 사용자 의도
      존중. 다른 NPC 보고서도 DB엔 즉시 저장되어 누락 없음.
    alternatives_considered:
      - "다른 NPC 보고서 무시 (조용히 저장) — 사용자가 알 방법 없어 누락 경험"
      - "패널 즉시 갱신 (현재 NPC 무시) — 현재 작업 컨텍스트 손실"

  - decision: "D-37: 별 테이블 agent_reports (chat_messages와 분리)"
    reason: |
      보고서는 본문 크기(수 KB~수십 KB), 생명주기, 검색 패턴, 메타데이터가 chat 한 줄과
      너무 다름. 같은 테이블에 kind 컬럼만 다르게 두면 chat 1만 줄에 보고서 5건이 섞여
      쿼리·인덱스 비효율. 책임 분리가 한 달 뒤 유지보수에 결정적.
    alternatives_considered:
      - "chat_messages.kind='report' 재활용 — 인프라 변경 적으나 본문 크기·검색 패턴 부조화"

# ─────────────────────────────────────────────────────────────────────
# Non-blocking Backlog (post-merge 트래킹)
# ─────────────────────────────────────────────────────────────────────
non_blocking_backlog:
  - id: "v11-backlog-1"
    title: "PDF/DOCX 다운로드 버튼"
    priority: "medium"
    owner: "본인 (deskrpg)"
    detail: |
      ReportPanel 우상단 `⬇` 버튼. 마크다운 → PDF는 (a) 클라이언트 html2pdf.js 또는
      (b) 서버 Puppeteer/pandoc. 한글 폰트 임베드 주의. 사용자가 실제로 파일로 받아갈
      use case 발생 시 결정.

  - id: "v11-backlog-2"
    title: "보고서 lifecycle update (PATCH)"
    priority: "low"
    owner: "다른 팀원 (nanobot fork) — 검토 필요"
    detail: |
      nanobot이 분석 진행 단계별로 보고서를 업데이트하고 싶을 때. 같은 reportId로
      PATCH. 클라이언트는 socket 이벤트로 patch 부분만 갱신. 사용 시나리오 확정되면 진행.

  - id: "v11-backlog-3"
    title: "보고서 본문 검색 + 풀텍스트 인덱싱"
    priority: "low"
    owner: "본인 (deskrpg)"
    detail: |
      history 모달에 검색 입력. PostgreSQL tsvector 또는 외부 검색엔진. 보고서 누적량이
      100건 넘기 시작하면 필요.

  - id: "v11-backlog-4"
    title: "모바일 반응형 ReportPanel"
    priority: "low"
    owner: "본인 (deskrpg)"
    detail: |
      desktop 우선이라 패널은 우측 고정. 모바일에선 하단 슬라이드업 시트 또는 fullscreen.
      디자인 라운드 필요.

  - id: "v11-backlog-5"
    title: "보고서 공유 URL"
    priority: "low"
    owner: "본인 (deskrpg)"
    detail: |
      `/reports/{id}` public 또는 token-gated. 외부 공유 use case 발생 시 진행.

  - id: "v11-backlog-6"
    title: "본문 크기 limit + 운영 정책"
    priority: "low"
    owner: "본인 (deskrpg)"
    detail: |
      현재는 limit 없음 (YAGNI). 실제 운영에서 보고서가 100KB+ 자주 들어오거나 DB 비대해지면
      max 50KB + 초과 시 첨부 분리.

# ─────────────────────────────────────────────────────────────────────
# Migration Strategy
# ─────────────────────────────────────────────────────────────────────
migration_strategy:
  phase: "expand (parallel-change)"
  precondition: |
    v10 cycle 머지 완료 — parent_npc_id metadata wiring (phase3) + INTERNAL_RPC_SECRET
    + chat-push handler 패턴이 안착되어 있어야 함. v10 phase6 PR 머지 후 시작 권장 (또는
    독립 브랜치로 시작 후 phase6 머지되면 rebase).
  steps:
    - "1. /trd로 layer mapping + interface design (Data: schema/migration / Logic: handler / Presentation: API + UI)"
    - "2. /decompose로 atomic task 분해"
    - "3. AC-001 (schema + 0009 migration) — DB 변경 먼저"
    - "4. AC-002 (POST /api/internal/reports) — push 받을 곳 준비"
    - "5. AC-007 (contract 문서화) — 다른 팀원과 sync"
    - "6. AC-008 (GET /api/reports) — UI 데이터 fetch 준비"
    - "7. AC-004 (socket event broadcast + listener)"
    - "8. AC-003 (ReportPanel 컴포넌트 + sanitize 렌더)"
    - "9. AC-005 (HistoryModal)"
    - "10. AC-006 (NPC 삭제 시 fallback 검증)"
  rollback: "expand 패턴이라 기존 흐름 미변경. 새 endpoint·테이블·컴포넌트가 추가만 됨 → 회귀 시 endpoint 비활성 + 컴포넌트 unmount만으로 복원 가능."

# ─────────────────────────────────────────────────────────────────────
# Glossary — 본 cycle 핵심 용어
# ─────────────────────────────────────────────────────────────────────
glossary:
  report:
    definition: "nanobot이 분석·요약·리포트 형태로 push하는 본문 큰 마크다운 결과물. agent_reports 테이블에 1 row = 1 보고서"
    not_to_be_confused_with: "chat_messages.kind='subagent_push' (phase 6) — 짧은 한 줄 알림. 보고서는 본문 큰 결과물로 별 트랙"

  report_panel:
    definition: "ReportPanel.tsx — 채팅창 우측 고정 패널. 현재 NPC의 최신 보고서 1건을 sanitize markdown으로 렌더. Claude Artifacts metaphor"

  creator_sub_agent_label:
    definition: "metadata 안에 저장되는 작성자 sub-agent의 표시명 snapshot. sub-agent NPC가 삭제돼도 라벨이 살아남아 '리서치담당이 작성' 같은 fallback 표시 가능"

  artifact_metaphor:
    definition: "Claude Artifacts UX 패턴 — 채팅 좌측 + 풍부한 결과물(아티팩트)이 우측 패널에. 사용자가 채팅을 계속하면서 아티팩트를 참조"

  expand_phase:
    definition: "parallel-change 흐름의 expand 단계 — 새 인프라(endpoint·테이블·UI)를 추가만 함. 기존 흐름 미변경. migrate·contract 단계는 future"
